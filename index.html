<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DHL Zusteller - GTA Style</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background-color: #333; 
            font-family: sans-serif;
            touch-action: none; 
        }
        canvas { 
            display: block; 
        }
        #ui { 
            position: absolute; 
            top: 20px; 
            left: 20px; 
            color: white; 
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 8px;
            pointer-events: none; 
        }
    </style>
</head>
<body>

    <div id="ui">
        <h3 style="margin: 0 0 10px 0;">DHL Zusteller</h3>
        <p style="margin: 5px 0; font-size: 14px;"><strong>PC:</strong> Pfeiltasten</p>
        <p style="margin: 5px 0; font-size: 14px;"><strong>Handy:</strong> Touch & Ziehen</p>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // --- WELT & STRASSEN ---
        // Die Welt ist ca. von -2000 bis 2000 auf der X und Y Achse
        const worldBounds = { minX: -2000, minY: -2000, maxX: 2000, maxY: 2000, width: 4000, height: 4000 };
        
        // Ein einfaches Straßennetz (x, y, breite, höhe)
        const roads = [
            { x: -150, y: -2000, w: 300, h: 4000 }, // Hauptstraße Vertikal
            { x: -2000, y: -200, w: 4000, h: 400 }, // Hauptstraße Horizontal
            { x: 600, y: -1000, w: 200, h: 2000 },  // Nebenstraße
            { x: -800, y: 600, w: 1600, h: 200 }    // Kleine Querverbindung
        ];

        // --- EINGABE-LOGIK ---
        const keys = { ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false };
        window.addEventListener('keydown', e => { if(keys.hasOwnProperty(e.key)) keys[e.key] = true; });
        window.addEventListener('keyup', e => { if(keys.hasOwnProperty(e.key)) keys[e.key] = false; });

        const touchCtrl = {
            active: false,
            startX: 0, startY: 0,
            currentX: 0, currentY: 0,
            maxRadius: 60 
        };

        canvas.addEventListener('touchstart', e => {
            e.preventDefault();
            const touch = e.touches[0];
            touchCtrl.active = true;
            touchCtrl.startX = touch.clientX;
            touchCtrl.startY = touch.clientY;
            touchCtrl.currentX = touch.clientX;
            touchCtrl.currentY = touch.clientY;
        }, { passive: false });

        canvas.addEventListener('touchmove', e => {
            e.preventDefault();
            if (!touchCtrl.active) return;
            const touch = e.touches[0];
            touchCtrl.currentX = touch.clientX;
            touchCtrl.currentY = touch.clientY;
        }, { passive: false });

        canvas.addEventListener('touchend', e => {
            e.preventDefault();
            touchCtrl.active = false;
        }, { passive: false });

        // --- FAHRZEUG ---
        const car = {
            x: 0, y: 0,           
            width: 30, height: 60,
            angle: 0,             
            speed: 0,
            maxSpeed: 10,
            acceleration: 0.3,
            frictionAsphalt: 0.94, // Wenig Reibung = Rollt gut   
            frictionOffroad: 0.85, // Viel Reibung = Bremst ab
            currentFriction: 0.94,
            steeringAngle: 0,     
            maxSteeringAngle: 0.6 
        };

        // --- SPIEL-LOGIK ---
        function update() {
            let isAccelerating = keys.ArrowUp;
            let isReversing = keys.ArrowDown;
            let steeringInput = 0; 

            // Touch auswerten
            if (touchCtrl.active) {
                let dx = touchCtrl.currentX - touchCtrl.startX;
                let dy = touchCtrl.currentY - touchCtrl.startY;
                let distance = Math.sqrt(dx * dx + dy * dy);
                if (distance > touchCtrl.maxRadius) {
                    dx = (dx / distance) * touchCtrl.maxRadius;
                    dy = (dy / distance) * touchCtrl.maxRadius;
                }
                if (dy < -10) isAccelerating = true;
                if (dy > 10) isReversing = true;
                steeringInput = dx / touchCtrl.maxRadius;
            } else {
                if (keys.ArrowLeft) steeringInput = -1;
                if (keys.ArrowRight) steeringInput = 1;
            }

            // 1. Untergrund prüfen (Gehweg-Bremse)
            let onRoad = false;
            for (let i = 0; i < roads.length; i++) {
                let r = roads[i];
                if (car.x >= r.x && car.x <= r.x + r.w && car.y >= r.y && car.y <= r.y + r.h) {
                    onRoad = true;
                    break;
                }
            }
            car.currentFriction = onRoad ? car.frictionAsphalt : car.frictionOffroad;

            // 2. Beschleunigen / Bremsen
            if (isAccelerating) car.speed += car.acceleration;
            if (isReversing) car.speed -= car.acceleration;

            // 3. Reibung anwenden
            car.speed *= car.currentFriction;

            // 4. Lenkung
            if (Math.abs(car.speed) > 0.1) {
                let targetSteeringAngle = steeringInput * car.maxSteeringAngle;
                car.steeringAngle += (targetSteeringAngle - car.steeringAngle) * 0.2;
                let direction = car.speed > 0 ? 1 : -1;
                // Offroad lenkt es sich auch träger
                let steeringModifier = onRoad ? 1 : 0.6; 
                car.angle += car.steeringAngle * steeringModifier * (Math.abs(car.speed) / car.maxSpeed) * direction;
            } else {
                car.steeringAngle *= 0.8;
            }

            // 5. Bewegen
            car.x += Math.cos(car.angle - Math.PI / 2) * car.speed;
            car.y += Math.sin(car.angle - Math.PI / 2) * car.speed;
            
            // Auto in den Weltgrenzen halten
            car.x = Math.max(worldBounds.minX, Math.min(worldBounds.maxX, car.x));
            car.y = Math.max(worldBounds.minY, Math.min(worldBounds.maxY, car.y));
        }

        // --- ZEICHNEN ---
        function draw() {
            // Hintergrund (Wiese/Gehweg)
            ctx.fillStyle = '#4caf50';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.save();
            ctx.translate(canvas.width / 2 - car.x, canvas.height / 2 - car.y);

            // Alle Straßen zeichnen
            ctx.fillStyle = '#555';
            for (let i = 0; i < roads.length; i++) {
                let r = roads[i];
                // Grauer Asphalt
                ctx.fillRect(r.x, r.y, r.w, r.h);
                
                // Eine einfache weiße Seitenlinie zur Orientierung
                ctx.fillStyle = '#fff';
                ctx.fillRect(r.x, r.y, 2, r.h); // links
                ctx.fillRect(r.x + r.w - 2, r.y, 2, r.h); // rechts
                ctx.fillRect(r.x, r.y, r.w, 2); // oben
                ctx.fillRect(r.x, r.y + r.h - 2, r.w, 2); // unten
                ctx.fillStyle = '#555'; // Zurück zu grau für die nächste Straße
            }

            // --- AUTO ZEICHNEN ---
            ctx.save();
            ctx.translate(car.x, car.y);
            ctx.rotate(car.angle);

            ctx.fillStyle = '#ffcc00';
            ctx.fillRect(-car.width / 2, -car.height / 2, car.width, car.height);
            
            ctx.fillStyle = '#1e90ff';
            ctx.fillRect(-car.width / 2 + 2, -car.height / 2 + 8, car.width - 4, 12);

            ctx.fillStyle = '#d32f2f';
            ctx.beginPath();
            ctx.arc(0, 5, 5, 0, Math.PI * 2);
            ctx.fill();

            // Räder
            ctx.fillStyle = '#111';
            const wheelW = 6, wheelH = 14;
            const wheelOffsetX = car.width / 2 + 2, wheelOffsetY = car.height / 2 - 10;

            ctx.fillRect(-wheelOffsetX - wheelW, wheelOffsetY - wheelH / 2, wheelW, wheelH); 
            ctx.fillRect(wheelOffsetX, wheelOffsetY - wheelH / 2, wheelW, wheelH);           

            ctx.save();
            ctx.translate(-wheelOffsetX - wheelW / 2, -wheelOffsetY); 
            ctx.rotate(car.steeringAngle); 
            ctx.fillRect(-wheelW / 2, -wheelH / 2, wheelW, wheelH); 
            ctx.restore();

            ctx.save();
            ctx.translate(wheelOffsetX + wheelW / 2, -wheelOffsetY);
            ctx.rotate(car.steeringAngle);
            ctx.fillRect(-wheelW / 2, -wheelH / 2, wheelW, wheelH);
            ctx.restore();

            ctx.restore(); // Auto Ende
            ctx.restore(); // Kamera Ende

            // --- UI & OVERLAYS ZEICHNEN (nicht von der Kamera betroffen) ---

            // 1. Touch Joystick
            if (touchCtrl.active) {
                ctx.beginPath();
                ctx.arc(touchCtrl.startX, touchCtrl.startY, touchCtrl.maxRadius, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.1)';
                ctx.fill();
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
                ctx.lineWidth = 2;
                ctx.stroke();

                let dx = touchCtrl.currentX - touchCtrl.startX;
                let dy = touchCtrl.currentY - touchCtrl.startY;
                let dist = Math.sqrt(dx * dx + dy * dy);
                if (dist > touchCtrl.maxRadius) {
                    dx = (dx / dist) * touchCtrl.maxRadius;
                    dy = (dy / dist) * touchCtrl.maxRadius;
                }
                ctx.beginPath();
                ctx.arc(touchCtrl.startX + dx, touchCtrl.startY + dy, 25, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 204, 0, 0.8)'; 
                ctx.fill();
            }

            // 2. Mini-Map (unten links)
            const mapSize = 150;
            const mapX = 20;
            const mapY = canvas.height - mapSize - 20;
            
            // Hintergrund Minikarte
            ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
            ctx.fillRect(mapX, mapY, mapSize, mapSize);
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 1;
            ctx.strokeRect(mapX, mapY, mapSize, mapSize);

            // Umrechnungsfaktor von Welt zu Minikarte
            const scaleX = mapSize / worldBounds.width;
            const scaleY = mapSize / worldBounds.height;

            // Straßen auf Minikarte zeichnen
            ctx.fillStyle = '#888';
            for (let i = 0; i < roads.length; i++) {
                let r = roads[i];
                let miniRx = mapX + (r.x - worldBounds.minX) * scaleX;
                let miniRy = mapY + (r.y - worldBounds.minY) * scaleY;
                let miniRw = r.w * scaleX;
                let miniRh = r.h * scaleY;
                ctx.fillRect(miniRx, miniRy, miniRw, miniRh);
            }

            // Sichtbarer Kamera-Ausschnitt (Viewport)
            // Ein Rechteck, das genau anzeigt, was du gerade auf dem Bildschirm siehst
            let viewW = canvas.width * scaleX;
            let viewH = canvas.height * scaleY;
            let viewX = mapX + ((car.x - canvas.width/2) - worldBounds.minX) * scaleX;
            let viewY = mapY + ((car.y - canvas.height/2) - worldBounds.minY) * scaleY;
            
            ctx.strokeStyle = '#ffcc00'; // DHL Gelb für den eigenen Fokus
            ctx.lineWidth = 2;
            ctx.strokeRect(viewX, viewY, viewW, viewH);

            // Spielerposition (kleiner roter Punkt) auf der Minikarte
            let miniCarX = mapX + (car.x - worldBounds.minX) * scaleX;
            let miniCarY = mapY + (car.y - worldBounds.minY) * scaleY;
            ctx.fillStyle = 'red';
            ctx.beginPath();
            ctx.arc(miniCarX, miniCarY, 2, 0, Math.PI * 2);
            ctx.fill();
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }

        loop();
    </script>
</body>
</html>
