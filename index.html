<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DHL Zusteller - GTA Style</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background-color: #333; 
            font-family: sans-serif;
            touch-action: none; /* Verhindert das Scrollen am Handy beim Spielen */
        }
        canvas { 
            display: block; 
        }
        #ui { 
            position: absolute; 
            top: 20px; 
            left: 20px; 
            color: white; 
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 8px;
            pointer-events: none; 
        }
    </style>
</head>
<body>

    <div id="ui">
        <h2>DHL Zustell-Simulator</h2>
        <p><strong>PC:</strong> Pfeiltasten</p>
        <p><strong>Handy:</strong> Bildschirm berühren & ziehen</p>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // --- EINGABE-LOGIK ---
        const keys = { ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false };
        window.addEventListener('keydown', e => { if(keys.hasOwnProperty(e.key)) keys[e.key] = true; });
        window.addEventListener('keyup', e => { if(keys.hasOwnProperty(e.key)) keys[e.key] = false; });

        // Touch-Steuerung
        const touchCtrl = {
            active: false,
            startX: 0, startY: 0,
            currentX: 0, currentY: 0,
            maxRadius: 60 // Maximaler Radius für vollen Lenkeinschlag
        };

        canvas.addEventListener('touchstart', e => {
            e.preventDefault();
            const touch = e.touches[0];
            touchCtrl.active = true;
            touchCtrl.startX = touch.clientX;
            touchCtrl.startY = touch.clientY;
            touchCtrl.currentX = touch.clientX;
            touchCtrl.currentY = touch.clientY;
        }, { passive: false });

        canvas.addEventListener('touchmove', e => {
            e.preventDefault();
            if (!touchCtrl.active) return;
            const touch = e.touches[0];
            touchCtrl.currentX = touch.clientX;
            touchCtrl.currentY = touch.clientY;
        }, { passive: false });

        canvas.addEventListener('touchend', e => {
            e.preventDefault();
            touchCtrl.active = false;
        }, { passive: false });

        // --- FAHRZEUG ---
        const car = {
            x: 0, y: 0,           
            width: 30, height: 60,
            angle: 0,             
            speed: 0,
            maxSpeed: 10,
            acceleration: 0.3,
            friction: 0.94,       
            steeringAngle: 0,     
            maxSteeringAngle: 0.6 
        };

        // --- SPIEL-LOGIK ---
        function update() {
            let isAccelerating = keys.ArrowUp;
            let isReversing = keys.ArrowDown;
            let steeringInput = 0; // -1 (links) bis 1 (rechts)

            // Touch-Eingaben auswerten
            if (touchCtrl.active) {
                let dx = touchCtrl.currentX - touchCtrl.startX;
                let dy = touchCtrl.currentY - touchCtrl.startY;
                
                // Distanz berechnen und ggf. begrenzen
                let distance = Math.sqrt(dx * dx + dy * dy);
                if (distance > touchCtrl.maxRadius) {
                    dx = (dx / distance) * touchCtrl.maxRadius;
                    dy = (dy / distance) * touchCtrl.maxRadius;
                }

                // Gas/Bremse (Toleranzbereich von 10px in der Mitte)
                if (dy < -10) isAccelerating = true;
                if (dy > 10) isReversing = true;

                // Lenkintensität berechnen (-1 bis 1)
                steeringInput = dx / touchCtrl.maxRadius;
            } else {
                // Tastatur-Eingaben überschreiben steeringInput
                if (keys.ArrowLeft) steeringInput = -1;
                if (keys.ArrowRight) steeringInput = 1;
            }

            // 1. Beschleunigen / Bremsen
            if (isAccelerating) car.speed += car.acceleration;
            if (isReversing) car.speed -= car.acceleration;

            // 2. Reibung (Ausrollen)
            car.speed *= car.friction;

            // 3. Lenkung
            if (Math.abs(car.speed) > 0.1) {
                // Ziel-Lenkeinschlag basierend auf Eingabe
                let targetSteeringAngle = steeringInput * car.maxSteeringAngle;
                
                // Weiches Einlenken (Interpolation)
                car.steeringAngle += (targetSteeringAngle - car.steeringAngle) * 0.2;
                
                let direction = car.speed > 0 ? 1 : -1;
                car.angle += car.steeringAngle * (Math.abs(car.speed) / car.maxSpeed) * direction;
            } else {
                // Reifen gerade stellen, wenn wir stehen
                car.steeringAngle *= 0.8;
            }

            // 4. Bewegen
            car.x += Math.cos(car.angle - Math.PI / 2) * car.speed;
            car.y += Math.sin(car.angle - Math.PI / 2) * car.speed;
        }

        // --- ZEICHNEN ---
        function draw() {
            ctx.fillStyle = '#4caf50';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.save();
            ctx.translate(canvas.width / 2 - car.x, canvas.height / 2 - car.y);

            // Straße & Gehweg
            ctx.fillStyle = '#555';
            ctx.fillRect(-150, -2000, 300, 4000); 
            
            ctx.fillStyle = '#fff';
            for(let i = -2000; i < 2000; i += 80) ctx.fillRect(-5, i, 10, 40); 

            ctx.fillStyle = '#aaa';
            ctx.fillRect(-200, -2000, 50, 4000); 
            ctx.fillRect(150, -2000, 50, 4000);  

            // --- AUTO ---
            ctx.save();
            ctx.translate(car.x, car.y);
            ctx.rotate(car.angle);

            ctx.fillStyle = '#ffcc00';
            ctx.fillRect(-car.width / 2, -car.height / 2, car.width, car.height);
            
            ctx.fillStyle = '#1e90ff';
            ctx.fillRect(-car.width / 2 + 2, -car.height / 2 + 8, car.width - 4, 12);

            ctx.fillStyle = '#d32f2f';
            ctx.beginPath();
            ctx.arc(0, 5, 5, 0, Math.PI * 2);
            ctx.fill();

            // Räder
            ctx.fillStyle = '#111';
            const wheelW = 6, wheelH = 14;
            const wheelOffsetX = car.width / 2 + 2, wheelOffsetY = car.height / 2 - 10;

            ctx.fillRect(-wheelOffsetX - wheelW, wheelOffsetY - wheelH / 2, wheelW, wheelH); 
            ctx.fillRect(wheelOffsetX, wheelOffsetY - wheelH / 2, wheelW, wheelH);           

            ctx.save();
            ctx.translate(-wheelOffsetX - wheelW / 2, -wheelOffsetY); 
            ctx.rotate(car.steeringAngle); 
            ctx.fillRect(-wheelW / 2, -wheelH / 2, wheelW, wheelH); 
            ctx.restore();

            ctx.save();
            ctx.translate(wheelOffsetX + wheelW / 2, -wheelOffsetY);
            ctx.rotate(car.steeringAngle);
            ctx.fillRect(-wheelW / 2, -wheelH / 2, wheelW, wheelH);
            ctx.restore();

            ctx.restore(); // Auto Ende
            ctx.restore(); // Kamera Ende

            // --- TOUCH JOYSTICK ZEICHNEN (UI Layer) ---
            if (touchCtrl.active) {
                ctx.save();
                // Zurücksetzen auf Bildschirmkoordinaten
                ctx.setTransform(1, 0, 0, 1, 0, 0); 
                
                // Basis-Kreis (halbtransparent)
                ctx.beginPath();
                ctx.arc(touchCtrl.startX, touchCtrl.startY, touchCtrl.maxRadius, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.1)';
                ctx.fill();
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
                ctx.lineWidth = 2;
                ctx.stroke();

                // Steuer-Knüppel (DHL Gelb)
                let dx = touchCtrl.currentX - touchCtrl.startX;
                let dy = touchCtrl.currentY - touchCtrl.startY;
                
                // Optische Begrenzung des Knüppels auf den Radius
                let dist = Math.sqrt(dx * dx + dy * dy);
                if (dist > touchCtrl.maxRadius) {
                    dx = (dx / dist) * touchCtrl.maxRadius;
                    dy = (dy / dist) * touchCtrl.maxRadius;
                }

                ctx.beginPath();
                ctx.arc(touchCtrl.startX + dx, touchCtrl.startY + dy, 25, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 204, 0, 0.8)'; 
                ctx.fill();

                ctx.restore();
            }
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }

        loop();
    </script>
</body>
</html>
