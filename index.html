<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DHL GTA - Competitors & Realistic Map</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #333; font-family: sans-serif; touch-action: none; user-select: none; -webkit-user-select: none; }
        canvas { display: block; }
        
        #ui { position: absolute; top: 10px; left: 10px; color: white; background: rgba(0, 0, 0, 0.8); padding: 15px; border-radius: 8px; pointer-events: none; z-index: 10; border-left: 4px solid #ffcc00; }
        h3 { margin: 0 0 5px 0; color: #ffcc00; font-size: 18px; }
        #scoreDisplay { font-size: 20px; font-weight: bold; margin-top: 5px; }
        #speedo { font-size: 16px; margin-top: 5px; color: #ccc; }
        #missionInfo { margin-top: 10px; color: #fff; font-size: 14px; }
        
        #touchControllerContainer {
            position: absolute; bottom: 20px; right: 20px; width: 220px; height: 220px;
            background: rgba(0, 0, 0, 0.4); border-radius: 50%; z-index: 10;
            border: 2px solid rgba(255, 255, 255, 0.2); box-shadow: 0 0 15px rgba(0,0,0,0.5);
        }
        #touchControllerCanvas { width: 100%; height: 100%; }
    </style>
</head>
<body>

    <div id="ui">
        <h3>DHL Zusteller</h3>
        <div id="scoreDisplay">Erfolgreich: 0</div>
        <div id="speedo">0 km/h</div>
        <div id="missionInfo">Route wird berechnet...</div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div id="touchControllerContainer">
        <canvas id="touchControllerCanvas" width="220" height="220"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const ctrlCanvas = document.getElementById('touchControllerCanvas');
        const cctx = ctrlCanvas.getContext('2d');

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // --- WELT & KARTE ---
        const mapData = { roads: [], buildings: [] };

        // 1. Die Hauptstraßen (Breit) - Zentrum 0,0 ist eine sichere Kreuzung!
        mapData.roads.push({ x: -3000, y: -100, w: 6000, h: 200, type: 'main' }); // Waagerecht Mitte
        mapData.roads.push({ x: -100, y: -3000, w: 200, h: 6000, type: 'main' }); // Senkrecht Mitte

        // 2. Nebenstraßen (Schmaler)
        for(let i = -2000; i <= 2000; i += 800) {
            if(i !== 0) { // Die 0 ist schon die Hauptstraße
                mapData.roads.push({ x: -2500, y: i - 60, w: 5000, h: 120, type: 'minor' }); // Waagerecht
                mapData.roads.push({ x: i - 60, y: -2500, w: 120, h: 5000, type: 'minor' }); // Senkrecht
            }
        }

        // 3. Gebäude (zwischen den Straßen platzieren)
        for(let blockY = -1800; blockY < 2000; blockY += 800) {
            for(let blockX = -1800; blockX < 2000; blockX += 800) {
                if (Math.abs(blockX) < 200 && Math.abs(blockY) < 200) continue; // Kreuzung freihalten!
                
                // Ein Häuserblock besteht aus mehreren aneinandergereihten Häusern
                for(let i = 0; i < 3; i++) {
                    mapData.buildings.push({ x: blockX + i*160 + 20, y: blockY + 20, w: 140, h: 200 }); // Oben im Block
                    mapData.buildings.push({ x: blockX + i*160 + 20, y: blockY + 420, w: 140, h: 200 }); // Unten im Block
                }
            }
        }

        // --- KONKURRENZ-FAHRZEUGE (Widersacher) ---
        const competitors = [
            { x: -1000, y: 0, w: 65, h: 35, speed: 3.5, axis: 'x', dir: 1, color: '#00a8e1', name: 'Amazon', routeLimit: 2000 },
            { x: 1000, y: 0, w: 60, h: 30, speed: 4, axis: 'x', dir: -1, color: '#00529b', name: 'Hermes', routeLimit: 2000 },
            { x: 0, y: -1000, w: 35, h: 65, speed: 3.8, axis: 'y', dir: 1, color: '#351c15', name: 'UPS', routeLimit: 2000 },
            { x: 0, y: 1500, w: 35, h: 65, speed: 4.5, axis: 'y', dir: -1, color: '#dc0032', name: 'DPD', routeLimit: 2000 }
        ];

        // --- MISSIONS-SYSTEM ---
        const gameState = { score: 0, isDelivering: false, mission: null, floatingTexts: [] };

        const MISSION_TYPES = [
            { name: 'Brief', waitTime: 30, color: '#fff', icon: '✉️' },
            { name: 'Päckchen', waitTime: 90, color: '#f0ad4e', icon: '📦' },
            { name: 'Paket', waitTime: 180, color: '#8b4513', icon: '🟫' }
        ];

        const postman = { x: 0, y: 0, targetX: 0, targetY: 0, state: 'idle', speed: 3, waitTimer: 0 };

        function spawnMission() {
            let b = mapData.buildings[Math.floor(Math.random() * mapData.buildings.length)];
            let type = MISSION_TYPES[Math.floor(Math.random() * MISSION_TYPES.length)];
            
            // Markierung genau vor das Haus auf den Straßenrand (Bordstein) setzen
            // Wir prüfen, ob das Haus oberhalb oder unterhalb der Straßenmitte des Blocks liegt
            let isTopRow = (b.y % 800) < 400; 
            
            let doorY = isTopRow ? b.y + b.h : b.y; // Tür ist unten oder oben am Haus
            let triggerY = isTopRow ? b.y + b.h + 40 : b.y - 40; // Halo liegt 40px auf der Straße

            gameState.mission = {
                doorX: b.x + b.w / 2,
                doorY: doorY, 
                triggerX: b.x + b.w / 2,
                triggerY: triggerY,
                radius: 40,
                type: type,
                pulse: 0
            };
            document.getElementById('missionInfo').innerText = `Ziel: ${type.name} ${type.icon}`;
        }
        spawnMission();

        function showFloatingText(text, x, y) {
            gameState.floatingTexts.push({ text: text, x: x, y: y, life: 60 });
        }

        // --- SPIELER FAHRZEUG (Street Scooter) ---
        const car = {
            x: 0, y: 0, // Garantiert sichere Startposition auf der Hauptkreuzung!
            width: 30, height: 60,
            angle: 0,
            speed: 0,
            maxSpeed: 8,          
            maxReverseSpeed: 4,   
            acceleration: 0.2,    
            braking: 0.4,         
            friction: 0.96,       
            steeringAngle: 0,
            maxSteer: 0.05,       
            steeringInput: 0
        };

        const inputs = { fwd: false, rev: false, left: false, right: false };

        // --- KOLLISIONSABFRAGE (Häuser UND Widersacher) ---
        function checkCollision(nextX, nextY) {
            let hw = car.width / 2;
            let hh = car.height / 2;
            
            // 1. Gebäude
            for(let b of mapData.buildings) {
                if(nextX + hw > b.x && nextX - hw < b.x + b.w && nextY + hh > b.y && nextY - hh < b.y + b.h) {
                    return true;
                }
            }
            // 2. Konkurrenzfahrzeuge
            for(let c of competitors) {
                // Konkurrenten als simple Rechtecke (AABB)
                if(nextX + hw > c.x - c.w/2 && nextX - hw < c.x + c.w/2 && 
                   nextY + hh > c.y - c.h/2 && nextY - hh < c.y + c.h/2) {
                    return true;
                }
            }
            return false;
        }

        // --- TOUCH-STEUERUNG (Cleane Kurvenpfeile) ---
        function drawTouchController(activeSector) {
            cctx.clearRect(0, 0, ctrlCanvas.width, ctrlCanvas.height);
            let w = ctrlCanvas.width; let h = ctrlCanvas.height; let cx = w/2; let cy = h/2;

            // Trennlinien
            cctx.strokeStyle = 'rgba(255,255,255,0.2)'; cctx.lineWidth = 2;
            cctx.beginPath(); cctx.moveTo(0, cy); cctx.lineTo(w, cy); cctx.stroke();

            // Sektor-Highlight zeichnen
            function fillSector(start, end, isActive) {
                if(!isActive) return;
                cctx.beginPath(); cctx.moveTo(cx, cy); cctx.arc(cx, cy, w/2, start, end); cctx.lineTo(cx, cy);
                cctx.fillStyle = 'rgba(255, 204, 0, 0.4)'; cctx.fill();
            }

            fillSector(Math.PI, 4*Math.PI/3, activeSector === 0);
            fillSector(4*Math.PI/3, 5*Math.PI/3, activeSector === 1);
            fillSector(5*Math.PI/3, 2*Math.PI, activeSector === 2);
            fillSector(0, Math.PI/3, activeSector === 3);
            fillSector(Math.PI/3, 2*Math.PI/3, activeSector === 4);
            fillSector(2*Math.PI/3, Math.PI, activeSector === 5);

            // Cleane Pfeile zeichnen (Manuelle Pfade)
            cctx.strokeStyle = '#fff';
            cctx.lineWidth = 4;
            cctx.lineCap = 'round';
            cctx.lineJoin = 'round';

            function drawArrowLine(px, py, rotation, type) {
                cctx.save();
                cctx.translate(cx + px, cy + py);
                cctx.rotate(rotation);
                cctx.beginPath();
                if(type === 'straight') {
                    cctx.moveTo(0, 15); cctx.lineTo(0, -15); // Gerade Linie
                    cctx.moveTo(-8, -7); cctx.lineTo(0, -15); cctx.lineTo(8, -7); // Spitze
                } else if (type === 'curveLeft') {
                    // Gebogener Pfeil (Arc)
                    cctx.arc(10, 10, 15, Math.PI, 1.5*Math.PI);
                    cctx.moveTo(10, -5); cctx.lineTo(-5, -5); cctx.lineTo(-5, 10); // Spitze
                } else if (type === 'curveRight') {
                    cctx.arc(-10, 10, 15, 1.5*Math.PI, 2*Math.PI);
                    cctx.moveTo(5, 10); cctx.lineTo(5, -5); cctx.lineTo(-10, -5); // Spitze
                }
                cctx.stroke();
                cctx.restore();
            }

            // Oben (Vorwärts)
            drawArrowLine(-45, -45, 0, 'curveLeft');    // Oben Links
            drawArrowLine(0, -60, 0, 'straight');       // Oben Mitte
            drawArrowLine(45, -45, 0, 'curveRight');    // Oben Rechts
            
            // Unten (Rückwärts)
            drawArrowLine(45, 45, Math.PI, 'curveLeft');    // Unten Rechts (Rückwärts Links)
            drawArrowLine(0, 60, Math.PI, 'straight');      // Unten Mitte
            drawArrowLine(-45, 45, Math.PI, 'curveRight');  // Unten Links (Rückwärts Rechts)
            
            // Äußerer Kreis
            cctx.beginPath(); cctx.arc(cx, cy, w/2 - 2, 0, Math.PI*2); cctx.stroke();
        }
        drawTouchController(-1);

        const ctrlContainer = document.getElementById('touchControllerContainer');
        
        function handleTouch(e) {
            e.preventDefault();
            if (e.touches.length === 0 || gameState.isDelivering) { 
                inputs.fwd = inputs.rev = inputs.left = inputs.right = false;
                drawTouchController(-1);
                return;
            }

            const touch = e.touches[0];
            const rect = ctrlContainer.getBoundingClientRect();
            
            if (touch.clientX >= rect.left && touch.clientX <= rect.right &&
                touch.clientY >= rect.top && touch.clientY <= rect.bottom) {
                
                let dx = touch.clientX - (rect.left + rect.width/2);
                let dy = touch.clientY - (rect.top + rect.height/2);
                
                let angle = Math.atan2(dy, dx); 
                if (angle < 0) angle += 2 * Math.PI;

                inputs.fwd = inputs.rev = inputs.left = inputs.right = false;
                let sector = -1;

                if (angle >= Math.PI && angle < 4*Math.PI/3) { sector = 0; inputs.fwd = true; inputs.left = true; }
                else if (angle >= 4*Math.PI/3 && angle < 5*Math.PI/3) { sector = 1; inputs.fwd = true; }
                else if (angle >= 5*Math.PI/3 && angle <= 2*Math.PI) { sector = 2; inputs.fwd = true; inputs.right = true; }
                else if (angle >= 0 && angle < Math.PI/3) { sector = 3; inputs.rev = true; inputs.right = true; }
                else if (angle >= Math.PI/3 && angle < 2*Math.PI/3) { sector = 4; inputs.rev = true; }
                else if (angle >= 2*Math.PI/3 && angle < Math.PI) { sector = 5; inputs.rev = true; inputs.left = true; }

                drawTouchController(sector);
            }
        }

        ctrlContainer.addEventListener('touchstart', handleTouch, {passive: false});
        ctrlContainer.addEventListener('touchmove', handleTouch, {passive: false});
        ctrlContainer.addEventListener('touchend', () => { inputs.fwd = inputs.rev = inputs.left = inputs.right = false; drawTouchController(-1); });

        // PC Tastatur
        window.addEventListener('keydown', e => {
            if(!gameState.isDelivering) {
                if(e.key === 'ArrowUp') inputs.fwd = true;
                if(e.key === 'ArrowDown') inputs.rev = true;
                if(e.key === 'ArrowLeft') inputs.left = true;
                if(e.key === 'ArrowRight') inputs.right = true;
            }
        });
        window.addEventListener('keyup', e => {
            if(e.key === 'ArrowUp') inputs.fwd = false;
            if(e.key === 'ArrowDown') inputs.rev = false;
            if(e.key === 'ArrowLeft') inputs.left = false;
            if(e.key === 'ArrowRight') inputs.right = false;
        });

        // --- SPIEL-LOGIK UPDATE ---
        function update() {
            // 1. Widersacher bewegen
            for(let c of competitors) {
                if(c.axis === 'x') {
                    c.x += c.speed * c.dir;
                    if(Math.abs(c.x) > c.routeLimit) c.dir *= -1; // Umdrehen am Ende
                } else {
                    c.y += c.speed * c.dir;
                    if(Math.abs(c.y) > c.routeLimit) c.dir *= -1;
                }
            }

            // 2. Zustell-Sequenz
            if (gameState.isDelivering) {
                inputs.fwd = inputs.rev = inputs.left = inputs.right = false; 
                car.speed = 0;
                
                let dx = postman.targetX - postman.x;
                let dy = postman.targetY - postman.y;
                let dist = Math.sqrt(dx*dx + dy*dy);

                if (postman.state === 'to_door') {
                    if (dist > postman.speed) {
                        postman.x += (dx/dist) * postman.speed; postman.y += (dy/dist) * postman.speed;
                    } else {
                        postman.state = 'waiting';
                        document.getElementById('missionInfo').innerText = "An der Tür...";
                    }
                } 
                else if (postman.state === 'waiting') {
                    postman.waitTimer--;
                    if (postman.waitTimer <= 0) {
                        gameState.score++;
                        document.getElementById('scoreDisplay').innerText = `Erfolgreich: ${gameState.score}`;
                        showFloatingText('+1', postman.x, postman.y - 20);
                        postman.state = 'to_car'; postman.targetX = car.x; postman.targetY = car.y;
                        document.getElementById('missionInfo').innerText = "Rückweg...";
                    }
                }
                else if (postman.state === 'to_car') {
                    postman.targetX = car.x; postman.targetY = car.y;
                    if (dist > postman.speed) {
                        postman.x += (dx/dist) * postman.speed; postman.y += (dy/dist) * postman.speed;
                    } else {
                        gameState.isDelivering = false;
                        spawnMission();
                    }
                }
            } else {
                // 3. Normales Fahren
                if (inputs.fwd) { car.speed < 0 ? car.speed += car.braking : car.speed += car.acceleration; } 
                else if (inputs.rev) { car.speed > 0 ? car.speed -= car.braking : car.speed -= car.acceleration; } 
                else { car.speed *= car.friction; }

                car.speed = Math.max(-car.maxReverseSpeed, Math.min(car.maxSpeed, car.speed));
                if(Math.abs(car.speed) < 0.1) car.speed = 0;

                if (Math.abs(car.speed) > 0.1) {
                    car.steeringInput = 0;
                    if (inputs.left) car.steeringInput = -1;
                    if (inputs.right) car.steeringInput = 1;

                    car.steeringAngle += (car.steeringInput * car.maxSteer - car.steeringAngle) * 0.2;
                    let dir = car.speed > 0 ? 1 : -1;
                    car.angle += car.steeringAngle * dir * (Math.abs(car.speed) / car.maxSpeed);
                }

                let nextX = car.x + Math.cos(car.angle - Math.PI / 2) * car.speed;
                let nextY = car.y + Math.sin(car.angle - Math.PI / 2) * car.speed;

                // Kollision
                if (!checkCollision(nextX, nextY)) { car.x = nextX; car.y = nextY; } 
                else { car.speed = 0; } // Crash!

                // Trigger prüfen (Mission)
                if (gameState.mission) {
                    gameState.mission.pulse += 0.05;
                    let m = gameState.mission;
                    let dist = Math.sqrt(Math.pow(car.x - m.triggerX, 2) + Math.pow(car.y - m.triggerY, 2));
                    
                    if (dist < m.radius && Math.abs(car.speed) < 1) { 
                        gameState.isDelivering = true;
                        postman.x = car.x; postman.y = car.y;
                        postman.targetX = m.doorX; postman.targetY = m.doorY;
                        postman.state = 'to_door'; postman.waitTimer = m.type.waitTime;
                        drawTouchController(-1);
                    }
                }
            }

            document.getElementById('speedo').innerText = Math.round(Math.abs(car.speed) * 6) + ' km/h';

            for(let i = gameState.floatingTexts.length - 1; i >= 0; i--) {
                let ft = gameState.floatingTexts[i];
                ft.y -= 1; ft.life--;
                if(ft.life <= 0) gameState.floatingTexts.splice(i, 1);
            }
        }

        // --- ZEICHNEN ---
        function draw() {
            ctx.fillStyle = '#4caf50'; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.save();
            ctx.translate(canvas.width / 2 - car.x, canvas.height / 2 - car.y); 

            // Straßen
            for (let r of mapData.roads) {
                ctx.fillStyle = r.type === 'main' ? '#444' : '#555'; // Hauptstraßen dunkler
                ctx.fillRect(r.x, r.y, r.w, r.h);
                
                // Markierungen
                ctx.fillStyle = '#fff';
                if(r.type === 'main') {
                    if(r.w > r.h) { for(let x=r.x+50; x<r.x+r.w; x+=100) ctx.fillRect(x, r.y + r.h/2 - 2, 50, 4); } 
                    else { for(let y=r.y+50; y<r.y+r.h; y+=100) ctx.fillRect(r.x + r.w/2 - 2, y, 4, 50); }
                }
            }

            // Gebäude
            for (let b of mapData.buildings) {
                ctx.fillStyle = 'rgba(0,0,0,0.3)'; ctx.fillRect(b.x + 8, b.y + 12, b.w, b.h); // Schatten
                ctx.fillStyle = '#8d6e63'; ctx.fillRect(b.x, b.y, b.w, b.h); // Haus
                ctx.strokeStyle = '#3e2723'; ctx.lineWidth = 3; ctx.strokeRect(b.x, b.y, b.w, b.h);
                ctx.fillStyle = '#a1887f'; ctx.fillRect(b.x+10, b.y+10, b.w-20, b.h-20); // Dach
            }

            // Missions-Ziel (Markierung auf der Straße)
            if (gameState.mission && !gameState.isDelivering) {
                let m = gameState.mission;
                ctx.beginPath(); ctx.arc(m.triggerX, m.triggerY, m.radius + Math.sin(m.pulse) * 5, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 204, 0, 0.3)`; ctx.fill();
                ctx.strokeStyle = '#ffcc00'; ctx.lineWidth = 2; ctx.stroke();
                
                // Weg-Linie vom Halo zur Tür zur Orientierung
                ctx.beginPath(); ctx.moveTo(m.triggerX, m.triggerY); ctx.lineTo(m.doorX, m.doorY);
                ctx.strokeStyle = 'rgba(255,255,255,0.3)'; ctx.setLineDash([5, 5]); ctx.stroke(); ctx.setLineDash([]);

                ctx.fillStyle = '#fff'; ctx.font = '24px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillText(m.type.icon, m.triggerX, m.triggerY);
            }

            // Konkurrenzfahrzeuge zeichnen
            for(let c of competitors) {
                ctx.save();
                ctx.translate(c.x, c.y);
                // Wenn sie auf der Y-Achse fahren, müssen sie gedreht werden
                if(c.axis === 'y') ctx.rotate(Math.PI / 2);

                ctx.fillStyle = c.color; 
                ctx.fillRect(-c.w/2, -c.h/2, c.w, c.h); // Karosserie
                ctx.strokeStyle = '#111'; ctx.lineWidth = 2; ctx.strokeRect(-c.w/2, -c.h/2, c.w, c.h);
                // Windschutzscheibe vorne (abhängig von Fahrtrichtung)
                ctx.fillStyle = '#add8e6';
                if(c.dir > 0) ctx.fillRect(c.w/2 - 12, -c.h/2 + 4, 10, c.h - 8);
                else ctx.fillRect(-c.w/2 + 2, -c.h/2 + 4, 10, c.h - 8);
                
                ctx.restore();
            }

            // Spieler Auto zeichnen
            ctx.save();
            ctx.translate(car.x, car.y);
            ctx.rotate(car.angle);
            ctx.fillStyle = '#ffcc00'; ctx.fillRect(-car.width/2, -car.height/2, car.width, car.height);
            ctx.strokeStyle = '#111'; ctx.lineWidth = 2; ctx.strokeRect(-car.width/2, -car.height/2, car.width, car.height);
            ctx.fillStyle = '#1e90ff'; ctx.fillRect(-car.width/2 + 4, -car.height/2 + 8, car.width - 8, 12);
            ctx.fillStyle = '#d32f2f'; ctx.beginPath(); ctx.arc(0, 3, 4, 0, Math.PI*2); ctx.fill();
            
            ctx.fillStyle = '#111';
            const wX = car.width/2 + 1, wY = car.height/2 - 10, wW = 6, wH = 14;
            ctx.fillRect(-wX - wW, wY - wH/2, wW, wH); ctx.fillRect(wX, wY - wH/2, wW, wH);       
            ctx.save(); ctx.translate(-wX - wW/2, -wY); ctx.rotate(car.steeringAngle * 4); ctx.fillRect(-wW/2, -wH/2, wW, wH); ctx.restore(); 
            ctx.save(); ctx.translate(wX + wW/2, -wY); ctx.rotate(car.steeringAngle * 4); ctx.fillRect(-wW/2, -wH/2, wW, wH); ctx.restore(); 
            ctx.restore(); 

            // Postbote zeichnen
            if (gameState.isDelivering) {
                ctx.beginPath(); ctx.arc(postman.x, postman.y, 8, 0, Math.PI * 2);
                ctx.fillStyle = '#ffcc00'; ctx.fill(); ctx.strokeStyle = '#111'; ctx.lineWidth = 2; ctx.stroke();
            }

            // +1 Texte
            for(let ft of gameState.floatingTexts) {
                ctx.fillStyle = `rgba(255, 204, 0, ${ft.life / 60})`;
                ctx.font = 'bold 26px Arial'; ctx.textAlign = 'center'; ctx.fillText(ft.text, ft.x, ft.y);
            }

            ctx.restore(); 

            // Navigationspfeil am Bildschirmrand
            if (gameState.mission && !gameState.isDelivering) {
                let screenX = canvas.width/2 + (gameState.mission.triggerX - car.x);
                let screenY = canvas.height/2 + (gameState.mission.triggerY - car.y);
                let margin = 40;
                
                if (screenX < margin || screenX > canvas.width - margin || screenY < margin || screenY > canvas.height - margin) {
                    let angleToMission = Math.atan2(gameState.mission.triggerY - car.y, gameState.mission.triggerX - car.x);
                    let arrowR = Math.min(canvas.width, canvas.height) / 2 - 60;
                    let arrowX = canvas.width/2 + Math.cos(angleToMission) * arrowR;
                    let arrowY = canvas.height/2 + Math.sin(angleToMission) * arrowR;

                    ctx.save(); ctx.translate(arrowX, arrowY); ctx.rotate(angleToMission);
                    ctx.beginPath(); ctx.moveTo(20, 0); ctx.lineTo(-15, 15); ctx.lineTo(-15, -15);
                    ctx.fillStyle = '#ffcc00'; ctx.fill(); ctx.strokeStyle = '#000'; ctx.lineWidth = 2; ctx.stroke();
                    ctx.restore();
                }
            }
        }

        function loop() { update(); draw(); requestAnimationFrame(loop); }
        loop();
    </script>
</body>
</html>
