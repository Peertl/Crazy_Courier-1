<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DHL Zusteller - GTA City</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background-color: #333; 
            font-family: sans-serif;
            touch-action: none; 
        }
        canvas { 
            display: block; 
        }
        #ui { 
            position: absolute; 
            top: 10px; 
            left: 10px; 
            color: white; 
            background: rgba(0, 0, 0, 0.7);
            padding: 10px;
            border-radius: 8px;
            pointer-events: none; 
        }
        #speedo {
            font-size: 20px;
            color: #ffcc00;
        }
    </style>
</head>
<body>

    <div id="ui">
        <h3 style="margin: 0 0 5px 0;">DHL GTA City</h3>
        <p style="margin: 3px 0; font-size: 12px;"><strong>PC:</strong> Pfeiltasten</p>
        <p style="margin: 3px 0; font-size: 12px;"><strong>Handy:</strong> Drag in Fahrtrichtung</p>
        <div id="speedo">0 km/h</div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // --- WELT & STADT-LAYOUT ---
        const worldBounds = { minX: -2000, minY: -2000, maxX: 2000, maxY: 2000, width: 4000, height: 4000 };
        
        // Geländetypen definieren (für Reibung und Kollision)
        const TERRAIN = {
            GRASS: { color: '#4caf50', friction: 0.85, canDrive: true },
            ASPHALT: { color: '#555', friction: 0.94, canDrive: true }, // Hauptstraßen
            SIDEWALK: { color: '#aaa', friction: 0.88, canDrive: true }, // Gehwege / Gassen
            PEDESTRIAN: { color: '#d7ccc8', friction: 0.90, canDrive: true }, // Fußgängerzone
            BUILDING: { color: '#777', friction: 0.1, canDrive: false } // Hindernisse (Solid)
        };

        // Straßennetz definieren
        const roads = [
            // --- CITY RING ---
            { x: -1000, y: -1000, w: 2000, h: 50, type: TERRAIN.ASPHALT }, // Oben
            { x: -1000, y: 1000, w: 2000, h: 50, type: TERRAIN.ASPHALT },  // Unten
            { x: -1000, y: -1000, w: 50, h: 2050, type: TERRAIN.ASPHALT }, // Links
            { x: 1000, y: -1000, w: 50, h: 2050, type: TERRAIN.ASPHALT },  // Rechts

            // Hauptverkehrsadern (Asphalt)
            { x: -2000, y: -25, w: 4000, h: 50, type: TERRAIN.ASPHALT },  // West-Ost Achse
            { x: -25, y: -2000, w: 50, h: 4000, type: TERRAIN.ASPHALT },  // Nord-Süd Achse

            // Gassen und engere Wege (SIDEWALK / PEDESTRIAN)
            // Innenstadt (innerhalb City Ring)
            { x: -300, y: -300, w: 600, h: 600, type: TERRAIN.PEDESTRIAN }, // Fußgängerzone Zentrum
            { x: -300, y: -1000, w: 30, h: 700, type: TERRAIN.SIDEWALK },  // Gasse Nord
            { x: 300, y: -1000, w: 30, h: 700, type: TERRAIN.SIDEWALK },   // Gasse Nord
            { x: -1000, y: 300, w: 700, h: 30, type: TERRAIN.SIDEWALK },   // Gasse West
            { x: 300, y: 300, w: 700, h: 30, type: TERRAIN.SIDEWALK },    // Gasse Ost

            // Vorstadt Gassen (Scattered)
            { x: -1800, y: -1500, w: 300, h: 20, type: TERRAIN.SIDEWALK },
            { x: 1500, y: 1200, w: 20, h: 400, type: TERRAIN.SIDEWALK },
        ];

        // Gebäude definieren
        const buildings = [];
        function addBuildingBlock(x, y, w, h) {
            buildings.push({ x: x, y: y, w: w, h: h });
        }

        // Innenstadt Blöcke
        for(let i=0; i<3; i++) {
            for(let j=0; j<3; j++) {
                if(i==1 && j==1) continue; // Zentrum frei lassen (Pedestrian Zone)
                addBuildingBlock(-900 + i*600, -900 + j*600, 400, 400); // Große Blöcke
                addBuildingBlock(-450 + i*600, -900 + j*600, 100, 400); // Kleinere Lücken-Gebäude
            }
        }

        // Vorstadt Einfamilienhäuser (Scattered)
        for(let i=0; i<40; i++) {
            let x = Math.random() < 0.5 ? Math.random()*-800-1100 : Math.random()*800+1100;
            let y = Math.random() < 0.5 ? Math.random()*-800-1100 : Math.random()*800+1100;
            addBuildingBlock(x, y, 40 + Math.random()*30, 40 + Math.random()*30);
        }


        // --- EINGABE-LOGIK ---
        const keys = { ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false };
        window.addEventListener('keydown', e => { if(keys.hasOwnProperty(e.key)) keys[e.key] = true; });
        window.addEventListener('keyup', e => { if(keys.hasOwnProperty(e.key)) keys[e.key] = false; });

        // Überarbeitete Touch-Steuerung (Follow Drag Direction)
        const touchCtrl = {
            active: false,
            startX: 0, startY: 0,
            currentX: 0, currentY: 0,
            maxRadius: 80 // Empfindlichkeit des Joysticks
        };

        canvas.addEventListener('touchstart', e => {
            e.preventDefault();
            const touch = e.touches[0];
            touchCtrl.active = true;
            touchCtrl.startX = touch.clientX;
            touchCtrl.startY = touch.clientY;
            touchCtrl.currentX = touch.clientX;
            touchCtrl.currentY = touch.clientY;
        }, { passive: false });

        canvas.addEventListener('touchmove', e => {
            e.preventDefault();
            if (!touchCtrl.active) return;
            const touch = e.touches[0];
            touchCtrl.currentX = touch.clientX;
            touchCtrl.currentY = touch.clientY;
        }, { passive: false });

        canvas.addEventListener('touchend', e => {
            e.preventDefault();
            touchCtrl.active = false;
        }, { passive: false });


        // --- FAHRZEUG (Street Scooter) ---
        const car = {
            x: 0, y: 0,           // Start im Zentrum
            width: 25, height: 50,
            angle: 0,             
            speed: 0,
            maxSpeed: 8,
            acceleration: 0.2,
            currentFriction: 0.94,
            steeringAngle: 0,     
            maxSteeringAngle: 0.5 // Etwas trägere Lenkung
        };

        // Kollisions-Check für Gebäude
        function checkCollision(x, y) {
            // Auto als vereinfachtes Rechteck (leicht kleiner für Fairplay)
            let halfW = car.width / 2 * 0.8;
            let halfH = car.height / 2 * 0.8;
            
            for (let b of buildings) {
                // Einfacher AABB Kollisions-Check
                if (x + halfW > b.x && x - halfW < b.x + b.w &&
                    y + halfH > b.y && y - halfH < b.y + b.h) {
                    return true;
                }
            }
            return false;
        }

        // --- SPIEL-LOGIK ---
        function update() {
            let isAccelerating = keys.ArrowUp;
            let isReversing = keys.ArrowDown;
            let steeringInput = 0; 

            // Neue Touch-Steuerung auswerten
            if (touchCtrl.active) {
                let dx = touchCtrl.currentX - touchCtrl.startX;
                let dy = touchCtrl.currentY - touchCtrl.startY;
                let distance = Math.sqrt(dx * dx + dy * dy);

                if (distance > 10) { // Deadzone
                    // Vektor-Winkel berechnen
                    // (Math.atan2 gibt den Winkel relativ zur X-Achse zurück)
                    // Wir müssen ihn an unser GTA-System anpassen (0 Grad = Oben)
                    let touchAngle = Math.atan2(dy, dx) + Math.PI / 2;
                    
                    // Normalisiere den Winkel auf 0 bis 2*PI
                    while(touchAngle < 0) touchAngle += Math.PI * 2;
                    while(touchAngle > Math.PI * 2) touchAngle -= Math.PI * 2;

                    // Die Differenz zwischen gewünschter (Touch) und aktueller (Auto) Fahrtrichtung
                    let angleDiff = touchAngle - car.angle;

                    // Den kürzesten Drehweg berechnen
                    while (angleDiff > Math.PI) angleDiff -= Math.PI * 2;
                    while (angleDiff < -Math.PI) angleDiff += Math.PI * 2;

                    // Wir interpretieren die Entfernung des Fingers als Gaspedal (nur vorwärts)
                    // (Max speed erreicht bei maxRadius)
                    let inputIntensity = Math.min(distance / touchCtrl.maxRadius, 1);
                    car.speed += car.acceleration * inputIntensity * 1.5; // Schnellerer Boost für Touch

                    // Lenkeinschlag basierend auf Winkel-Differenz berechnen
                    // Wenn die Differenz groß ist (z.B. > 90 Grad), lenken wir maximal
                    const maxLenkDiff = Math.PI / 2; // 90 Grad
                    steeringInput = angleDiff / maxLenkDiff;
                    steeringInput = Math.max(-1, Math.min(1, steeringInput));

                }
            } else {
                // Tastatur-Eingaben
                if (keys.ArrowLeft) steeringInput = -1;
                if (keys.ArrowRight) steeringInput = 1;
                if (isAccelerating) car.speed += car.acceleration;
                if (isReversing) car.speed -= car.acceleration;
            }

            // 1. Reibung bestimmen
            let currentTerrain = TERRAIN.GRASS;
            for (let r of roads) {
                if (car.x >= r.x && car.x <= r.x + r.w && car.y >= r.y && car.y <= r.y + r.h) {
                    currentTerrain = r.type;
                    break;
                }
            }
            car.currentFriction = currentTerrain.friction;

            // 2. Reibung und Speed begrenzen
            car.speed *= car.currentFriction;
            car.speed = Math.max(-car.maxSpeed/2, Math.min(car.maxSpeed, car.speed)); // Rückwärts langsamer
            if(Math.abs(car.speed) < 0.05) car.speed = 0; // Totstellen

            // 3. Lenkung anwenden (Nur wenn wir fahren)
            if (Math.abs(car.speed) > 0.1) {
                let targetSteeringAngle = steeringInput * car.maxSteeringAngle;
                car.steeringAngle += (targetSteeringAngle - car.steeringAngle) * 0.15;
                
                let direction = car.speed > 0 ? 1 : -1;
                // Rückwärtsfahren kehrt die Lenkrichtung um
                car.angle += car.steeringAngle * (Math.abs(car.speed) / car.maxSpeed) * direction;
            } else {
                car.steeringAngle *= 0.8;
            }

            // 4. Bewegung simulieren und Kollision prüfen
            let nextX = car.x + Math.cos(car.angle - Math.PI / 2) * car.speed;
            let nextY = car.y + Math.sin(car.angle - Math.PI / 2) * car.speed;
            
            // Kollisions-Check (sehr simpel)
            if (!checkCollision(nextX, nextY)) {
                car.x = nextX;
                car.y = nextY;
            } else {
                // Kollision! Stehenbleiben
                car.speed = 0;
            }

            // Auto in Weltgrenzen halten
            car.x = Math.max(worldBounds.minX, Math.min(worldBounds.maxX, car.x));
            car.y = Math.max(worldBounds.minY, Math.min(worldBounds.maxY, car.y));

            // UI Speedometer aktualisieren
            document.getElementById('speedo').innerText = Math.round(Math.abs(car.speed) * 4) + ' km/h';
        }

        // --- ZEICHNEN ---
        function draw() {
            // Hintergrund (Wiese)
            ctx.fillStyle = TERRAIN.GRASS.color;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.save();
            ctx.translate(canvas.width / 2 - car.x, canvas.height / 2 - car.y);

            // Alle Straßen zeichnen
            for (let r of roads) {
                ctx.fillStyle = r.type.color;
                ctx.fillRect(r.x, r.y, r.w, r.h);
                
                // Straßenmarkierungen auf Asphalt
                if(r.type === TERRAIN.ASPHALT && r.w > 30 && r.h > 30) {
                    ctx.fillStyle = '#fff';
                    if(r.w > r.h) { // Horizontale Straße
                        for(let x=r.x+20; x<r.x+r.w-20; x+=60) ctx.fillRect(x, r.y + r.h/2 - 1, 30, 2);
                    } else { // Vertikale Straße
                        for(let y=r.y+20; y<r.y+r.h-20; y+=60) ctx.fillRect(r.x + r.w/2 - 1, y, 2, 30);
                    }
                }
            }

            // Gebäude zeichnen
            ctx.fillStyle = TERRAIN.BUILDING.color;
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 2;
            for (let b of buildings) {
                ctx.fillRect(b.x, b.y, b.w, b.h);
                ctx.strokeRect(b.x, b.y, b.w, b.h);
            }

            // --- AUTO ZEICHNEN ---
            ctx.save();
            ctx.translate(car.x, car.y);
            ctx.rotate(car.angle);

            // Karosserie
            ctx.fillStyle = '#ffcc00';
            ctx.fillRect(-car.width / 2, -car.height / 2, car.width, car.height);
            
            // Windschutzscheibe (Blau)
            ctx.fillStyle = '#1e90ff';
            ctx.fillRect(-car.width / 2 + 2, -car.height / 2 + 5, car.width - 4, 10);

            // Posthorn
            ctx.fillStyle = '#d32f2f';
            ctx.beginPath(); ctx.arc(0, 3, 4, 0, Math.PI * 2); ctx.fill();

            // Räder
            ctx.fillStyle = '#111';
            const wheelW = 5, wheelH = 12;
            const wheelOffsetX = car.width / 2 + 1, wheelOffsetY = car.height / 2 - 8;

            ctx.fillRect(-wheelOffsetX - wheelW, wheelOffsetY - wheelH / 2, wheelW, wheelH); 
            ctx.fillRect(wheelOffsetX, wheelOffsetY - wheelH / 2, wheelW, wheelH);           

            ctx.save();
            ctx.translate(-wheelOffsetX - wheelW / 2, -wheelOffsetY); ctx.rotate(car.steeringAngle); ctx.fillRect(-wheelW / 2, -wheelH / 2, wheelW, wheelH); ctx.restore();
            ctx.save();
            ctx.translate(wheelOffsetX + wheelW / 2, -wheelOffsetY); ctx.rotate(car.steeringAngle); ctx.fillRect(-wheelW / 2, -wheelH / 2, wheelW, wheelH); ctx.restore();

            ctx.restore(); // Auto Ende
            ctx.restore(); // Kamera Ende

            // --- UI LAYER (Joystick & Map) ---

            // 1. Touch Joystick
            if (touchCtrl.active) {
                ctx.beginPath(); ctx.arc(touchCtrl.startX, touchCtrl.startY, touchCtrl.maxRadius, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.1)'; ctx.fill();
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)'; ctx.lineWidth = 2; ctx.stroke();

                let dx = touchCtrl.currentX - touchCtrl.startX;
                let dy = touchCtrl.currentY - touchCtrl.startY;
                let dist = Math.sqrt(dx * dx + dy * dy);
                if (dist > touchCtrl.maxRadius) {
                    dx = (dx / dist) * touchCtrl.maxRadius;
                    dy = (dy / dist) * touchCtrl.maxRadius;
                }
                ctx.beginPath(); ctx.arc(touchCtrl.startX + dx, touchCtrl.startY + dy, 30, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 204, 0, 0.8)'; ctx.fill();
            }

            // 2. Mini-Map (unten links)
            const mapSize = 180;
            const mapX = 15;
            const mapY = canvas.height - mapSize - 15;
            const scaleX = mapSize / worldBounds.width;
            const scaleY = mapSize / worldBounds.height;

            ctx.fillStyle = 'rgba(0, 0, 0, 0.7)'; ctx.fillRect(mapX, mapY, mapSize, mapSize);
            ctx.strokeStyle = '#fff'; ctx.lineWidth = 1; ctx.strokeRect(mapX, mapY, mapSize, mapSize);

            // Straßen auf Minikarte
            for (let r of roads) {
                ctx.fillStyle = r.type === TERRAIN.ASPHALT ? '#777' : '#555'; // Gassen dunkler
                ctx.fillRect(mapX + (r.x - worldBounds.minX) * scaleX, mapY + (r.y - worldBounds.minY) * scaleY, r.w * scaleX, r.h * scaleY);
            }

            // Gebäude auf Minikarte
            ctx.fillStyle = '#444';
            for (let b of buildings) {
                ctx.fillRect(mapX + (b.x - worldBounds.minX) * scaleX, mapY + (b.y - worldBounds.minY) * scaleY, b.w * scaleX, b.h * scaleY);
            }

            // Viewport & Car
            let viewW = canvas.width * scaleX, viewH = canvas.height * scaleY;
            let viewX = mapX + ((car.x - canvas.width/2) - worldBounds.minX) * scaleX;
            let viewY = mapY + ((car.y - canvas.height/2) - worldBounds.minY) * scaleY;
            ctx.strokeStyle = '#ffcc00'; ctx.lineWidth = 2; ctx.strokeRect(viewX, viewY, viewW, viewH);

            let miniCarX = mapX + (car.x - worldBounds.minX) * scaleX;
            let miniCarY = mapY + (car.y - worldBounds.minY) * scaleY;
            ctx.fillStyle = 'red'; ctx.beginPath(); ctx.arc(miniCarX, miniCarY, 3, 0, Math.PI * 2); ctx.fill();
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }

        loop();
    </script>
</body>
</html>
