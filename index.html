<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DHL GTA - Aggressive KI & Rechtsverkehr</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #2c2c2c; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; touch-action: none; user-select: none; -webkit-user-select: none; }
        canvas { display: block; }
        
        .overlay-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 100; display: flex; flex-direction: column;
            align-items: center; justify-content: center; color: white;
        }
        .vehicle-btn, .action-btn {
            background: #ffcc00; color: #111; border: none; padding: 15px 30px; font-size: 18px;
            font-weight: bold; margin: 10px; border-radius: 8px; cursor: pointer; width: 250px; text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3); transition: transform 0.1s;
        }
        .vehicle-btn:active, .action-btn:active { transform: scale(0.95); }
        .vehicle-btn:hover, .action-btn:hover { background: #e6b800; }
        
        input[type="text"] { padding: 10px; font-size: 16px; width: 250px; border-radius: 5px; border: 2px solid #ffcc00; margin-bottom: 10px; text-align: center; outline: none; box-sizing: border-box; }

        #ui { 
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 600px;
            background: rgba(20, 20, 20, 0.85); backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px);
            border: 2px solid #ffcc00; border-top: 4px solid #d40511;
            border-radius: 12px; padding: 10px 20px;
            display: flex; justify-content: space-between; align-items: center;
            color: white; z-index: 10; pointer-events: none;
            box-shadow: 0 6px 20px rgba(0,0,0,0.6); display: none;
            box-sizing: border-box;
        }
        .ui-col { display: flex; flex-direction: column; }
        .ui-center { align-items: center; text-align: center; }
        .ui-right { align-items: flex-end; text-align: right; }
        .ui-val { font-size: 18px; font-weight: bold; color: #fff; margin-top: 2px; }
        .ui-lbl { font-size: 11px; color: #ffcc00; text-transform: uppercase; letter-spacing: 1px; }
        .ui-highlight { color: #ffeb3b; }
        
        #restartBtn { position: absolute; bottom: 20px; left: 20px; background: #d40511; color: white; border: 2px solid #fff; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; z-index: 10; display: none; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }

        .task-ui { display: none; position: absolute; top: 25%; left: 50%; transform: translate(-50%, 0); background: #fff; border: 4px solid #ffcc00; padding: 15px; border-radius: 12px; z-index: 50; text-align: center; box-shadow: 0 15px 40px rgba(0,0,0,0.7); }
        .task-ui h3 { color: #111; margin: 0 0 10px 0; font-size: 18px; }
        #sigCanvas { border: 2px dashed #ccc; background: #f9f9f9; cursor: crosshair; touch-action: none; border-radius: 6px; }
        .confirm-btn { background: #ffcc00; border: none; padding: 12px; width: 100%; font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 10px; border-radius: 6px; }

        #touchControllerContainer { position: absolute; bottom: 20px; right: 20px; width: 220px; height: 220px; background: rgba(0, 0, 0, 0.4); border-radius: 50%; z-index: 10; border: 2px solid rgba(255, 255, 255, 0.2); box-shadow: 0 0 20px rgba(0,0,0,0.6); display: none; }
        #touchControllerCanvas { width: 100%; height: 100%; }

        #leaderboardList { list-style: none; padding: 0; margin: 15px 0; text-align: left; width: 360px; background: rgba(255,255,255,0.1); border-radius: 8px; padding: 10px; border: 1px solid rgba(255,204,0,0.3); }
        #leaderboardList li { padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.1); font-size: 15px; line-height: 1.4; }
        #leaderboardList li:last-child { border-bottom: none; }
    </style>
</head>
<body>

    <audio id="gameMusic" src="MV1_P&P_-_Ein_Team_(Instrumental)_[V2].mp3" preload="auto"></audio>

    <div id="startScreen" class="overlay-screen">
        <h1 style="color: #ffcc00; margin-bottom: 5px;">DHL Zustell-Simulator</h1>
        <p style="margin-top: 0; color: #ccc;">Die Schicht endet, wenn der Song vorbei ist!</p>
        <button class="vehicle-btn" onclick="startGame('bike')">🚲 Post-Fahrrad (Trike)</button>
        <button class="vehicle-btn" onclick="startGame('scooter')">🚗 Street Scooter</button>
        <button class="vehicle-btn" onclick="startGame('transporter')">🚚 Paket-Transporter</button>
    </div>

    <div id="gameOverScreen" class="overlay-screen" style="display: none;">
        <h1 style="color: #ffcc00; margin-bottom: 5px;">Schicht beendet!</h1>
        <h2>Zugestellte Sendungen: <span id="finalScoreDisplay">0</span></h2>
        
        <div id="playerNameArea" style="display: block; text-align: center;">
            <input type="text" id="playerName" placeholder="Dein Name" maxlength="15">
            <br>
            <button class="action-btn" id="saveScoreBtn" onclick="saveScore()">In Bestenliste eintragen</button>
        </div>

        <ul id="leaderboardList"></ul>
        <button class="action-btn" onclick="location.reload()">Zurück zum Menü</button>
    </div>

    <div id="ui">
        <div class="ui-col">
            <span class="ui-lbl">Tempo</span>
            <span class="ui-val" id="speedo">0 km/h</span>
        </div>
        <div class="ui-col ui-center">
            <span class="ui-val ui-highlight" id="timerDisplay">🎵 Lädt...</span>
            <span class="ui-lbl" id="missionInfo" style="margin-top: 3px; font-weight: bold; color: #fff;">Warte auf Einsatz...</span>
        </div>
        <div class="ui-col ui-right">
            <span class="ui-lbl">Zustellungen</span>
            <span class="ui-val" id="scoreDisplay">0</span>
        </div>
    </div>
    
    <button id="restartBtn" onclick="location.reload()">Neustart</button>

    <div id="signatureUI" class="task-ui">
        <h3>Empfänger-Unterschrift</h3>
        <canvas id="sigCanvas" width="280" height="120"></canvas>
        <button class="confirm-btn" onclick="confirmSignature()">Bestätigen</button>
    </div>

    <div id="keyboardPackageUI" class="task-ui">
        <h3>Name des Empfängers</h3>
        <input type="text" id="recipientName" placeholder="Mind. 3 Buchstaben" autocomplete="off">
        <button class="confirm-btn" onclick="confirmName()">Bestätigen</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div id="touchControllerContainer">
        <canvas id="touchControllerCanvas" width="220" height="220"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas'); const ctx = canvas.getContext('2d');
        const ctrlCanvas = document.getElementById('touchControllerCanvas'); const cctx = ctrlCanvas.getContext('2d');
        const bgMusic = document.getElementById('gameMusic');
        let gameActive = false; let frameCount = 0;
        
        let isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
        let deviceType = isMobile ? 'Handy' : 'PC';

        // Lade Assets
        const postmanImgs = {
            post: { letter: { left: new Image(), right: new Image() }, parcel: { left: new Image(), right: new Image() }, solo: { left: new Image(), right: new Image() } },
            dhl: { parcel: { left: new Image(), right: new Image() }, solo: { left: new Image(), right: new Image() } },
            attackers: {
                amazon: { throwing: new Image(), after_throw: new Image() },
                dpd: { throwing: new Image(), after_throw: new Image() },
                fedex: { throwing: new Image(), after_throw: new Image() },
                gls: { throwing: new Image(), after_throw: new Image() },
                ups: { throwing: new Image(), after_throw: new Image() }
            }
        };

        const imgBike = new Image(); imgBike.src = 'Bike.png';
        const imgScooter = new Image(); imgScooter.src = 'Street-Scooter.png'; 
        const imgTransporter = new Image(); imgTransporter.src = 'Transporter.png';
        const imgBikeLeftLeg = new Image(); imgBikeLeftLeg.src = 'Bike-Left-Leg.png';
        const imgBikeRightLeg = new Image(); imgBikeRightLeg.src = 'Bike-Right-Leg.png';
        const imgBikeLeftTurn = new Image(); imgBikeLeftTurn.src = 'Bike-Left-Turn.png';
        const imgBikeRightTurn = new Image(); imgBikeRightTurn.src = 'Bike-Right-Turn.png';
        const imgBikeDismounted = new Image(); imgBikeDismounted.src = 'Bike-dismounted.png';
        
        const imgFedExDrive = new Image(); imgFedExDrive.src = 'FedEx-Drive.png'; const imgFedExStop = new Image(); imgFedExStop.src = 'FedEx-Stop.png';
        const imgUPSDrive = new Image(); imgUPSDrive.src = 'UPS-Drive.png'; const imgUPStop = new Image(); imgUPStop.src = 'UPS-Stop.png';
        const imgAmazonDrive = new Image(); imgAmazonDrive.src = 'Amazon-Drive.png'; const imgAmazonStop = new Image(); imgAmazonStop.src = 'Amazon-Stop.png';
        const imgDPDDrive = new Image(); imgDPDDrive.src = 'DPD-Drive.png'; const imgDPDDrive1 = new Image(); imgDPDDrive1.src = 'DPD-Drive-1.png';
        const imgGLSDrive = new Image(); imgGLSDrive.src = 'GLS-Drive.png'; const imgGLSStop = new Image(); imgGLSStop.src = 'GLS-Stop.png';

        postmanImgs.post.letter.left.src = 'Post-Zusteller-Letter-Left.png'; postmanImgs.post.letter.right.src = 'Post-Zusteller-Letter-Right.png'; postmanImgs.post.parcel.left.src = 'Post-Zusteller-Parcel-Left.png'; postmanImgs.post.parcel.right.src = 'Post-Zusteller-Parcel-Right.png'; postmanImgs.post.solo.left.src = 'Post-Zusteller-Solo-Left.png'; postmanImgs.post.solo.right.src = 'Post-Zusteller-Solo-Right.png'; postmanImgs.dhl.parcel.left.src = 'DHL-Zusteller-Parcel-Left.png'; postmanImgs.dhl.parcel.right.src = 'DHL-Zusteller-Parcel-Right.png'; postmanImgs.dhl.solo.left.src = 'DHL-Zusteller-Solo-Left.png'; postmanImgs.dhl.solo.right.src = 'DHL-Zusteller-Solo-Right.png';
        postmanImgs.attackers.amazon.throwing.src = 'Konkurrent_Amazon_throwing.png'; postmanImgs.attackers.amazon.after_throw.src = 'Konkurrent_Amazon_after_throw.png'; postmanImgs.attackers.dpd.throwing.src = 'Konkurrent_DPD_throwing.png'; postmanImgs.attackers.dpd.after_throw.src = 'Konkurrent_DPD_after_throw.png'; postmanImgs.attackers.fedex.throwing.src = 'Konkurrent_FedEx_throwing.png'; postmanImgs.attackers.fedex.after_throw.src = 'Konkurrent_FedEx_after_throw.png'; postmanImgs.attackers.gls.throwing.src = 'Konkurrent_GLS_throwing.png'; postmanImgs.attackers.gls.after_throw.src = 'Konkurrent_GLS_after_throw.png'; postmanImgs.attackers.ups.throwing.src = 'Konkurrent_UPS_throwing.png'; postmanImgs.attackers.ups.after_throw.src = 'Konkurrent_UPS_after_throw.png';

        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();

        const VEHICLES = {
            bike: { l: 80, w: 35, maxSpeed: 1.25, displaySpeed: 25, acceleration: 0.1, braking: 0.15, maxSteer: 0.02, offroadFriction: 0.7, type: 'bike', name: 'Fahrrad' },
            scooter: { l: 100, w: 42, maxSpeed: 2.25, displaySpeed: 50, acceleration: 0.15, braking: 0.20, maxSteer: 0.04, offroadFriction: 0.9, type: 'scooter', name: 'Verbund' },
            transporter: { l: 125, w: 48, maxSpeed: 2.75, displaySpeed: 50, acceleration: 0.12, braking: 0.15, maxSteer: 0.025, offroadFriction: 0.92, type: 'transporter', name: 'Paket' }
        };

        const car = { x: 0, y: 0, l: 65, w: 32, angle: 0, speed: 0, maxSpeed: 2.25, displaySpeed: 50, acceleration: 0.15, braking: 0.2, maxSteer: 0.04, offroadFriction: 0.9, type: 'scooter', name: 'Verbund', steeringAngle: 0, currentFriction: 0.96 };

        const mapData = { roads: [], curves: [], sidewalks: [], buildings: [], fences: [], trees: [], garages: [] };
        const roadW = 160; const gridSteps = [-2000, -1000, 0, 1000, 2000]; 
        const competitors = []; 
        let projectiles = [];
        
        const houseColors = ['#8d6e63', '#a1887f', '#bcaaa4', '#795548', '#d7ccc8', '#9e9e9e'];
        const roofColors = ['#5d4037', '#4e342e', '#3e2723', '#424242'];

        // --- KI SPAWN LOGIK MIT KORREKTEM RECHTSVERKEHR ---
        function spawnSingleAI() {
            const brandList = ['fedex', 'ups', 'amazon', 'dpd', 'gls'];
            let onXAxis = Math.random() < 0.5; 
            let line = gridSteps[Math.floor(Math.random() * gridSteps.length)];
            let validSpawn = false; let aiX, aiY; let dir, dirX, dirY;
            
            while(!validSpawn) {
                let startPos = (Math.random() * 4000) - 2000; 
                dir = Math.random() > 0.5 ? 1 : -1;
                
                // Korrekter Rechtsverkehr!
                // Horizontale Straße (onXAxis): Richtung Rechts (+X) fährt auf der Unterseite (+Y). Richtung Links (-X) fährt auf der Oberseite (-Y).
                // Vertikale Straße (!onXAxis): Richtung Runter (+Y) fährt auf der linken Seite (-X). Richtung Hoch (-Y) fährt auf der rechten Seite (+X).
                if (onXAxis) {
                    aiX = startPos;
                    aiY = line + (dir > 0 ? 40 : -40); 
                    dirX = dir; dirY = 0;
                } else {
                    aiX = line + (dir > 0 ? -40 : 40); 
                    aiY = startPos;
                    dirX = 0; dirY = dir;
                }
                
                if (Math.hypot(aiX - car.x, aiY - car.y) > 600) validSpawn = true;
            }
            
            let brand = brandList[Math.floor(Math.random() * brandList.length)];
            // Winkel exakt an Richtung anpassen
            let angle = 0;
            if (dirX === 1) angle = 0;
            if (dirX === -1) angle = Math.PI;
            if (dirY === 1) angle = Math.PI/2;
            if (dirY === -1) angle = -Math.PI/2;

            return {
                id: Math.random(),
                x: aiX, y: aiY, l: 121, w: 46,
                speed: 2 + Math.random(), baseSpeed: 2 + Math.random(),
                dirX: dirX, dirY: dirY,
                angle: angle, baseAngle: angle,
                brand: brand,
                dpdVar: (brand === 'dpd') ? (Math.random() < 0.5 ? 1 : 2) : 0,
                state: 'driving', timer: 0
            };
        }

        function initMapAndAI() {
            mapData.roads = []; mapData.curves = []; mapData.sidewalks = []; mapData.buildings = []; mapData.fences = []; mapData.trees = []; mapData.garages = []; projectiles = [];
            competitors.length = 0;
            for(let pos of gridSteps) { mapData.roads.push({ x: -2500, y: pos - roadW/2, w: 5000, h: roadW }); mapData.roads.push({ x: pos - roadW/2, y: -2500, w: roadW, h: 5000 }); }
            let rW2 = roadW/2;
            mapData.curves.push({ cx: -2000, cy: -2000, r: rW2, start: Math.PI, end: 1.5*Math.PI }); mapData.curves.push({ cx: 2000, cy: -2000, r: rW2, start: 1.5*Math.PI, end: 2*Math.PI });
            mapData.curves.push({ cx: 2000, cy: 2000, r: rW2, start: 0, end: 0.5*Math.PI }); mapData.curves.push({ cx: -2000, cy: 2000, r: rW2, start: 0.5*Math.PI, end: Math.PI });
            for(let i=0; i<gridSteps.length-1; i++) {
                for(let j=0; j<gridSteps.length-1; j++) {
                    let startX = gridSteps[i] + rW2; let startY = gridSteps[j] + rW2;
                    let width = gridSteps[i+1] - gridSteps[i] - roadW; let height = gridSteps[j+1] - gridSteps[j] - roadW;
                    mapData.sidewalks.push({ x: startX, y: startY, w: width, h: height });
                    let pad = 35; let blockX = startX + pad; let blockY = startY + pad; let blockW = width - pad*2; let blockH = height - pad*2;
                    mapData.fences.push({ x: blockX, y: blockY, w: blockW, h: 4 }); mapData.fences.push({ x: blockX, y: blockY+blockH-4, w: blockW, h: 4 });
                    mapData.fences.push({ x: blockX, y: blockY, w: 4, h: blockH }); mapData.fences.push({ x: blockX+blockW-4, y: blockY, w: 4, h: blockH });
                    let hSize = 100; let gap = 160;
                    for(let ix = blockX + 20; ix < blockX + blockW - 120; ix += gap) {
                        let c1 = houseColors[Math.floor(Math.random()*houseColors.length)]; let r1 = roofColors[Math.floor(Math.random()*roofColors.length)];
                        mapData.buildings.push({ id: Math.random(), x: ix, y: blockY + 5, w: hSize, h: hSize, doorX: ix+hSize/2, doorY: blockY+5, haloX: ix+hSize/2, haloY: blockY - 25, color: c1, roofColor: r1, rType: 'h' });
                        if(Math.random()>0.5) mapData.garages.push({ x: ix+hSize, y: blockY+5, w: 40, h: 60, dir: 'up' });
                        let c2 = houseColors[Math.floor(Math.random()*houseColors.length)]; let r2 = roofColors[Math.floor(Math.random()*roofColors.length)];
                        mapData.buildings.push({ id: Math.random(), x: ix, y: blockY + blockH - hSize - 5, w: hSize, h: hSize, doorX: ix+hSize/2, doorY: blockY+blockH-5, haloX: ix+hSize/2, haloY: blockY+blockH + 25, color: c2, roofColor: r2, rType: 'h' });
                        if(Math.random()>0.5) mapData.garages.push({ x: ix+hSize, y: blockY+blockH-65, w: 40, h: 60, dir: 'down' });
                    }
                    for(let iy = blockY + gap; iy < blockY + blockH - gap; iy += gap) {
                        let c3 = houseColors[Math.floor(Math.random()*houseColors.length)]; let r3 = roofColors[Math.floor(Math.random()*roofColors.length)];
                        mapData.buildings.push({ id: Math.random(), x: blockX + 5, y: iy, w: hSize, h: hSize, doorX: blockX+5, doorY: iy+hSize/2, haloX: blockX - 25, haloY: iy+hSize/2, color: c3, roofColor: r3, rType: 'v' });
                        let c4 = houseColors[Math.floor(Math.random()*houseColors.length)]; let r4 = roofColors[Math.floor(Math.random()*roofColors.length)];
                        mapData.buildings.push({ id: Math.random(), x: blockX + blockW - hSize - 5, y: iy, w: hSize, h: hSize, doorX: blockX+blockW-5, doorY: iy+hSize/2, haloX: blockX+blockW + 25, haloY: iy+hSize/2, color: c4, roofColor: r4, rType: 'v' });
                    }
                    for(let t=0; t<5; t++) { mapData.trees.push({ x: blockX + 150 + Math.random()*(blockW-300), y: blockY + 150 + Math.random()*(blockH-300), r: 15 + Math.random()*15 }); }
                }
            }
            // 16 Konkurrenten
            for(let i=0; i<16; i++) { competitors.push(spawnSingleAI()); }
        }

        const gameState = { score: 0, isDelivering: false, brakingForMission: false, mission: null, lastMissionBId: null, floatingTexts: [], cooldown: 0 };
        const MISSION_TYPES = [ { name: 'Brief', waitTime: 0, color: '#fff', icon: '✉️' }, { name: 'Päckchen', waitTime: 180, color: '#f0ad4e', icon: '📦' }, { name: 'Paket', waitTime: 120, color: '#8b4513', icon: '🟫' } ];
        
        const postman = { x: 0, y: 0, targetX: 0, targetY: 0, state: 'idle', speed: 0.7, waitTimer: 0, type: null, lastAngle: 0 };
        // ATTACKER EXTREM SCHNELL (Speed 1.5)
        const attacker = { x: 0, y: 0, targetX: 0, targetY: 0, state: 'idle', speed: 1.5, waitTimer: 0, type: null, sourceBrand: null, pose: 'throwing', attackingCompetitorId: null, lastAngle: 0 };

        function spawnMission() {
            let minD = 0, maxD = 9999;
            if(car.type === 'bike') { minD = 300; maxD = 1000; } else if(car.type === 'scooter') { minD = 600; maxD = 1500; } else if(car.type === 'transporter') { minD = 1200; maxD = 3000; }
            let availableBuildings = mapData.buildings.filter(b => { let d = Math.hypot(b.haloX - car.x, b.haloY - car.y); return d >= minD && d <= maxD && b.id !== gameState.lastMissionBId; });
            if (availableBuildings.length === 0) availableBuildings = mapData.buildings.filter(b => b.id !== gameState.lastMissionBId); 
            let b = availableBuildings[Math.floor(Math.random() * availableBuildings.length)];
            let availableMissions = [];
            if(car.type === 'bike') availableMissions = MISSION_TYPES.filter(m => m.name !== 'Paket'); else if(car.type === 'transporter') availableMissions = MISSION_TYPES.filter(m => m.name !== 'Brief'); else availableMissions = MISSION_TYPES; 
            let type = availableMissions[Math.floor(Math.random() * availableMissions.length)];
            gameState.mission = { bId: b.id, doorX: b.doorX, doorY: b.doorY, triggerX: b.haloX, triggerY: b.haloY, radius: 45, type: type, pulse: 0 };
            document.getElementById('missionInfo').innerText = `Ziel: ${type.name} ${type.icon}`;
            gameState.cooldown = 60;
        }
        function showFloatingText(text, x, y) { gameState.floatingTexts.push({ text: text, x: x, y: y, life: 60 }); }
        function startGame(vehicleKey) {
            let v = VEHICLES[vehicleKey]; car.l = v.l; car.w = v.w; car.maxSpeed = v.maxSpeed; car.displaySpeed = v.displaySpeed; car.acceleration = v.acceleration; car.braking = v.braking; car.maxSteer = v.maxSteer; car.offroadFriction = v.offroadFriction; car.type = v.type; car.name = v.name;
            initMapAndAI(); car.x = 0; car.y = -40; car.angle = 0; car.speed = 0; car.steeringAngle = 0; gameState.score = 0; gameState.isDelivering = false; gameState.brakingForMission = false; gameState.cooldown = 0; gameState.mission = null; gameState.lastMissionBId = null; postman.state = 'idle'; document.getElementById('scoreDisplay').innerText = `0`; document.getElementById('startScreen').style.display = 'none'; document.getElementById('ui').style.display = 'flex'; document.getElementById('restartBtn').style.display = 'block';
            if(isMobile) { document.getElementById('touchControllerContainer').style.display = 'block'; }
            bgMusic.currentTime = 0; bgMusic.play().catch(e => console.log("Audio Play verweigert"));
            gameActive = true; spawnMission();
        }
        bgMusic.addEventListener('ended', endGame);
        function endGame() {
            gameActive = false; document.getElementById('ui').style.display = 'none'; document.getElementById('restartBtn').style.display = 'none'; document.getElementById('touchControllerContainer').style.display = 'none'; document.getElementById('signatureUI').style.display = 'none'; document.getElementById('keyboardPackageUI').style.display = 'none'; document.getElementById('gameOverScreen').style.display = 'flex'; document.getElementById('finalScoreDisplay').innerText = gameState.score; document.getElementById('playerNameArea').style.display = 'block';
            renderLeaderboard();
        }
        function saveScore() {
            let nameInput = document.getElementById('playerName'); let name = nameInput.value.trim() || "Anonymer Bote"; let lb = JSON.parse(localStorage.getItem('dhl_leaderboard') || "[]"); let entryDate = new Date(); let dateStr = entryDate.toLocaleDateString('de-DE', {day: '2-digit', month: '2-digit', year: 'numeric'}) + ', ' + entryDate.toLocaleTimeString('de-DE', {hour: '2-digit', minute: '2-digit'});
            lb.push({ name: name, score: gameState.score, vehicle: car.name, device: deviceType, date: dateStr }); lb.sort((a,b) => b.score - a.score); localStorage.setItem('dhl_leaderboard', JSON.stringify(lb)); document.getElementById('playerNameArea').style.display = 'none';
            renderLeaderboard();

            for (let t of mapData.trees) { ctx.fillStyle = 'rgba(0,0,0,0.3)'; ctx.beginPath(); ctx.arc(t.x+5, t.y+5, t.r, 0, Math.PI*2); ctx.fill(); ctx.fillStyle = '#2e7d32'; ctx.beginPath(); ctx.arc(t.x, t.y, t.r, 0, Math.PI*2); ctx.fill(); }
            if (gameState.mission && !gameState.isDelivering) { let m = gameState.mission; ctx.beginPath(); ctx.arc(m.triggerX, m.triggerY, m.radius + Math.sin(m.pulse) * 5, 0, Math.PI * 2); ctx.fillStyle = `rgba(255, 204, 0, ${gameState.brakingForMission ? 0.6 : 0.3})`; ctx.fill(); ctx.strokeStyle = '#ffcc00'; ctx.lineWidth = 2; ctx.stroke(); ctx.beginPath(); ctx.moveTo(m.triggerX, m.triggerY); ctx.lineTo(m.doorX, m.doorY); ctx.strokeStyle = 'rgba(255,255,255,0.4)'; ctx.setLineDash([5, 5]); ctx.stroke(); ctx.setLineDash([]); ctx.fillStyle = '#fff'; ctx.font = '24px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText(m.type.icon, m.triggerX, m.triggerY); }

            for(let c of competitors) { 
                ctx.save(); ctx.translate(c.x, c.y); ctx.rotate(c.angle); 
                let imgToDraw = null;
                const isStopped = (c.state === 'stopped' || c.state === 'stopped_reckless' || c.state === ' Prepare_Attack' || c.state === 'Attack_Sequence' || c.state === 'traffic_jam');
                
                if (c.brand === 'fedex') { imgToDraw = isStopped ? imgFedExStop : imgFedExDrive; }

                else if (c.brand === 'gls') { imgToDraw = isStopped ? imgGLSStop : imgGLSDrive; }
                else if (c.brand === 'dpd') { imgToDraw = (c.dpdVar === 1) ? imgDPDDrive : imgDPDDrive1; }

                }
                ctx.restore(); 
            }

            for(let p of projectiles) { ctx.save(); ctx.translate(p.x, p.y - Math.max(0, p.z)); ctx.rotate(frameCount * 0.2); ctx.fillStyle = '#8b4513'; ctx.fillRect(-6, -6, 12, 12); ctx.strokeStyle = '#111'; ctx.lineWidth = 1; ctx.strokeRect(-6, -6, 12, 12); ctx.restore(); }

            let imgToDraw = null; if(car.type === 'bike') imgToDraw = imgBikeLeftLeg; else if(car.type === 'scooter') imgToDraw = imgScooter; else if(car.type === 'transporter') imgToDraw = imgTransporter;

                    if (gameState.isDelivering || gameState.brakingForMission) { activeSprite = imgBikeDismounted; } else if (car.steeringAngle < -car.maxSteer * 0.3) { activeSprite = imgBikeLeftTurn; } else if (car.steeringAngle > car.maxSteer * 0.3) { activeSprite = imgBikeRightTurn; } else { let pedalFrame = Math.floor(frameCount * Math.abs(car.speed) * 0.1) % 2; activeSprite = (pedalFrame === 0) ? imgBikeLeftLeg : imgBikeRightLeg; wiggle = Math.sin(frameCount * 0.3) * 0.005; } ctx.rotate(-Math.PI/2 + wiggle); ctx.drawImage(activeSprite, -car.w/2, -car.l/2, car.w, car.l);

            // Konkurrenz Zusteller Zeichnen (Attacker)
            if (attacker.state !== 'idle') {
                ctx.save(); ctx.translate(attacker.x, attacker.y);
                let walkAngle = 0; if (attacker.state === 'to_attack_pos' || attacker.state === 'back_to_car') walkAngle = Math.atan2(attacker.targetY - attacker.y, attacker.targetX - attacker.x); else walkAngle = attacker.lastAngle; ctx.rotate(walkAngle);
                let delivererBrand = attacker.sourceBrand; let attackerPose = attacker.pose; let activeSprite = null;
