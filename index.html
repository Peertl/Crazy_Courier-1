<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DHL GTA - Ablageort & Bugfixes</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #2c2c2c; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; touch-action: none; user-select: none; -webkit-user-select: none; }
        canvas { display: block; }
        
        .overlay-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; }
        .vehicle-btn, .action-btn { background: #ffcc00; color: #111; border: none; padding: 15px 30px; font-size: 18px; font-weight: bold; margin: 10px; border-radius: 8px; cursor: pointer; width: 250px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.3); transition: transform 0.1s; }
        .vehicle-btn:active, .action-btn:active { transform: scale(0.95); }
        .vehicle-btn:hover, .action-btn:hover { background: #e6b800; }
        
        input[type="text"] { padding: 10px; font-size: 16px; width: 250px; border-radius: 5px; border: 2px solid #ffcc00; margin-bottom: 10px; text-align: center; outline: none; box-sizing: border-box; }

        #ui { position: absolute; top: 15px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 600px; background: rgba(20, 20, 20, 0.85); backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px); border: 2px solid #ffcc00; border-top: 4px solid #d40511; border-radius: 12px; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; color: white; z-index: 10; pointer-events: none; box-shadow: 0 6px 20px rgba(0,0,0,0.6); display: none; box-sizing: border-box; }
        .ui-col { display: flex; flex-direction: column; }
        .ui-center { align-items: center; text-align: center; position: relative; }
        .ui-right { align-items: flex-end; text-align: right; }
        .ui-val { font-size: 18px; font-weight: bold; color: #fff; margin-top: 2px; }
        .ui-lbl { font-size: 11px; color: #ffcc00; text-transform: uppercase; letter-spacing: 1px; }
        .ui-highlight { color: #ffeb3b; }
        
        #eventIcons { position: absolute; top: 100%; margin-top: 5px; display: flex; gap: 10px; font-size: 15px; }
        .event-icon { display: none; background: rgba(0,0,0,0.7); padding: 4px 8px; border-radius: 5px; border: 1px solid #4caf50; color: #4caf50; font-weight: bold; }

        #restartBtn { position: absolute; bottom: 20px; left: 20px; background: #d40511; color: white; border: 2px solid #fff; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; z-index: 10; display: none; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }

        .task-ui { display: none; position: absolute; top: 25%; left: 50%; transform: translate(-50%, 0); background: #fff; border: 4px solid #ffcc00; padding: 15px; border-radius: 12px; z-index: 50; text-align: center; box-shadow: 0 15px 40px rgba(0,0,0,0.7); }
        .task-ui h3 { color: #111; margin: 0 0 10px 0; font-size: 18px; }
        #sigCanvas { border: 2px dashed #ccc; background: #f9f9f9; cursor: crosshair; touch-action: none; border-radius: 6px; }
        .confirm-btn { background: #ffcc00; border: none; padding: 12px; width: 100%; font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 10px; border-radius: 6px; }

        #penaltyImgPopup { position: absolute; top: 30%; left: 50%; transform: translate(-50%,-50%); width: 320px; border: 4px solid #ffcc00; border-radius: 12px; background: #fff; text-align: center; box-shadow: 0 15px 40px rgba(0,0,0,0.7); z-index: 100; display: none; padding: 0; overflow: hidden; }
        #notificationImg { width: 100%; display: block; }

        #touchControllerContainer { position: absolute; bottom: 20px; right: 20px; width: 220px; height: 220px; background: rgba(0, 0, 0, 0.4); border-radius: 50%; z-index: 10; border: 2px solid rgba(255, 255, 255, 0.2); box-shadow: 0 0 20px rgba(0,0,0,0.6); display: none; }
        #touchControllerCanvas { width: 100%; height: 100%; }

        #leaderboardList { list-style: none; padding: 0; margin: 15px 0; text-align: left; width: 360px; background: rgba(255,255,255,0.1); border-radius: 8px; padding: 10px; border: 1px solid rgba(255,204,0,0.3); }
        #leaderboardList li { padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.1); font-size: 15px; line-height: 1.4; }
        #leaderboardList li:last-child { border-bottom: none; }
    </style>
</head>
<body>

    <audio id="gameMusic" src="MV1_P&P_-_Ein_Team_(Instrumental)_[V2].mp3" preload="auto"></audio>

    <div id="startScreen" class="overlay-screen">
        <h1 style="color: #ffcc00; margin-bottom: 5px;">DHL Zustell-Simulator</h1>
        <p style="margin-top: 0; color: #ccc;">Die Schicht endet, wenn der Song vorbei ist!</p>
        <button class="vehicle-btn" onclick="startGame('bike')">🚲 Post-Fahrrad (Trike)</button>
        <button class="vehicle-btn" onclick="startGame('scooter')">🚗 Street Scooter</button>
        <button class="vehicle-btn" onclick="startGame('transporter')">🚚 Paket-Transporter</button>
    </div>

    <div id="gameOverScreen" class="overlay-screen" style="display: none;">
        <h1 style="color: #ffcc00; margin-bottom: 5px;">Schicht beendet!</h1>
        <h2>Zugestellte Sendungen: <span id="finalScoreDisplay">0</span></h2>
        
        <div id="playerNameArea" style="display: block; text-align: center;">
            <input type="text" id="playerName" placeholder="Dein Name" maxlength="15">
            <br>
            <button class="action-btn" id="saveScoreBtn" onclick="saveScore()">In Bestenliste eintragen</button>
        </div>

        <ul id="leaderboardList"></ul>
        <button class="action-btn" onclick="location.reload()">Zurück zum Menü</button>
    </div>

    <div id="ui">
        <div class="ui-col">
            <span class="ui-lbl">Tempo</span>
            <span class="ui-val" id="speedo">0 km/h</span>
        </div>
        <div class="ui-col ui-center">
            <span class="ui-val ui-highlight" id="timerDisplay">🎵 Lädt...</span>
            <span class="ui-lbl" id="missionInfo" style="margin-top: 3px; font-weight: bold; color: #fff;">Warte auf Einsatz...</span>
            
            <div id="eventIcons">
                <span class="event-icon" id="iconPackstation" title="Nächstes Ziel: Packstation">Ziel: 📦x3</span>
                <span class="event-icon" id="iconAblageort" title="Bonus: Ablageort">Ablageort 📦</span>
            </div>
        </div>
        <div class="ui-col ui-right">
            <span class="ui-lbl">Zustellungen</span>
            <span class="ui-val" id="scoreDisplay">0</span>
        </div>
    </div>
    
    <button id="restartBtn" onclick="location.reload()">Neustart</button>

    <div id="signatureUI" class="task-ui">
        <h3>Empfänger-Unterschrift</h3>
        <canvas id="sigCanvas" width="280" height="120"></canvas>
        <button class="confirm-btn" onclick="confirmSignature()">Bestätigen</button>
    </div>

    <div id="keyboardPackageUI" class="task-ui">
        <h3>Name des Empfängers</h3>
        <input type="text" id="recipientName" placeholder="Mind. 3 Buchstaben" autocomplete="off">
        <button class="confirm-btn" onclick="confirmName()">Bestätigen</button>
    </div>

    <div id="penaltyImgPopup">
        <img id="notificationImg">
    </div>

    <canvas id="gameCanvas"></canvas>

    <div id="touchControllerContainer">
        <canvas id="touchControllerCanvas" width="220" height="220"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas'); const ctx = canvas.getContext('2d');
        const ctrlCanvas = document.getElementById('touchControllerCanvas'); const cctx = ctrlCanvas.getContext('2d');
        const bgMusic = document.getElementById('gameMusic');
        let gameActive = false; let frameCount = 0;
        
        let isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
        let deviceType = isMobile ? 'Handy' : 'PC';

        // Lade Assets
        const postmanImgs = { post: { letter: { left: new Image(), right: new Image() }, parcel: { left: new Image(), right: new Image() }, solo: { left: new Image(), right: new Image() } }, dhl: { parcel: { left: new Image(), right: new Image() }, solo: { left: new Image(), right: new Image() } }, attackers: { amazon: { throwing: new Image(), after_throw: new Image() }, dpd: { throwing: new Image(), after_throw: new Image() }, fedex: { throwing: new Image(), after_throw: new Image() }, gls: { throwing: new Image(), after_throw: new Image() }, ups: { throwing: new Image(), after_throw: new Image() } } };
        const imgBike = new Image(); imgBike.src = 'Bike.png'; const imgScooter = new Image(); imgScooter.src = 'Street-Scooter.png'; const imgTransporter = new Image(); imgTransporter.src = 'Transporter.png'; const imgBikeLeftLeg = new Image(); imgBikeLeftLeg.src = 'Bike-Left-Leg.png'; const imgBikeRightLeg = new Image(); imgBikeRightLeg.src = 'Bike-Right-Leg.png'; const imgBikeLeftTurn = new Image(); imgBikeLeftTurn.src = 'Bike-Left-Turn.png'; const imgBikeRightTurn = new Image(); imgBikeRightTurn.src = 'Bike-Right-Turn.png'; const imgBikeDismounted = new Image(); imgBikeDismounted.src = 'Bike-dismounted.png';
        const imgFedExDrive = new Image(); imgFedExDrive.src = 'FedEx-Drive.png'; const imgFedExStop = new Image(); imgFedExStop.src = 'FedEx-Stop.png'; const imgUPSDrive = new Image(); imgUPSDrive.src = 'UPS-Drive.png'; const imgUPStop = new Image(); imgUPStop.src = 'UPS-Stop.png'; const imgAmazonDrive = new Image(); imgAmazonDrive.src = 'Amazon-Drive.png'; const imgAmazonStop = new Image(); imgAmazonStop.src = 'Amazon-Stop.png'; const imgDPDDrive = new Image(); imgDPDDrive.src = 'DPD-Drive.png'; const imgDPDDrive1 = new Image(); imgDPDDrive1.src = 'DPD-Drive-1.png'; const imgGLSDrive = new Image(); imgGLSDrive.src = 'GLS-Drive.png'; const imgGLSStop = new Image(); imgGLSStop.src = 'GLS-Stop.png';
        
        const imgPackstation = new Image(); imgPackstation.src = 'Packstation.png';
        const imgNotification = new Image(); imgNotification.src = 'Benachrichtigung.png';
        const imgLaterneStehend = new Image(); imgLaterneStehend.src = 'Laterne_stehend.png';
        const imgLaterneLiegend = new Image(); imgLaterneLiegend.src = 'Laterne_liegend.png';
        
        document.getElementById('notificationImg').src = imgNotification.src;

        postmanImgs.post.letter.left.src = 'Post-Zusteller-Letter-Left.png'; postmanImgs.post.letter.right.src = 'Post-Zusteller-Letter-Right.png'; postmanImgs.post.parcel.left.src = 'Post-Zusteller-Parcel-Left.png'; postmanImgs.post.parcel.right.src = 'Post-Zusteller-Parcel-Right.png'; postmanImgs.post.solo.left.src = 'Post-Zusteller-Solo-Left.png'; postmanImgs.post.solo.right.src = 'Post-Zusteller-Solo-Right.png'; postmanImgs.dhl.parcel.left.src = 'DHL-Zusteller-Parcel-Left.png'; postmanImgs.dhl.parcel.right.src = 'DHL-Zusteller-Parcel-Right.png'; postmanImgs.dhl.solo.left.src = 'DHL-Zusteller-Solo-Left.png'; postmanImgs.dhl.solo.right.src = 'DHL-Zusteller-Solo-Right.png';
        postmanImgs.attackers.amazon.throwing.src = 'Konkurrent_Amazon_throwing.png'; postmanImgs.attackers.amazon.after_throw.src = 'Konkurrent_Amazon_after_throw.png'; postmanImgs.attackers.dpd.throwing.src = 'Konkurrent_DPD_throwing.png'; postmanImgs.attackers.dpd.after_throw.src = 'Konkurrent_DPD_after_throw.png'; postmanImgs.attackers.fedex.throwing.src = 'Konkurrent_FedEx_throwing.png'; postmanImgs.attackers.fedex.after_throw.src = 'Konkurrent_FedEx_after_throw.png'; postmanImgs.attackers.gls.throwing.src = 'Konkurrent_GLS_throwing.png'; postmanImgs.attackers.gls.after_throw.src = 'Konkurrent_GLS_after_throw.png'; postmanImgs.attackers.ups.throwing.src = 'Konkurrent_UPS_throwing.png'; postmanImgs.attackers.ups.after_throw.src = 'Konkurrent_UPS_after_throw.png';

        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();

        const VEHICLES = {
            bike: { l: 80, w: 35, maxSpeed: 1.25, displaySpeed: 25, acceleration: 0.1, braking: 0.15, maxSteer: 0.02, offroadFriction: 0.7, type: 'bike', name: 'Fahrrad' },
            scooter: { l: 100, w: 42, maxSpeed: 2.25, displaySpeed: 50, acceleration: 0.15, braking: 0.20, maxSteer: 0.03, offroadFriction: 0.9, type: 'scooter', name: 'Verbund' },
            transporter: { l: 125, w: 48, maxSpeed: 2.75, displaySpeed: 50, acceleration: 0.12, braking: 0.15, maxSteer: 0.025, offroadFriction: 0.92, type: 'transporter', name: 'Paket' }
        };

        const car = { x: 0, y: 0, l: 65, w: 32, angle: 0, speed: 0, maxSpeed: 2.25, displaySpeed: 50, acceleration: 0.15, braking: 0.2, maxSteer: 0.04, offroadFriction: 0.9, type: 'scooter', name: 'Verbund', steeringAngle: 0, currentFriction: 0.96 };

        const mapData = { roads: [], curves: [], sidewalks: [], buildings: [], fences: [], trees: [], garages: [], streetlights: [], packstations: [], events: [] };
        const roadW = 160; const gridSteps = [-2000, -1000, 0, 1000, 2000]; 
        const competitors = []; let projectiles = [];
        
        const houseColors = ['#8d6e63', '#a1887f', '#bcaaa4', '#795548', '#d7ccc8', '#9e9e9e'];
        const roofColors = ['#5d4037', '#4e342e', '#3e2723', '#424242'];

        function spawnSingleAI() {
            const brandList = ['fedex', 'ups', 'amazon', 'dpd', 'gls'];
            let onXAxis = Math.random() < 0.5; let line = gridSteps[Math.floor(Math.random() * gridSteps.length)];
            let validSpawn = false; let aiX, aiY; let dir, dirX, dirY;
            while(!validSpawn) {
                let startPos = (Math.random() * 4000) - 2000; dir = Math.random() > 0.5 ? 1 : -1;
                if (onXAxis) { aiX = startPos; aiY = line + (dir > 0 ? 40 : -40); dirX = dir; dirY = 0; } else { aiX = line + (dir > 0 ? -40 : 40); aiY = startPos; dirX = 0; dirY = dir; }
                if (Math.hypot(aiX - car.x, aiY - car.y) > 600) validSpawn = true;
            }
            let brand = brandList[Math.floor(Math.random() * brandList.length)];
            let angle = 0; if (dirX === 1) angle = 0; if (dirX === -1) angle = Math.PI; if (dirY === 1) angle = Math.PI/2; if (dirY === -1) angle = -Math.PI/2;
            return { id: Math.random(), x: aiX, y: aiY, l: 121, w: 46, speed: 2 + Math.random(), baseSpeed: 2 + Math.random(), dirX: dirX, dirY: dirY, angle: angle, baseAngle: angle, brand: brand, dpdVar: (brand === 'dpd') ? (Math.random() < 0.5 ? 1 : 2) : 0, state: 'driving', timer: 0 };
        }

        function initMapAndAI() {
            mapData.roads = []; mapData.curves = []; mapData.sidewalks = []; mapData.buildings = []; mapData.fences = []; mapData.trees = []; mapData.garages = []; mapData.streetlights = []; mapData.packstations = []; mapData.events = []; projectiles = [];
            competitors.length = 0;
            for(let pos of gridSteps) { mapData.roads.push({ x: -2500, y: pos - roadW/2, w: 5000, h: roadW }); mapData.roads.push({ x: pos - roadW/2, y: -2500, w: roadW, h: 5000 }); }
            let rW2 = roadW/2;
            mapData.curves.push({ cx: -2000, cy: -2000, r: rW2, start: Math.PI, end: 1.5*Math.PI }); mapData.curves.push({ cx: 2000, cy: -2000, r: rW2, start: 1.5*Math.PI, end: 2*Math.PI });
            mapData.curves.push({ cx: 2000, cy: 2000, r: rW2, start: 0, end: 0.5*Math.PI }); mapData.curves.push({ cx: -2000, cy: 2000, r: rW2, start: 0.5*Math.PI, end: Math.PI });
            
            mapData.packstations.push({ id: 'ps1', x: 200, y: 82, w: 90, h: 30, cx: 245, cy: 97, angle: Math.PI, haloX: 245, haloY: 60 });
            mapData.packstations.push({ id: 'ps2', x: -500, y: -1112, w: 90, h: 30, cx: -455, cy: -1097, angle: 0, haloX: -455, haloY: -1060 });
            mapData.packstations.push({ id: 'ps3', x: 1082, y: 500, w: 30, h: 90, cx: 1097, cy: 545, angle: Math.PI/2, drawW: 90, drawH: 30, haloX: 1060, haloY: 545 });

            for(let i=0; i<gridSteps.length-1; i++) {
                for(let j=0; j<gridSteps.length-1; j++) {
                    let startX = gridSteps[i] + rW2; let startY = gridSteps[j] + rW2;
                    let width = gridSteps[i+1] - gridSteps[i] - roadW; let height = gridSteps[j+1] - gridSteps[j] - roadW;
                    mapData.sidewalks.push({ x: startX, y: startY, w: width, h: height });
                    let pad = 35; let blockX = startX + pad; let blockY = startY + pad; let blockW = width - pad*2; let blockH = height - pad*2;
                    mapData.fences.push({ x: blockX, y: blockY, w: blockW, h: 4 }); mapData.fences.push({ x: blockX, y: blockY+blockH-4, w: blockW, h: 4 });
                    mapData.fences.push({ x: blockX, y: blockY, w: 4, h: blockH }); mapData.fences.push({ x: blockX+blockW-4, y: blockY, w: 4, h: blockH });
                    let hSize = 100; let gap = 160;
                    
                    for(let ix = blockX + 20; ix < blockX + blockW - 120; ix += gap) {
                        let c1 = houseColors[Math.floor(Math.random()*houseColors.length)]; let r1 = roofColors[Math.floor(Math.random()*roofColors.length)];
                        mapData.buildings.push({ id: Math.random(), x: ix, y: blockY + 5, w: hSize, h: hSize, doorX: ix+hSize/2, doorY: blockY+5, haloX: ix+hSize/2, haloY: blockY - 25, color: c1, roofColor: r1, rType: 'h' });
                        if(Math.random()>0.5) mapData.garages.push({ x: ix+hSize, y: blockY+5, w: 40, h: 60, dir: 'up' });
                        let skipL1 = false; for(let ps of mapData.packstations) if(Math.hypot((ix-20)-ps.cx, (blockY-15)-ps.cy) < 80) skipL1=true;
                        if(!skipL1 && Math.random() < 0.3) mapData.streetlights.push({ x: ix - 20, y: blockY - 15, state: 'normal', timer: 0, angle: 0 });

                        let c2 = houseColors[Math.floor(Math.random()*houseColors.length)]; let r2 = roofColors[Math.floor(Math.random()*roofColors.length)];
                        mapData.buildings.push({ id: Math.random(), x: ix, y: blockY + blockH - hSize - 5, w: hSize, h: hSize, doorX: ix+hSize/2, doorY: blockY+blockH-5, haloX: ix+hSize/2, haloY: blockY+blockH + 25, color: c2, roofColor: r2, rType: 'h' });
                        if(Math.random()>0.5) mapData.garages.push({ x: ix+hSize, y: blockY+blockH-65, w: 40, h: 60, dir: 'down' });
                        let skipL2 = false; for(let ps of mapData.packstations) if(Math.hypot((ix-20)-ps.cx, (blockY+blockH+15)-ps.cy) < 80) skipL2=true;
                        if(!skipL2 && Math.random() < 0.3) mapData.streetlights.push({ x: ix - 20, y: blockY + blockH + 15, state: 'normal', timer: 0, angle: 0 });
                    }
                    for(let iy = blockY + gap; iy < blockY + blockH - gap; iy += gap) {
                        let c3 = houseColors[Math.floor(Math.random()*houseColors.length)]; let r3 = roofColors[Math.floor(Math.random()*roofColors.length)];
                        mapData.buildings.push({ id: Math.random(), x: blockX + 5, y: iy, w: hSize, h: hSize, doorX: blockX+5, doorY: iy+hSize/2, haloX: blockX - 25, haloY: iy+hSize/2, color: c3, roofColor: r3, rType: 'v' });
                        let skipL3 = false; for(let ps of mapData.packstations) if(Math.hypot((blockX-15)-ps.cx, (iy-20)-ps.cy) < 80) skipL3=true;
                        if(!skipL3 && Math.random() < 0.3) mapData.streetlights.push({ x: blockX - 15, y: iy - 20, state: 'normal', timer: 0, angle: 0 });

                        let c4 = houseColors[Math.floor(Math.random()*houseColors.length)]; let r4 = roofColors[Math.floor(Math.random()*roofColors.length)];
                        mapData.buildings.push({ id: Math.random(), x: blockX + blockW - hSize - 5, y: iy, w: hSize, h: hSize, doorX: blockX+blockW-5, doorY: iy+hSize/2, haloX: blockX+blockW + 25, haloY: iy+hSize/2, color: c4, roofColor: r4, rType: 'v' });
                        let skipL4 = false; for(let ps of mapData.packstations) if(Math.hypot((blockX+blockW+15)-ps.cx, (iy-20)-ps.cy) < 80) skipL4=true;
                        if(!skipL4 && Math.random() < 0.3) mapData.streetlights.push({ x: blockX + blockW + 15, y: iy - 20, state: 'normal', timer: 0, angle: 0 });
                    }
                    for(let t=0; t<5; t++) { mapData.trees.push({ x: blockX + 150 + Math.random()*(blockW-300), y: blockY + 150 + Math.random()*(blockH-300), r: 15 + Math.random()*15 }); }
                }
            }
            
            // 6 Ereignisse auf der Map
            for(let i=0; i<6; i++) {
                let onXAxis = Math.random() < 0.5; let line = gridSteps[Math.floor(Math.random() * gridSteps.length)];
                let rand = Math.random(); let type = 'time';
                if(rand > 0.33 && rand < 0.66) type = 'packstation';
                else if(rand >= 0.66) type = 'ablageort';
                mapData.events.push({ x: onXAxis ? (Math.random()*4000)-2000 : line, y: onXAxis ? line : (Math.random()*4000)-2000, type: type, active: true });
            }

            for(let i=0; i<16; i++) { competitors.push(spawnSingleAI()); }
        }

        const gameState = { score: 0, isDelivering: false, brakingForMission: false, mission: null, lastMissionBId: null, floatingTexts: [], cooldown: 0, penaltyActive: false, packstationBuff: false, ablageortBuff: false };
        
        // Päckchen und Paket haben nun beide das 📦 Icon
        const MISSION_TYPES = [ { name: 'Brief', waitTime: 0, color: '#fff', icon: '✉️' }, { name: 'Päckchen', waitTime: 180, color: '#f0ad4e', icon: '📦' }, { name: 'Paket', waitTime: 120, color: '#8b4513', icon: '📦' } ];
        
        const postman = { x: 0, y: 0, targetX: 0, targetY: 0, state: 'idle', speed: 0.7, waitTimer: 0, type: null, isPackstation: false, packstation_parcel_count: 0, packstation_parcel_timer: 0, lastAngle: 0, originalDoorX: 0, originalDoorY: 0 };
        const attacker = { x: 0, y: 0, targetX: 0, targetY: 0, state: 'idle', speed: 1.5, waitTimer: 0, type: null, sourceBrand: null, pose: 'throwing', attackingCompetitorId: null, lastAngle: 0, vx: 0, vy: 0 };

        function spawnMission() {
            if (gameState.packstationBuff) {
                let b = mapData.packstations[Math.floor(Math.random() * mapData.packstations.length)];
                let type = { name: 'Packstation', waitTime: 360, color: '#ffcc00', icon: '📦' }; 
                gameState.mission = { bId: b.id, doorX: b.haloX, doorY: b.haloY, triggerX: b.haloX, triggerY: b.haloY, radius: 45, type: type, pulse: 0, isPackstation: true };

                    if (postman.packstation_parcel_timer <= 0) {
                        postman.packstation_parcel_count++;
                        if (postman.packstation_parcel_count < 3) { postman.packstation_parcel_timer = 120; } 
                        else { successDelivery(); postman.isPackstation = false; } 
                    }
                }
                else if (postman.state === 'waiting') {
                    postman.waitTimer--;
                    if (postman.waitTimer <= 0) {
                        // Fahrrad-Zusteller hat IMMUNITÄT gegen Nachbar-Strafe
                        if (gameState.penaltyActive && !postman.isPackstation && postman.type.name !== 'Brief' && car.type !== 'bike') {
                            postman.state = 'to_neighbor'; 
                            postman.originalDoorX = postman.targetX; 
                            postman.originalDoorY = postman.targetY; 
                            
                            // CRASH FIX: use lastMissionBId
                            let nearest = null; let minDist = 99999;
                            for(let b of mapData.buildings) {
                                if(b.id === gameState.lastMissionBId) continue; 
                                if(Math.abs(b.doorX - postman.originalDoorX) < 10 || Math.abs(b.doorY - postman.originalDoorY) < 10) {
                                    let d = Math.hypot(b.doorX - postman.originalDoorX, b.doorY - postman.originalDoorY);
                                    if(d < minDist) { minDist = d; nearest = b; }
                                }
                            }
                            if(nearest) { postman.targetX = nearest.doorX; postman.targetY = nearest.doorY; } 
                            else { postman.targetX = postman.originalDoorX + 160; } 
                            
                            document.getElementById('missionInfo').innerText = "Gehe zum Nachbarn...";
                        } else {
                            if(postman.isPackstation || postman.type.name === 'Brief') { successDelivery(); }
                            else if(postman.type.name === 'Paket') {
                                if(deviceType === 'Handy') { postman.state = 'signing'; document.getElementById('signatureUI').style.display = 'block'; sctx.clearRect(0, 0, sigCanvas.width, sigCanvas.height); } 
                                else { postman.state = 'typing'; document.getElementById('keyboardPackageUI').style.display = 'block'; document.getElementById('recipientName').value = ''; document.getElementById('recipientName').focus(); }
                            } else { successDelivery(); } 
                        }
                    }
                } else if (postman.state === 'to_neighbor') {
                    if (dist > postman.speed) { postman.x += (dx/dist) * postman.speed; postman.y += (dy/dist) * postman.speed; } 
                    else { postman.state = 'waiting_neighbor'; postman.waitTimer = 60; document.getElementById('missionInfo').innerText = "Warte beim Nachbarn..."; }
                } else if (postman.state === 'waiting_neighbor') {
                    postman.waitTimer--;
                    if (postman.waitTimer <= 0) {
                        document.getElementById('penaltyImgPopup').style.display = 'block'; 
                        postman.state = 'to_original_door'; postman.targetX = postman.originalDoorX; postman.targetY = postman.originalDoorY; document.getElementById('missionInfo').innerText = "Karte einwerfen...";
                    }
                } else if (postman.state === 'to_original_door') {
                    if (dist > postman.speed) { postman.x += (dx/dist) * postman.speed; postman.y += (dy/dist) * postman.speed; } 
                    else { 
                        document.getElementById('penaltyImgPopup').style.display = 'none'; 
                        postman.state = 'inserting_card'; postman.waitTimer = 30; document.getElementById('missionInfo').innerText = "Werfe Karte ein..."; 
                    }
                } else if (postman.state === 'inserting_card') {
                    postman.waitTimer--; if (postman.waitTimer <= 0) { gameState.penaltyActive = false; successDelivery(); }
                } else if (postman.state === 'to_car') {
                    postman.targetX = car.x; postman.targetY = car.y; dx = postman.targetX - postman.x; dy = postman.targetY - postman.y; dist = Math.hypot(dx, dy);
                    if (dist > postman.speed) { postman.x += (dx/dist) * postman.speed; postman.y += (dy/dist) * postman.speed; } 
                    else { postman.state = 'idle'; gameState.isDelivering = false; spawnMission(); }
                }
            } else {
                car.currentFriction = getTerrainFriction(car.x, car.y); 
                let effectiveMaxSpeed = car.maxSpeed;
                if (car.currentFriction === 0.85) effectiveMaxSpeed = car.maxSpeed * 0.35; 

                if (gameState.brakingForMission) {
                    inputs.fwd = inputs.rev = inputs.left = inputs.right = false; drawTouchController(-1); let brakeForce = car.braking * 0.4; if (car.speed > 0.05) { car.speed -= brakeForce; if(car.speed < 0) car.speed = 0; } else if (car.speed < -0.05) { car.speed += brakeForce; if(car.speed > 0) car.speed = 0; } else { car.speed = 0; } 
                    if (car.speed === 0) { 
                        gameState.brakingForMission = false; gameState.isDelivering = true; postman.x = car.x; postman.y = car.y; postman.targetX = gameState.mission.doorX; postman.targetY = gameState.mission.doorY; postman.type = gameState.mission.type; postman.isPackstation = gameState.mission.isPackstation; postman.waitTimer = gameState.mission.type.waitTime; postman.state = 'to_door'; gameState.lastMissionBId = gameState.mission.bId; gameState.mission = null; 
                    } 
                } else {
                    if (inputs.fwd) { car.speed += car.acceleration; } else if (inputs.rev) { car.speed -= car.acceleration; } else { car.speed *= car.currentFriction; } 
                }
                
                car.speed = Math.max(-effectiveMaxSpeed/2, Math.min(effectiveMaxSpeed, car.speed)); 
                if(Math.abs(car.speed) < 0.05) car.speed = 0; 
                
                if (Math.abs(car.speed) > 0.05) { 
                    let targetSteer = 0; if (inputs.left) targetSteer = -car.maxSteer; if (inputs.right) targetSteer = car.maxSteer; 
                    car.steeringAngle += (targetSteer - car.steeringAngle) * 0.15; 
                    let dir = car.speed > 0 ? 1 : -1; car.angle += car.steeringAngle * dir * (Math.abs(car.speed) / car.maxSpeed); 
                } else { car.steeringAngle *= 0.8; }
                
                let nextX = car.x + Math.cos(car.angle) * car.speed, nextY = car.y + Math.sin(car.angle) * car.speed; 
                let col = checkCollision(nextX, nextY); 
                
                if (col.hit) { 
                    if (col.type === 'streetlight') {
                        col.light.state = 'knocked'; col.light.timer = 120; col.light.angle = car.angle; 
                        if (car.type !== 'bike') { gameState.penaltyActive = true; showFloatingText("Nachbarzustellung!", car.x, car.y - 40); }
                    } else if (col.type === 'attacker') {
                        // FAHRRAD SCHIEBT NUR WEG, BEKOMMT KEINE STRAFE
                        if (car.type === 'bike') { car.speed *= 0.2; }
                        else {
                            attacker.state = 'hit_ragdoll'; attacker.vx = Math.cos(car.angle) * 6; attacker.vy = Math.sin(car.angle) * 6; attacker.timer = 60; 
                            gameState.penaltyActive = true; showFloatingText("Nachbarzustellung!", car.x, car.y - 40);
                        }
                    } else if (col.type === 'ai') { 
                        car.speed *= 0.2; let canMoveX = !checkCollision(nextX, car.y).hit, canMoveY = !checkCollision(car.x, nextY).hit; 
                        if (canMoveX) car.x = nextX; if (canMoveY) car.y = nextY; 
                        if(!canMoveX && !canMoveY) { car.x -= Math.cos(car.angle) * (car.speed >= 0 ? 2 : -2); car.y -= Math.sin(car.angle) * (car.speed >= 0 ? 2 : -2); car.speed = 0; } 
                        if (car.type !== 'bike') { col.ai.state = ' Prepare_Attack'; col.ai.timer = 10; showFloatingText("Hey!", col.ai.x, col.ai.y - 20); }
                    } else {
                        car.speed *= 0.2; let canMoveX = !checkCollision(nextX, car.y).hit, canMoveY = !checkCollision(car.x, nextY).hit; 
                        if (canMoveX) car.x = nextX; if (canMoveY) car.y = nextY; 
                        if(!canMoveX && !canMoveY) { car.x -= Math.cos(car.angle) * (car.speed >= 0 ? 2 : -2); car.y -= Math.sin(car.angle) * (car.speed >= 0 ? 2 : -2); car.speed = 0; } 
                    }
                } else { car.x = nextX; car.y = nextY; }

                if (gameState.mission && !gameState.brakingForMission && gameState.cooldown <= 0) { gameState.mission.pulse += 0.05; let m = gameState.mission; if (Math.hypot(car.x - m.triggerX, car.y - m.triggerY) < m.radius + (Math.max(car.l, car.w) / 2)) gameState.brakingForMission = true; }
            }

            for(let i=mapData.streetlights.length-1; i>=0; i--) {
                let l = mapData.streetlights[i];
                if(l.state === 'knocked') { l.timer--; if(l.timer <= 0) mapData.streetlights.splice(i, 1); }
            }

            let displayedSpeed = Math.round((Math.abs(car.speed) / car.maxSpeed) * car.displaySpeed); document.getElementById('speedo').innerText = displayedSpeed + ' km/h'; for(let i = gameState.floatingTexts.length - 1; i >= 0; i--) { let ft = gameState.floatingTexts[i]; ft.y -= 1; ft.life--; if(ft.life <= 0) gameState.floatingTexts.splice(i, 1); }
        }

        // --- ZEICHNEN ---
        function draw() {
            ctx.fillStyle = '#4caf50'; ctx.fillRect(0, 0, canvas.width, canvas.height); if(!gameActive) return;
            ctx.save(); ctx.translate(canvas.width / 2 - car.x, canvas.height / 2 - car.y); ctx.fillStyle = '#9e9e9e'; for(let s of mapData.sidewalks) ctx.fillRect(s.x, s.y, s.w, s.h); ctx.fillStyle = '#4caf50'; for(let s of mapData.sidewalks) ctx.fillRect(s.x+30, s.y+30, s.w-60, s.h-60); ctx.fillStyle = '#555'; for (let r of mapData.roads) ctx.fillRect(r.x, r.y, r.w, r.h); ctx.strokeStyle = '#555'; ctx.lineWidth = roadW; ctx.lineCap = 'butt'; for (let c of mapData.curves) { ctx.beginPath(); ctx.arc(c.cx, c.cy, c.r, c.start, c.end); ctx.stroke(); } ctx.strokeStyle = '#fff'; ctx.lineWidth = 4; ctx.setLineDash([30, 30]); for (let r of mapData.roads) { ctx.beginPath(); if (r.w > r.h) { ctx.moveTo(r.x, r.y + r.h/2); ctx.lineTo(r.x + r.w, r.y + r.h/2); } else { ctx.moveTo(r.x + r.w/2, r.y); ctx.lineTo(r.x + r.w/2, r.y + r.h); } ctx.stroke(); } ctx.setLineDash([]); ctx.fillStyle = '#6d4c41'; for (let f of mapData.fences) ctx.fillRect(f.x, f.y, f.w, f.h); for (let g of mapData.garages) { ctx.fillStyle = '#757575'; ctx.fillRect(g.x, g.y, g.w, g.h); ctx.strokeStyle = '#424242'; ctx.lineWidth=2; ctx.strokeRect(g.x, g.y, g.w, g.h); ctx.fillStyle = '#9e9e9e'; if(g.dir === 'up') ctx.fillRect(g.x+5, g.y-20, g.w-10, 20); else ctx.fillRect(g.x+5, g.y+g.h, g.w-10, 20); }
            
            for(let ps of mapData.packstations) {
                if (imgPackstation.complete) {
                    ctx.save(); ctx.translate(ps.cx, ps.cy); ctx.rotate(ps.angle);
                    ctx.drawImage(imgPackstation, -ps.drawW/2, -ps.drawH/2, ps.drawW, ps.drawH); ctx.restore();
                }
            }

            for (let b of mapData.buildings) { ctx.fillStyle = 'rgba(0,0,0,0.3)'; ctx.fillRect(b.x + 8, b.y + 12, b.w, b.h); ctx.fillStyle = b.color; ctx.fillRect(b.x, b.y, b.w, b.h); ctx.fillStyle = b.roofColor; if(b.rType === 'h') { ctx.fillRect(b.x-5, b.y-5, b.w+10, b.h/2+5); ctx.fillStyle = 'rgba(0,0,0,0.15)'; ctx.fillRect(b.x-5, b.y+b.h/2, b.w+10, b.h/2+5); ctx.strokeStyle = '#222'; ctx.lineWidth = 1; ctx.beginPath(); ctx.moveTo(b.x-5, b.y+b.h/2); ctx.lineTo(b.x+b.w+5, b.y+b.h/2); ctx.stroke(); } else { ctx.fillRect(b.x-5, b.y-5, b.w/2+5, b.h+10); ctx.fillStyle = 'rgba(0,0,0,0.15)'; ctx.fillRect(b.x+b.w/2, b.y-5, b.w/2+5, b.h+10); ctx.strokeStyle = '#222'; ctx.lineWidth = 1; ctx.beginPath(); ctx.moveTo(b.x+b.w/2, b.y-5); ctx.lineTo(b.x+b.w/2, b.y+b.h+5); ctx.stroke(); } ctx.fillStyle = '#3e2723'; ctx.fillRect(b.doorX - 8, b.doorY - 8, 16, 16); }
            for (let t of mapData.trees) { ctx.fillStyle = 'rgba(0,0,0,0.3)'; ctx.beginPath(); ctx.arc(t.x+5, t.y+5, t.r, 0, Math.PI*2); ctx.fill(); ctx.fillStyle = '#2e7d32'; ctx.beginPath(); ctx.arc(t.x, t.y, t.r, 0, Math.PI*2); ctx.fill(); }
            
            for (let l of mapData.streetlights) {
                ctx.save(); ctx.translate(l.x, l.y);
                if (l.state === 'normal') {
                    if (imgLaterneStehend.complete && imgLaterneStehend.naturalHeight !== 0) { ctx.drawImage(imgLaterneStehend, -10, -10, 20, 20); } 
                    else { ctx.fillStyle = '#555'; ctx.beginPath(); ctx.arc(0, 0, 4, 0, Math.PI*2); ctx.fill(); ctx.fillStyle = 'rgba(255, 255, 150, 0.5)'; ctx.beginPath(); ctx.arc(0, 0, 15, 0, Math.PI*2); ctx.fill(); }
                } else if (l.state === 'knocked') {
                    ctx.rotate(l.angle + Math.PI/2); 
                    if (imgLaterneLiegend.complete && imgLaterneLiegend.naturalHeight !== 0) { ctx.drawImage(imgLaterneLiegend, -10, -30, 20, 40); }
                }
                ctx.restore();
            }

            for (let ev of mapData.events) {
                if (ev.active) {
                    let pulse = Math.sin(frameCount * 0.1); let baseR = 25 + pulse * 4;
                    let grad = ctx.createRadialGradient(ev.x, ev.y, 0, ev.x, ev.y, baseR + 25);
                    grad.addColorStop(0, 'rgba(76, 175, 80, 0.9)'); grad.addColorStop(0.4, 'rgba(76, 175, 80, 0.6)'); grad.addColorStop(0.8, 'rgba(76, 175, 80, 0.2)'); grad.addColorStop(1, 'rgba(76, 175, 80, 0)');
                    ctx.beginPath(); ctx.arc(ev.x, ev.y, baseR + 25, 0, Math.PI * 2); ctx.fillStyle = grad; ctx.fill();
                    ctx.beginPath(); ctx.arc(ev.x, ev.y, baseR, 0, Math.PI * 2); ctx.strokeStyle = '#4caf50'; ctx.lineWidth = 2; ctx.stroke();
                }
            }

            if (gameState.mission && !gameState.isDelivering) { let m = gameState.mission; ctx.beginPath(); ctx.arc(m.triggerX, m.triggerY, m.radius + Math.sin(m.pulse) * 5, 0, Math.PI * 2); ctx.fillStyle = `rgba(255, 204, 0, ${gameState.brakingForMission ? 0.6 : 0.3})`; ctx.fill(); ctx.strokeStyle = '#ffcc00'; ctx.lineWidth = 2; ctx.stroke(); ctx.beginPath(); ctx.moveTo(m.triggerX, m.triggerY); ctx.lineTo(m.doorX, m.doorY); ctx.strokeStyle = 'rgba(255,255,255,0.4)'; ctx.setLineDash([5, 5]); ctx.stroke(); ctx.setLineDash([]); }

            for(let c of competitors) { 
                ctx.save(); ctx.translate(c.x, c.y); ctx.rotate(c.angle); 
                let imgToDraw = null; const isStopped = (c.state === 'stopped' || c.state === 'stopped_reckless' || c.state === ' Prepare_Attack' || c.state === 'Attack_Sequence' || c.state === 'traffic_jam');
                if (c.brand === 'fedex') { imgToDraw = isStopped ? imgFedExStop : imgFedExDrive; } else if (c.brand === 'ups') { imgToDraw = isStopped ? imgUPStop : imgUPSDrive; } else if (c.brand === 'amazon') { imgToDraw = isStopped ? imgAmazonStop : imgAmazonDrive; } else if (c.brand === 'gls') { imgToDraw = isStopped ? imgGLSStop : imgGLSDrive; } else if (c.brand === 'dpd') { imgToDraw = (c.dpdVar === 1) ? imgDPDDrive : imgDPDDrive1; } 
                if (imgToDraw && imgToDraw.complete && imgToDraw.naturalHeight !== 0) { ctx.rotate(-Math.PI/2); ctx.drawImage(imgToDraw, -c.w/2, -c.l/2, c.w, c.l); } else { ctx.fillStyle = '#333'; ctx.fillRect(-c.l/2, -c.w/2, c.l, c.w); ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.strokeRect(-c.l/2, -c.w/2, c.l, c.w); }
                ctx.restore(); 
            }

            for(let p of projectiles) { ctx.save(); ctx.translate(p.x, p.y - Math.max(0, p.z)); ctx.rotate(frameCount * 0.2); ctx.fillStyle = '#8b4513'; ctx.fillRect(-10, -10, 20, 20); ctx.strokeStyle = '#111'; ctx.lineWidth = 2; ctx.strokeRect(-10, -10, 20, 20); ctx.fillStyle = '#d2b48c'; ctx.fillRect(-2, -10, 4, 20); ctx.restore(); }
            
            ctx.save(); ctx.translate(car.x, car.y); ctx.rotate(car.angle);
            let imgToDraw = null; if(car.type === 'bike') imgToDraw = imgBikeLeftLeg; else if(car.type === 'scooter') imgToDraw = imgScooter; else if(car.type === 'transporter') imgToDraw = imgTransporter;
            if(car.type === 'bike') {
                if(imgBikeLeftLeg.complete && imgBikeRightLeg.complete && imgBikeLeftTurn.complete && imgBikeRightTurn.complete && imgBikeDismounted.complete) {
                    let activeSprite = imgBikeLeftLeg; let wiggle = 0;
                    if (gameState.isDelivering || gameState.brakingForMission) { activeSprite = imgBikeDismounted; } else if (car.steeringAngle < -car.maxSteer * 0.3) { activeSprite = imgBikeLeftTurn; } else if (car.steeringAngle > car.maxSteer * 0.3) { activeSprite = imgBikeRightTurn; } else { let pedalFrame = Math.floor(frameCount * Math.abs(car.speed) * 0.1) % 2; activeSprite = (pedalFrame === 0) ? imgBikeLeftLeg : imgBikeRightLeg; wiggle = Math.sin(frameCount * 0.3) * 0.005; } ctx.rotate(-Math.PI/2 + wiggle); ctx.drawImage(activeSprite, -car.w/2, -car.l/2, car.w, car.l);
                }
            } else if(imgToDraw && imgToDraw.complete && imgToDraw.naturalHeight !== 0) { ctx.rotate(-Math.PI/2); ctx.drawImage(imgToDraw, -car.w/2, -car.l/2, car.w, car.l); }
            ctx.restore(); 

            if (gameState.isDelivering) { 
                ctx.save(); ctx.translate(postman.x, postman.y); 
                
                if(postman.state === 'waiting_packstation_parcel' && postman.isPackstation) { ctx.rotate(postman.lastAngle); } 
                else { ctx.rotate(postman.lastAngle); }
                
                let delivererType = (car.type === 'transporter') ? 'dhl' : 'post'; let foot = (Math.floor(frameCount / 10) % 2 === 0) ? 'left' : 'right'; if (postman.state === 'waiting' || postman.state === 'waiting_neighbor' || postman.state === 'signing' || postman.state === 'typing' || postman.state === 'waiting_packstation_parcel' || postman.state === 'inserting_card') foot = 'left'; 
                
                let counter = 'solo'; 
                if (postman.state === 'to_door' && postman.isPackstation) { counter = 'parcel'; }
                else if (postman.state === 'waiting_packstation_parcel') { counter = 'parcel'; }
                else if (postman.state === 'to_door' || postman.state === 'waiting' || postman.state === 'to_neighbor' || postman.state === 'waiting_neighbor') { 
                    if (postman.type.name === 'Brief' && delivererType === 'post') counter = 'letter'; else counter = 'parcel'; 
                } 
                else if (postman.state === 'to_original_door' || postman.state === 'inserting_card') { counter = 'solo'; }
                
                if (delivererType === 'dhl' && counter === 'letter') counter = 'parcel'; 
                let activeSprite = null; try { activeSprite = postmanImgs[delivererType][counter][foot]; } catch(e) {} if (activeSprite && activeSprite.complete && activeSprite.naturalHeight !== 0) { ctx.rotate(-Math.PI/2); ctx.drawImage(activeSprite, -20, -20, 40, 40); } 
                ctx.restore(); 
            }
            
            if (attacker.state !== 'idle') {
                ctx.save(); ctx.translate(attacker.x, attacker.y); ctx.rotate(attacker.lastAngle);
                let delivererBrand = attacker.sourceBrand; let attackerPose = attacker.pose; let activeSprite = null;
                try { activeSprite = postmanImgs.attackers[delivererBrand][attackerPose]; } catch(e) {}
                if (activeSprite && activeSprite.complete && activeSprite.naturalHeight !== 0) { ctx.rotate(-Math.PI/2); ctx.drawImage(activeSprite, -20, -20, 40, 40); }
                ctx.restore();
            }

            for(let ft of gameState.floatingTexts) { ctx.fillStyle = `rgba(255, 204, 0, ${ft.life / 60})`; ctx.font = 'bold 26px Arial'; ctx.textAlign = 'center'; ctx.fillText(ft.text, ft.x, ft.y); }
            ctx.restore(); 

            // PFEILE FÜR MISSION (Gelb)
            if (gameState.mission && !gameState.brakingForMission && !gameState.isDelivering) { 
                let sX = canvas.width/2 + (gameState.mission.triggerX - car.x); let sY = canvas.height/2 + (gameState.mission.triggerY - car.y); 
                if (sX < 40 || sX > canvas.width - 40 || sY < 40 || sY > canvas.height - 40) { 
                    let a = Math.atan2(gameState.mission.triggerY - car.y, gameState.mission.triggerX - car.x); let r = Math.min(canvas.width, canvas.height) / 2 - 60; 
                    ctx.save(); ctx.translate(canvas.width/2 + Math.cos(a)*r, canvas.height/2 + Math.sin(a)*r); 
                    ctx.rotate(a); ctx.beginPath(); ctx.moveTo(25, 0); ctx.lineTo(-15, 20); ctx.lineTo(-15, -20); ctx.fillStyle = '#ffcc00'; ctx.fill(); ctx.strokeStyle = '#000'; ctx.lineWidth = 2; ctx.stroke(); 
                    ctx.rotate(-a); ctx.fillStyle = '#111'; ctx.font = '16px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText(gameState.mission.type.icon, 0, 0);
                    ctx.restore(); 
                } 
            }
            // PFEILE FÜR EVENTS (Grün - KLEINER)
            for (let ev of mapData.events) {
                if (ev.active) {
                    let sX = canvas.width/2 + (ev.x - car.x); let sY = canvas.height/2 + (ev.y - car.y); 
                    if (sX < 40 || sX > canvas.width - 40 || sY < 40 || sY > canvas.height - 40) { 
                        let a = Math.atan2(ev.y - car.y, ev.x - car.x); let r = Math.min(canvas.width, canvas.height) / 2 - 90; 
                        ctx.save(); ctx.translate(canvas.width/2 + Math.cos(a)*r, canvas.height/2 + Math.sin(a)*r); 
                        ctx.rotate(a); ctx.beginPath(); ctx.moveTo(12, 0); ctx.lineTo(-6, 9); ctx.lineTo(-6, -9); ctx.fillStyle = '#4caf50'; ctx.fill(); ctx.strokeStyle = '#fff'; ctx.lineWidth = 1; ctx.stroke(); 
                        ctx.restore(); 
                    } 
                }
            }
        }
        function loop() { update(); draw(); requestAnimationFrame(loop); } loop();
    </script>
