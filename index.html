<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Verflixt & Zugestellt</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #2c2c2c; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; touch-action: none; user-select: none; -webkit-user-select: none; }
        canvas { display: block; width: 100vw; height: 100vh; }
        
        .overlay-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; text-align: center; }
        .vehicle-btn, .action-btn { background: #ffcc00; color: #111; border: none; padding: 15px 30px; font-size: 18px; font-weight: bold; margin: 10px; border-radius: 8px; cursor: pointer; width: 260px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); transition: transform 0.1s; }
        .vehicle-btn:active, .action-btn:active { transform: scale(0.95); }
        
        #ui { position: absolute; top: 15px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 600px; background: rgba(20, 20, 20, 0.85); backdrop-filter: blur(5px); border: 2px solid #ffcc00; border-top: 4px solid #d40511; border-radius: 12px; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; color: white; z-index: 10; pointer-events: none; box-shadow: 0 6px 20px rgba(0,0,0,0.6); display: none; box-sizing: border-box; }
        .ui-col { display: flex; flex-direction: column; flex: 1; }
        .ui-center { align-items: center; flex: 2; }
        .ui-right { align-items: flex-end; }
        .ui-lbl { font-size: 10px; color: #ffcc00; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }
        .ui-val { font-size: 20px; font-weight: bold; color: #fff; }

        /* INVENTAR SLOTS IM HEADER */
        #bonusContainer { display: flex; gap: 10px; }
        .bonus-slot { width: 40px; height: 40px; background: rgba(255,255,255,0.05); border: 1px solid #444; border-radius: 8px; display: flex; align-items: center; justify-content: center; position: relative; }
        .bonus-slot img { width: 80%; height: 80%; object-fit: contain; opacity: 0.2; filter: grayscale(1); transition: all 0.3s; }
        .bonus-slot.active { background: rgba(76, 175, 80, 0.2); border-color: #4caf50; animation: popIn 0.5s ease-out forwards; }
        .bonus-slot.active img { opacity: 1; filter: grayscale(0); }
        .bonus-badge { position: absolute; bottom: -5px; right: -5px; background: #d40511; color: white; font-size: 10px; padding: 1px 4px; border-radius: 4px; display: none; border: 1px solid white; }
        .bonus-slot.active .bonus-badge { display: block; }

        @keyframes popIn { 0% { transform: scale(0.5); } 70% { transform: scale(1.2); } 100% { transform: scale(1); } }

        #penaltyImgPopup { position: absolute; top: 30%; left: 50%; transform: translate(-50%,-50%); width: 340px; border: 4px solid #ffcc00; border-radius: 12px; background: #fff; z-index: 100; display: none; box-shadow: 0 15px 40px rgba(0,0,0,0.7); }
        #notificationImg { width: 100%; display: block; }
        
        .task-ui { display: none; position: absolute; top: 25%; left: 50%; transform: translate(-50%, 0); background: #fff; border: 4px solid #ffcc00; padding: 15px; border-radius: 12px; z-index: 50; text-align: center; box-shadow: 0 15px 40px rgba(0,0,0,0.7); }
        #sigCanvas { border: 2px dashed #ccc; background: #f9f9f9; touch-action: none; border-radius: 6px; }
        .confirm-btn { background: #ffcc00; border: none; padding: 12px; width: 100%; font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 10px; border-radius: 6px; }

        /* Mobile Controls UI */
        #mobileControls { position: absolute; bottom: 20px; left: 20px; right: 20px; display: none; justify-content: space-between; z-index: 10; pointer-events: none; }
        .control-group { display: flex; gap: 10px; pointer-events: auto; }
        .btn-control { width: 60px; height: 60px; background: rgba(255, 255, 255, 0.2); border: 2px solid rgba(255, 255, 255, 0.5); border-radius: 50%; color: white; font-size: 24px; font-weight: bold; display: flex; align-items: center; justify-content: center; user-select: none; }
        .btn-control:active { background: rgba(255, 204, 0, 0.5); border-color: #ffcc00; }
    </style>
</head>
<body>

    <audio id="gameMusic" src="MV1_P&P_-_Ein_Team_(Instrumental)_[V2].mp3" preload="auto"></audio>

    <div id="startScreen" class="overlay-screen">
        <img src="Post-Zusteller-Parcel-Right.png" style="width: 120px; margin-bottom: 15px; filter: drop-shadow(0 4px 8px black);">
        <h1 style="color: #ffcc00; margin: 0; font-size: 36px;">Verflixt & Zugestellt</h1>
        <p style="color: #ccc; margin-top: 5px; font-size: 18px; margin-bottom: 30px;">Am Ende vom Lied bist du geliefert</p>
        
        <button class="vehicle-btn" onclick="startGame('bike')">🚲 Fahrrad</button>
        <button class="vehicle-btn" onclick="startGame('scooter')">🚗 Street Scooter</button>
        <button class="vehicle-btn" onclick="startGame('transporter')">🚚 Transporter</button>
        <p style="color: #666; font-size: 14px; margin-top: 20px;">by Peertl</p>
    </div>

    <div id="gameOverScreen" class="overlay-screen" style="display:none;">
        <h1 style="color: #ffcc00; margin-bottom: 5px;">Schichtende!</h1>
        <h2>Ergebnis: <span id="finalScoreDisplay">0</span></h2>
        <p style="color: #ccc; margin-top: 5px; margin-bottom: 20px;">by Peertl</p>
        <button class="action-btn" onclick="location.reload()">Neustart</button>
    </div>

    <div id="ui">
        <div class="ui-col">
            <span class="ui-lbl">Inventar</span>
            <div id="bonusContainer">
                <div class="bonus-slot" id="slotAblageort">
                    <img src="Päckchen-Icon.png" alt="Ablageort">
                </div>
                <div class="bonus-slot" id="slotPackstation">
                    <img src="Packstation-Icon.png" alt="Packstation">
                    <span class="bonus-badge">x3</span>
                </div>
            </div>
        </div>
        <div class="ui-col ui-center">
            <span class="ui-val ui-highlight" id="timerDisplay">🎵 Lädt...</span>
            <span class="ui-lbl" id="missionInfo" style="color:#fff;">BEREIT?</span>
        </div>
        <div class="ui-col ui-right">
            <span class="ui-lbl">Erfolgreich</span>
            <span class="ui-val" id="scoreDisplay">0</span>
        </div>
    </div>

    <div id="penaltyImgPopup"><img id="notificationImg" src="Benachrichtigung.png"></div>
    <div id="signatureUI" class="task-ui"><h3>Unterschrift</h3><canvas id="sigCanvas" width="280" height="120"></canvas><button class="confirm-btn" onclick="confirmSignature()">Fertig</button></div>
    
    <canvas id="gameCanvas"></canvas>

    <div id="mobileControls">
        <div class="control-group">
            <div class="btn-control" id="btnLeft">◀</div>
            <div class="btn-control" id="btnRight">▶</div>
        </div>
        <div class="control-group">
            <div class="btn-control" id="btnRev">▼</div>
            <div class="btn-control" id="btnFwd">▲</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas'); 
        const ctx = canvas.getContext('2d');
        const bgMusic = document.getElementById('gameMusic');
        let gameActive = false; let frameCount = 0;

        let isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
        
        // Zwinge das Canvas, die volle Bildschirmgröße anzunehmen
        function resize() { 
            canvas.width = window.innerWidth; 
            canvas.height = window.innerHeight; 
        }
        window.addEventListener('resize', resize); 
        resize(); // Sofortiger Aufruf

        // BILDER LADEN
        const imgBike = new Image(); imgBike.src = 'Bike.png';
        const imgScooter = new Image(); imgScooter.src = 'Street-Scooter.png';
        const imgTransporter = new Image(); imgTransporter.src = 'Transporter.png';
        const imgBikeDismounted = new Image(); imgBikeDismounted.src = 'Bike-dismounted.png';
        const imgPackstation = new Image(); imgPackstation.src = 'Packstation.png';
        const imgLaterneStehend = new Image(); imgLaterneStehend.src = 'Laterne_stehend.png';
        const imgLaterneLiegend = new Image(); imgLaterneLiegend.src = 'Laterne_liegend.png';
        
        const iconPaketImg = new Image(); iconPaketImg.src = 'Paket-Icon.png';
        const iconPaeckchenImg = new Image(); iconPaeckchenImg.src = 'Päckchen-Icon.png';
        const iconPSImg = new Image(); iconPSImg.src = 'Packstation-Icon.png';

        const postmanImgs = { post: { parcel: { left: new Image() }, solo: { left: new Image() } }, dhl: { parcel: { left: new Image() }, solo: { left: new Image() } } };
        postmanImgs.post.parcel.left.src = 'Post-Zusteller-Parcel-Right.png'; 
        postmanImgs.post.solo.left.src = 'Post-Zusteller-Solo-Left.png';
        postmanImgs.dhl.parcel.left.src = 'DHL-Zusteller-Parcel-Left.png'; 
        postmanImgs.dhl.solo.left.src = 'DHL-Zusteller-Solo-Left.png';

        const imgFedExDrive = new Image(); imgFedExDrive.src = 'FedEx-Drive.png'; 
        const imgFedExStop = new Image(); imgFedExStop.src = 'FedEx-Stop.png';
        const imgUPSDrive = new Image(); imgUPSDrive.src = 'UPS-Drive.png'; 
        const imgUPStop = new Image(); imgUPStop.src = 'UPS-Stop.png';
        const imgAmazonDrive = new Image(); imgAmazonDrive.src = 'Amazon-Drive.png'; 
        const imgAmazonStop = new Image(); imgAmazonStop.src = 'Amazon-Stop.png';
        const imgDPDDrive = new Image(); imgDPDDrive.src = 'DPD-Drive.png'; 
        const imgGLSDrive = new Image(); imgGLSDrive.src = 'GLS-Drive.png';

        const VEHICLES = {
            bike: { l: 80, w: 35, maxSpeed: 1.25, acceleration: 0.1, braking: 0.15, maxSteer: 0.025, type: 'bike' },
            scooter: { l: 100, w: 42, maxSpeed: 2.25, acceleration: 0.15, braking: 0.20, maxSteer: 0.03, type: 'scooter' },
            transporter: { l: 125, w: 48, maxSpeed: 2.75, acceleration: 0.12, braking: 0.15, maxSteer: 0.025, type: 'transporter' }
        };

        const car = { x: 0, y: 0, l: 65, w: 32, angle: 0, speed: 0, steeringAngle: 0 };
        const mapData = { buildings: [], streetlights: [], packstations: [], events: [], roads: [] };
        const competitors = []; let projectiles = [];
        const gameState = { score: 0, isDelivering: false, mission: null, lastMissionBId: null, floatingTexts: [], penaltyActive: false, packstationBuff: false, ablageortBuff: false };
        const postman = { x: 0, y: 0, targetX: 0, targetY: 0, state: 'idle', speed: 0.7, lastAngle: 0 };
        const attacker = { x: 0, y: 0, targetX: 0, targetY: 0, state: 'idle', speed: 1.5, waitTimer: 0, type: null, sourceBrand: null, pose: 'throwing', attackingCompetitorId: null, lastAngle: 0, vx: 0, vy: 0 };

        // STEUERUNG
        const inputs = { fwd: false, rev: false, left: false, right: false };
        window.addEventListener('keydown', e => { if(e.key === 'ArrowUp') inputs.fwd = true; if(e.key === 'ArrowDown') inputs.rev = true; if(e.key === 'ArrowLeft') inputs.left = true; if(e.key === 'ArrowRight') inputs.right = true; });
        window.addEventListener('keyup', e => { if(e.key === 'ArrowUp') inputs.fwd = false; if(e.key === 'ArrowDown') inputs.rev = false; if(e.key === 'ArrowLeft') inputs.left = false; if(e.key === 'ArrowRight') inputs.right = false; });
        
        // Touch-Buttons (Falls Mobile)
        const btnFwd = document.getElementById('btnFwd');
        const btnRev = document.getElementById('btnRev');
        const btnLeft = document.getElementById('btnLeft');
        const btnRight = document.getElementById('btnRight');
        
        function bindTouch(btn, key) {
            btn.addEventListener('touchstart', (e) => { e.preventDefault(); inputs[key] = true; });
            btn.addEventListener('touchend', (e) => { e.preventDefault(); inputs[key] = false; });
            btn.addEventListener('touchcancel', (e) => { e.preventDefault(); inputs[key] = false; });
        }
        bindTouch(btnFwd, 'fwd'); bindTouch(btnRev, 'rev'); bindTouch(btnLeft, 'left'); bindTouch(btnRight, 'right');

        function updateBonusUI() {
            document.getElementById('slotPackstation').classList.toggle('active', gameState.packstationBuff);
            document.getElementById('slotAblageort').classList.toggle('active', gameState.ablageortBuff);
        }

        function spawnMission() {
            const MISSION_TYPES = [
                { name: 'Päckchen', waitTime: 120, img: iconPaeckchenImg },
                { name: 'Paket', waitTime: 180, img: iconPaketImg }
            ];
            
            // Fahrrad darf keine Packstation anfahren!
            if (gameState.packstationBuff && car.type !== 'bike') {
                let b = mapData.packstations[Math.floor(Math.random() * mapData.packstations.length)];
                gameState.mission = { bId: b.id, doorX: b.haloX, doorY: b.haloY, triggerX: b.haloX, triggerY: b.haloY, radius: 50, type: { name: 'Packstation', img: iconPSImg, waitTime: 300 }, isPS: true, pulse: 0 };
                document.getElementById('missionInfo').innerText = "Ziel: Packstation";
                gameState.packstationBuff = false;
                updateBonusUI();
                return;
            }

            let minD = 0, maxD = 9999;
            if(car.type === 'bike') { minD = 400; maxD = 1200; } else if(car.type === 'scooter') { minD = 600; maxD = 1500; } else if(car.type === 'transporter') { minD = 1200; maxD = 3000; }
            
            let availableBuildings = mapData.buildings.filter(b => { let d = Math.hypot(b.haloX - car.x, b.haloY - car.y); return d >= minD && d <= maxD && b.id !== gameState.lastMissionBId; });
            if (availableBuildings.length === 0) availableBuildings = mapData.buildings.filter(b => b.id !== gameState.lastMissionBId); 
            if (availableBuildings.length === 0) return; // Fallback
            
            let b = availableBuildings[Math.floor(Math.random() * availableBuildings.length)];
            let type = MISSION_TYPES[Math.floor(Math.random() * MISSION_TYPES.length)];
            gameState.mission = { bId: b.id, doorX: b.doorX, doorY: b.doorY, triggerX: b.haloX, triggerY: b.haloY, radius: 45, type: type, isPS: false, pulse: 0 };
            document.getElementById('missionInfo').innerText = "Ziel: " + type.name;
            updateBonusUI();
        }

        function initMap() {
            const grid = [-2000, -1000, 0, 1000, 2000];
            mapData.buildings = []; mapData.streetlights = []; mapData.packstations = []; mapData.events = []; mapData.roads = [];
            
            for(let pos of grid) {
                mapData.roads.push({ x: -2500, y: pos - 80, w: 5000, h: 160 });
                mapData.roads.push({ x: pos - 80, y: -2500, w: 160, h: 5000 });
            }

            for(let i=0; i<4; i++) {
                for(let j=0; j<4; j++) {
                    let bx = grid[i] + 150, by = grid[j] + 150;
                    mapData.buildings.push({ id: Math.random(), x: bx, y: by, w: 100, h: 100, doorX: bx + 50, doorY: by, haloX: bx + 50, haloY: by - 30 });
                    if(Math.random() < 0.3) mapData.streetlights.push({ x: bx - 20, y: by - 15, state: 'normal', timer: 0 });
                }
            }

            // Packstationen generieren
            mapData.packstations.push({ id: 'ps1', cx: 300, cy: 100, drawW: 90, drawH: 30, angle: 0, haloX: 300, haloY: 130 });
            mapData.packstations.push({ id: 'ps2', cx: -700, cy: 1100, drawW: 90, drawH: 30, angle: Math.PI, haloX: -700, haloY: 1070 });
            
            // Events generieren
            for(let i=0; i<6; i++) {
                let type = ['time', 'packstation', 'ablageort'][i % 3];
                mapData.events.push({ x: (Math.random()*3000)-1500, y: (Math.random()*3000)-1500, type: type, active: true });
            }
        }

        function startGame(vKey) {
            resize(); // Zwingt Canvas Update
            Object.assign(car, VEHICLES[vKey]);
            initMap();
            car.x = 0; car.y = -40; car.angle = 0; car.speed = 0;
            gameState.score = 0; gameActive = true;
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('ui').style.display = 'flex';
            if(isMobile) document.getElementById('mobileControls').style.display = 'flex';
            bgMusic.play(); spawnMission();
        }

        // Längere Textanzeige (180 Frames = ca. 3 Sekunden)
        function showFloatingText(txt, x, y, isKarma = false) {
            gameState.floatingTexts.push({ text: txt, x: x, y: y, life: 180, karma: isKarma });
        }

        function update() {
            if(!gameActive) return;
            
            // Verhindere grauen Rand, wenn Browser beim Start ruckelt
            if (canvas.width !== window.innerWidth || canvas.height !== window.innerHeight) resize();
            
            frameCount++;
            let timeLeft = Math.max(0, bgMusic.duration - bgMusic.currentTime);
            document.getElementById('timerDisplay').innerText = `⏱️ ${Math.floor(timeLeft/60)}:${Math.floor(timeLeft%60).toString().padStart(2,'0')}`;

            // Events (Grosse Hitbox: 80 Pixel)
            for(let ev of mapData.events) {
                if(ev.active && Math.hypot(car.x - ev.x, car.y - ev.y) < 80) {
                    if(ev.type === 'packstation' && car.type === 'bike') {
                        showFloatingText("Nicht für Fahrrad!", car.x, car.y - 50);
                        ev.active = false; 
                    } else {
                        ev.active = false;
                        if(ev.type === 'time') { bgMusic.currentTime = Math.max(0, bgMusic.currentTime - 15); showFloatingText("+ 15 Sekunden", car.x, car.y - 50); }
                        else if(ev.type === 'packstation') { gameState.packstationBuff = true; showFloatingText("Packstation", car.x, car.y - 50); }
                        else if(ev.type === 'ablageort') { gameState.ablageortBuff = true; showFloatingText("Ablageort", car.x, car.y - 50); }
                        updateBonusUI();
                    }
                }
            }

            // Zustell-Logik
            if(gameState.isDelivering) {
                let dx = postman.targetX - postman.x, dy = postman.targetY - postman.y;
                let dist = Math.hypot(dx, dy);
                if(dist > 2) {
                    postman.x += (dx/dist) * postman.speed; postman.y += (dy/dist) * postman.speed;
                    postman.lastAngle = Math.atan2(dy, dx);
                } else if(postman.state === 'to_door') {
                    // FAHRRAD IST IMMUN GEGEN NACHBAR-STRAFE
                    if(gameState.penaltyActive && car.type !== 'bike') {
                        document.getElementById('missionInfo').innerText = "Ich fürchte, da ist niemand zu Hause...";
                        postman.state = 'to_neighbor';
                        postman.origX = postman.x; postman.origY = postman.y;
                        postman.targetX += 150; 
                    } else if(gameState.ablageortBuff) {
                        // ABLAGEORT HEILT STRAFE & IST SOFORT FERTIG
                        gameState.ablageortBuff = false; gameState.penaltyActive = false; updateBonusUI();
                        finishMission();
                    } else {
                        postman.state = 'waiting'; postman.timer = 120;
                    }
                } else if(postman.state === 'to_neighbor') {
                    postman.state = 'at_neighbor'; postman.timer = 100;
                } else if(postman.state === 'at_neighbor') {
                    postman.timer--;
                    if(postman.timer <= 0) {
                        document.getElementById('penaltyImgPopup').style.display = 'block';
                        postman.state = 'to_orig_door';
                        postman.targetX = postman.origX; postman.targetY = postman.origY;
                    }
                } else if(postman.state === 'to_orig_door') {
                    document.getElementById('penaltyImgPopup').style.display = 'none';
                    gameState.penaltyActive = false;
                    finishMission();
                } else if(postman.state === 'waiting') {
                    postman.timer--; if(postman.timer <= 0) finishMission();
                } else if(postman.state === 'to_car') {
                    gameState.isDelivering = false; spawnMission();
                }
            } else {
                // Fahren & Kollisionen berechnen
                let onRoad = false;
                for(let r of mapData.roads) if(car.x > r.x && car.x < r.x+r.w && car.y > r.y && car.y < r.y+r.h) onRoad = true;
                
                // RASEN BREMST ALLE FAHRZEUGE EXTREM AB
                let speedLimit = onRoad ? car.maxSpeed : car.maxSpeed * 0.2; 
                
                if(inputs.fwd) car.speed += car.acceleration; else if (inputs.rev) car.speed -= car.acceleration; else car.speed *= 0.95;
                car.speed = Math.max(-speedLimit/2, Math.min(speedLimit, car.speed));

                let nextX = car.x + Math.cos(car.angle) * car.speed;
                let nextY = car.y + Math.sin(car.angle) * car.speed;
                
                let hitSolid = false;
                // Gebäude & Packstationen
                for(let b of mapData.buildings) if(Math.max(nextX, Math.min(nextX + car.w, b.x)) !== nextX && Math.max(nextY, Math.min(nextY + car.l, b.y)) !== nextY) hitSolid=true;
                for(let ps of mapData.packstations) if(Math.hypot(nextX - ps.cx, nextY - ps.cy) < 45) hitSolid = true;

                // Laternen
                for(let l of mapData.streetlights) {
                    if(l.state === 'normal' && Math.hypot(nextX - l.x, nextY - l.y) < 30) {
                        if(car.type === 'bike') { 
                            hitSolid = true; // Fahrrad kann nicht umfahren
                        } else { 
                            l.state = 'knocked'; l.timer = 120; l.angle = car.angle; 
                            gameState.penaltyActive = true; showFloatingText("- Karma", car.x, car.y - 50, true); 
                        }
                    }
                }

                // KI-Autos Rammen
                let hitAi = false; let pushAi = false;
                for(let c of competitors) { 
                    if(Math.hypot(nextX - c.x, nextY - c.y) < 35) {
                        hitAi = true;
                        // NUR TRANSPORTER SCHIEBT WEG
                        if (car.type === 'transporter') {
                            pushAi = true; car.speed *= 0.8; 
                            c.x += Math.cos(car.angle) * Math.max(3, Math.abs(car.speed) * 1.5); 
                            c.y += Math.sin(car.angle) * Math.max(3, Math.abs(car.speed) * 1.5);
                            c.state = ' Prepare_Attack'; c.timer = 10;
                        } else {
                            car.speed *= 0.1; // Harter Stop
                            if (car.type === 'scooter') { c.state = ' Prepare_Attack'; c.timer = 10; }
                        }
                    }
                }

                // Attacker auf der Straße umfahren
                if (attacker.state !== 'idle' && !attacker.state.startsWith('hit_ragdoll')) {
                    if(Math.hypot(nextX - attacker.x, nextY - attacker.y) < 25) {
                        if (car.type === 'bike') { 
                            // Fahrrad schiebt nur leicht beiseite, keine Strafe
                            car.speed *= 0.5; attacker.x += Math.cos(car.angle)*4; attacker.y += Math.sin(car.angle)*4; 
                        } else { 
                            // Transporter / Scooter nietet um
                            attacker.state = 'hit_ragdoll'; attacker.vx = Math.cos(car.angle) * 6; attacker.vy = Math.sin(car.angle) * 6; attacker.timer = 60; 
                            gameState.penaltyActive = true; showFloatingText("- Karma", car.x, car.y - 40, true); 
                        }
                    }
                }

                // Letzte Bewegung anwenden
                if (hitSolid) { 
                    car.speed *= 0.2; car.x -= Math.cos(car.angle)*3; car.y -= Math.sin(car.angle)*3; 
                } else if (!hitAi || pushAi) { 
                    car.x = nextX; car.y = nextY; 
                }

                if(inputs.left) car.angle -= car.maxSteer; if(inputs.right) car.angle += car.maxSteer;

                if(gameState.mission && Math.hypot(car.x - gameState.mission.triggerX, car.y - gameState.mission.triggerY) < 60) {
                    startDelivery();
                }
            }
            for(let i=gameState.floatingTexts.length-1; i>=0; i--) { 
                gameState.floatingTexts[i].y -= 0.4; gameState.floatingTexts[i].life--;
                if(gameState.floatingTexts[i].life <= 0) gameState.floatingTexts.splice(i, 1);
            }
        }

        function finishMission() {
            gameState.score += (gameState.mission.isPS ? 3 : 1); document.getElementById('scoreDisplay').innerText = gameState.score;
            postman.state = 'to_car'; postman.targetX = car.x; postman.targetY = car.y;
            showFloatingText("Zustellung OK", postman.x, postman.y - 30);
        }

        function draw() {
            ctx.fillStyle = '#4caf50'; ctx.fillRect(0,0,canvas.width,canvas.height);
            if(!gameActive) return;
            ctx.save(); ctx.translate(canvas.width/2 - car.x, canvas.height/2 - car.y);

            // Straßen
            for(let r of mapData.roads) { ctx.fillStyle = '#555'; ctx.fillRect(r.x, r.y, r.w, r.h); }
            
            // Packstation
            for(let ps of mapData.packstations) { ctx.save(); ctx.translate(ps.cx, ps.cy); ctx.rotate(ps.angle); if (imgPackstation.complete) ctx.drawImage(imgPackstation, -45, -15, 90, 30); ctx.restore(); }
            
            // Häuser
            for(let b of mapData.buildings) { ctx.fillStyle = '#8d6e63'; ctx.fillRect(b.x, b.y, b.w, b.h); ctx.fillStyle = '#3e2723'; ctx.fillRect(b.doorX-5, b.doorY-5, 10, 10); }
            
            // Laternen
            for(let l of mapData.streetlights) {
                if(l.state === 'normal' && imgLaterneStehend.complete) {
                    ctx.drawImage(imgLaterneStehend, l.x-10, l.y-10, 20, 20);
                } else if (l.state === 'knocked' && imgLaterneLiegend.complete) { 
                    ctx.save(); ctx.translate(l.x, l.y); ctx.rotate(l.angle + Math.PI/2); ctx.drawImage(imgLaterneLiegend, -10, -30, 20, 40); ctx.restore(); 
                }
            }

            // Grüne Events
            for(let ev of mapData.events) {
                if(!ev.active) continue;
                let grad = ctx.createRadialGradient(ev.x, ev.y, 0, ev.x, ev.y, 60);
                grad.addColorStop(0, 'rgba(76,175,80,0.6)'); grad.addColorStop(1, 'rgba(76,175,80,0)');
                ctx.fillStyle = grad; ctx.beginPath(); ctx.arc(ev.x, ev.y, 60, 0, Math.PI*2); ctx.fill();
            }

            // Missions-Marker
            if(gameState.mission && !gameState.isDelivering) {
                ctx.strokeStyle = '#ffcc00'; ctx.lineWidth = 3; ctx.beginPath(); ctx.arc(gameState.mission.triggerX, gameState.mission.triggerY, 45, 0, Math.PI*2); ctx.stroke();
                if(gameState.mission.type.img && gameState.mission.type.img.complete) {
                    ctx.drawImage(gameState.mission.type.img, gameState.mission.triggerX-15, gameState.mission.triggerY-15, 30, 30);
                }
            }

            // Auto
            ctx.save(); ctx.translate(car.x, car.y); ctx.rotate(car.angle);
            let img = car.type === 'bike' ? imgBike : (car.type === 'scooter' ? imgScooter : imgTransporter);
            ctx.rotate(Math.PI/2); ctx.drawImage(img, -car.w/2, -car.l/2, car.w, car.l); ctx.restore();

            // Postbote
            if(gameState.isDelivering) {
                ctx.save(); ctx.translate(postman.x, postman.y); ctx.rotate(postman.lastAngle + Math.PI/2);
                let pImg = (postman.state === 'to_car') ? postmanImgs.post.solo.left : postmanImgs.post.parcel.left;
                ctx.drawImage(pImg, -20, -20, 40, 40); ctx.restore();
            }

            // Pop-Up Texte
            for(let ft of gameState.floatingTexts) {
                ctx.fillStyle = ft.karma ? '#ff4444' : '#ffcc00'; ctx.font = 'bold 24px Arial'; ctx.textAlign = 'center';
                ctx.fillText(ft.text, ft.x, ft.y);
            }
            ctx.restore();

            // Wegweiser Pfeile (Rand des Bildschirms)
            if(gameState.mission && !gameState.isDelivering) {
                let angle = Math.atan2(gameState.mission.triggerY - car.y, gameState.mission.triggerX - car.x);
                ctx.save(); ctx.translate(canvas.width/2 + Math.cos(angle)*150, canvas.height/2 + Math.sin(angle)*150);
                ctx.rotate(angle); ctx.fillStyle = '#ffcc00'; ctx.beginPath(); ctx.moveTo(25,0); ctx.lineTo(-10,12); ctx.lineTo(-10,-12); ctx.fill();
                ctx.rotate(-angle); 
                if(gameState.mission.type.img && gameState.mission.type.img.complete) { ctx.drawImage(gameState.mission.type.img, -12, -35, 24, 24); }
                ctx.restore();
            }
        }

        function loop() { update(); draw(); requestAnimationFrame(loop); }
        loop();
    </script>
</body>
</html>
