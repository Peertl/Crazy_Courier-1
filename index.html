<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DHL GTA - Missions & Curves</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #333; font-family: sans-serif; touch-action: none; user-select: none; -webkit-user-select: none; }
        canvas { display: block; }
        
        #ui { position: absolute; top: 10px; left: 10px; color: white; background: rgba(0, 0, 0, 0.7); padding: 15px; border-radius: 8px; pointer-events: none; z-index: 10; border-left: 4px solid #ffcc00; }
        h3 { margin: 0 0 5px 0; color: #ffcc00; }
        #speedo, #scoreDisplay { font-size: 18px; font-weight: bold; margin-top: 5px; }
        #missionInfo { margin-top: 10px; color: #fff; font-size: 14px; }
        
        #touchControllerContainer {
            position: absolute; bottom: 20px; right: 20px; width: 180px; height: 180px;
            background: rgba(0, 0, 0, 0.3); border-radius: 50%; z-index: 10;
            border: 2px solid rgba(255, 255, 255, 0.2); box-shadow: 0 0 15px rgba(0,0,0,0.5);
        }
        #touchControllerCanvas { width: 100%; height: 100%; }

        /* Liefer-Fortschrittsbalken */
        #deliveryUI {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.8); padding: 20px; border-radius: 10px; border: 2px solid #ffcc00;
            color: white; text-align: center; display: none; z-index: 20;
        }
        #progressBar { width: 200px; height: 20px; background: #333; margin-top: 10px; border-radius: 10px; overflow: hidden; }
        #progressFill { width: 0%; height: 100%; background: #ffcc00; transition: width 0.1s linear; }
    </style>
</head>
<body>

    <div id="ui">
        <h3>DHL Zusteller</h3>
        <div id="scoreDisplay">Pakete: 0</div>
        <div id="speedo">0 km/h</div>
        <div id="missionInfo">Warte auf Auftrag...</div>
    </div>

    <div id="deliveryUI">
        <h2 id="deliveryTitle" style="margin:0 0 10px 0; color:#ffcc00;">Zustellung...</h2>
        <div id="progressBar"><div id="progressFill"></div></div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div id="touchControllerContainer">
        <canvas id="touchControllerCanvas" width="180" height="180"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const ctrlCanvas = document.getElementById('touchControllerCanvas');
        const cctx = ctrlCanvas.getContext('2d');

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // --- WELT & KARTE (Jetzt mit Kurven) ---
        const worldBounds = { minX: -2000, minY: -2000, maxX: 2000, maxY: 2000 };
        
        const mapData = {
            roads: [],       // Rechteckige Straßen
            curvedRoads: [], // Kurven
            buildings: []    // Gebäude
        };

        // Straßennetz anlegen
        mapData.roads.push({ x: -100, y: -2000, w: 200, h: 4000 }); // Hauptstraße N-S
        mapData.roads.push({ x: -2000, y: -100, w: 4000, h: 200 }); // Hauptstraße W-O
        mapData.roads.push({ x: -800, y: -800, w: 1600, h: 100 });  // Nebenstraße Nord
        mapData.roads.push({ x: -800, y: -800, w: 100, h: 1600 });  // Nebenstraße West

        // Echte Kurven anlegen (Zentrum X, Zentrum Y, Radius, Breite, Startwinkel, Endwinkel)
        mapData.curvedRoads.push({ cx: -700, cy: -700, r: 100, w: 100, start: Math.PI, end: 1.5 * Math.PI }); // Kurve Nord-West
        mapData.curvedRoads.push({ cx: 700, cy: -700, r: 100, w: 100, start: 1.5 * Math.PI, end: 2 * Math.PI }); // Kurve Nord-Ost

        // Ein paar Gebäude
        mapData.buildings.push({ x: -300, y: -400, w: 150, h: 150 });
        mapData.buildings.push({ x: 150, y: -400, w: 200, h: 100 });
        mapData.buildings.push({ x: -600, y: 200, w: 120, h: 120 });
        mapData.buildings.push({ x: 300, y: 300, w: 150, h: 150 });

        // --- DAS MISSIONS-SYSTEM ---
        const gameState = {
            score: 0,
            isDelivering: false,
            deliveryTimer: 0,
            deliveryDuration: 0,
            mission: null
        };

        const MISSION_TYPES = [
            { name: 'Brief', time: 30, color: '#fff', icon: '✉️' },        // 0.5 Sekunden
            { name: 'Päckchen', time: 120, color: '#f0ad4e', icon: '📦' }, // 2 Sekunden
            { name: 'Paket', time: 240, color: '#8b4513', icon: '🎁' }     // 4 Sekunden (Unterschrift)
        ];

        function spawnMission() {
            // Zufälliges Gebäude suchen und Markierung davor setzen
            let b = mapData.buildings[Math.floor(Math.random() * mapData.buildings.length)];
            let type = MISSION_TYPES[Math.floor(Math.random() * MISSION_TYPES.length)];
            
            // Punkt vor dem Gebäude
            gameState.mission = {
                x: b.x + b.w / 2,
                y: b.y + b.h + 60, // Markierung auf der Straße vor dem Haus
                radius: 40,
                type: type,
                pulse: 0
            };
            document.getElementById('missionInfo').innerText = `Neue Sendung: ${type.name} ${type.icon}`;
        }
        spawnMission(); // Erstes Paket spawnen

        // --- FAHRZEUG PHYSIK ---
        const car = {
            x: 0, y: 0,
            width: 25, height: 50,
            angle: 0,
            speed: 0,
            maxSpeed: 12,
            maxReverseSpeed: 6,
            acceleration: 0.25,
            braking: 0.4,
            friction: 0.95,      // Ausrollen
            offroadFriction: 0.85,
            steeringAngle: 0,
            maxSteer: 0.06,      // Fester, realistischer Lenkeinschlag
            steeringInput: 0     // -1 (Links), 0 (Gerade), 1 (Rechts)
        };

        const inputs = { fwd: false, rev: false, left: false, right: false };

        // --- TOUCH-STEUERUNG (Starre 6 Felder) ---
        function drawTouchController(activeSector) {
            cctx.clearRect(0, 0, ctrlCanvas.width, ctrlCanvas.height);
            let w = ctrlCanvas.width; let h = ctrlCanvas.height; let cx = w/2; let cy = h/2;

            // Mittellinie
            cctx.strokeStyle = 'rgba(255,255,255,0.3)'; cctx.lineWidth = 2;
            cctx.beginPath(); cctx.moveTo(0, cy); cctx.lineTo(w, cy); cctx.stroke();

            // Sektoren zeichnen (Visuell)
            function drawSector(start, end, isActive, label) {
                cctx.beginPath();
                cctx.moveTo(cx, cy);
                cctx.arc(cx, cy, w/2, start, end);
                cctx.lineTo(cx, cy);
                cctx.fillStyle = isActive ? 'rgba(255, 204, 0, 0.5)' : 'rgba(255, 255, 255, 0.05)';
                cctx.fill();
                cctx.stroke();
                
                // Pfeile zeichnen (simpel)
                let midAngle = start + (end - start)/2;
                let textX = cx + Math.cos(midAngle) * (w/3) - 5;
                let textY = cy + Math.sin(midAngle) * (w/3) + 5;
                cctx.fillStyle = 'rgba(255,255,255,0.7)';
                cctx.font = '20px Arial';
                cctx.fillText(label, textX, textY);
            }

            // Oben (Vorwärts)
            drawSector(Math.PI, 4*Math.PI/3, activeSector === 0, '↖'); // Oben Links
            drawSector(4*Math.PI/3, 5*Math.PI/3, activeSector === 1, '↑'); // Oben Mitte
            drawSector(5*Math.PI/3, 2*Math.PI, activeSector === 2, '↗'); // Oben Rechts
            
            // Unten (Rückwärts)
            drawSector(0, Math.PI/3, activeSector === 3, '↘'); // Unten Rechts
            drawSector(Math.PI/3, 2*Math.PI/3, activeSector === 4, '↓'); // Unten Mitte
            drawSector(2*Math.PI/3, Math.PI, activeSector === 5, '↙'); // Unten Links
        }
        drawTouchController(-1);

        const ctrlContainer = document.getElementById('touchControllerContainer');
        
        function handleTouch(e) {
            e.preventDefault();
            if (e.touches.length === 0) {
                inputs.fwd = inputs.rev = inputs.left = inputs.right = false;
                drawTouchController(-1);
                return;
            }

            const touch = e.touches[0];
            const rect = ctrlContainer.getBoundingClientRect();
            
            // Prüfen, ob Touch im Controller ist
            if (touch.clientX >= rect.left && touch.clientX <= rect.right &&
                touch.clientY >= rect.top && touch.clientY <= rect.bottom) {
                
                let dx = touch.clientX - (rect.left + rect.width/2);
                let dy = touch.clientY - (rect.top + rect.height/2);
                
                // Winkel berechnen (-PI bis PI)
                let angle = Math.atan2(dy, dx); 
                if (angle < 0) angle += 2 * Math.PI; // Umwandeln in 0 bis 2*PI

                inputs.fwd = inputs.rev = inputs.left = inputs.right = false;
                let sector = -1;

                // Kuchenstücke auswerten
                if (angle >= Math.PI && angle < 4*Math.PI/3) { sector = 0; inputs.fwd = true; inputs.left = true; } // Oben Links
                else if (angle >= 4*Math.PI/3 && angle < 5*Math.PI/3) { sector = 1; inputs.fwd = true; } // Oben Mitte
                else if (angle >= 5*Math.PI/3 && angle <= 2*Math.PI) { sector = 2; inputs.fwd = true; inputs.right = true; } // Oben Rechts
                else if (angle >= 0 && angle < Math.PI/3) { sector = 3; inputs.rev = true; inputs.right = true; } // Unten Rechts
                else if (angle >= Math.PI/3 && angle < 2*Math.PI/3) { sector = 4; inputs.rev = true; } // Unten Mitte
                else if (angle >= 2*Math.PI/3 && angle < Math.PI) { sector = 5; inputs.rev = true; inputs.left = true; } // Unten Links

                drawTouchController(sector);
            }
        }

        ctrlContainer.addEventListener('touchstart', handleTouch, {passive: false});
        ctrlContainer.addEventListener('touchmove', handleTouch, {passive: false});
        ctrlContainer.addEventListener('touchend', () => {
            inputs.fwd = inputs.rev = inputs.left = inputs.right = false;
            drawTouchController(-1);
        });

        // Tastatur-Fallback für PC
        window.addEventListener('keydown', e => {
            if(e.key === 'ArrowUp') inputs.fwd = true;
            if(e.key === 'ArrowDown') inputs.rev = true;
            if(e.key === 'ArrowLeft') inputs.left = true;
            if(e.key === 'ArrowRight') inputs.right = true;
        });
        window.addEventListener('keyup', e => {
            if(e.key === 'ArrowUp') inputs.fwd = false;
            if(e.key === 'ArrowDown') inputs.rev = false;
            if(e.key === 'ArrowLeft') inputs.left = false;
            if(e.key === 'ArrowRight') inputs.right = false;
        });

        // --- SPIEL-LOGIK ---
        function update() {
            if (gameState.isDelivering) {
                // Auslieferungs-Phase
                gameState.deliveryTimer++;
                let progress = (gameState.deliveryTimer / gameState.deliveryDuration) * 100;
                document.getElementById('progressFill').style.width = progress + '%';

                if (gameState.deliveryTimer >= gameState.deliveryDuration) {
                    // Zustellung abgeschlossen
                    gameState.isDelivering = false;
                    gameState.score++;
                    document.getElementById('scoreDisplay').innerText = `Pakete: ${gameState.score}`;
                    document.getElementById('deliveryUI').style.display = 'none';
                    spawnMission();
                }
                return; // Keine Bewegung während der Zustellung
            }

            // 1. Beschleunigung & Bremsen (Realistisch)
            if (inputs.fwd) {
                if (car.speed < 0) car.speed += car.braking; // Bremsen wenn rückwärts rollend
                else car.speed += car.acceleration;
            } else if (inputs.rev) {
                if (car.speed > 0) car.speed -= car.braking; // Bremsen wenn vorwärts rollend
                else car.speed -= car.acceleration;
            } else {
                car.speed *= car.friction; // Ausrollen (Friction)
            }

            // Geschwindigkeit begrenzen
            car.speed = Math.max(-car.maxReverseSpeed, Math.min(car.maxSpeed, car.speed));
            if(Math.abs(car.speed) < 0.1) car.speed = 0;

            // 2. Lenkung (Nur wenn das Auto rollt!)
            if (Math.abs(car.speed) > 0) {
                car.steeringInput = 0;
                if (inputs.left) car.steeringInput = -1;
                if (inputs.right) car.steeringInput = 1;

                // Weiches Einlenken
                car.steeringAngle += (car.steeringInput * car.maxSteer - car.steeringAngle) * 0.2;
                
                // Rotationslogik: Rückwärtsfahren kehrt die Drehrichtung optisch um
                let dir = car.speed > 0 ? 1 : -1;
                // Wendekreis ist bei höheren Geschwindigkeiten minimal größer
                let turnFactor = 1 - (Math.abs(car.speed) / car.maxSpeed) * 0.2; 
                car.angle += car.steeringAngle * dir * turnFactor * (Math.abs(car.speed) / 5);
            }

            // 3. Bewegung
            car.x += Math.cos(car.angle - Math.PI / 2) * car.speed;
            car.y += Math.sin(car.angle - Math.PI / 2) * car.speed;

            // 4. Mission prüfen (Kollision mit Halo)
            if (gameState.mission) {
                gameState.mission.pulse += 0.05; // Animation für das Halo
                let dist = Math.sqrt(Math.pow(car.x - gameState.mission.x, 2) + Math.pow(car.y - gameState.mission.y, 2));
                if (dist < gameState.mission.radius + 10) {
                    // Ziel erreicht!
                    gameState.isDelivering = true;
                    gameState.deliveryTimer = 0;
                    gameState.deliveryDuration = gameState.mission.type.time;
                    car.speed = 0; // Sofort anhalten
                    document.getElementById('deliveryTitle').innerText = `${gameState.mission.type.name} wird zugestellt...`;
                    document.getElementById('deliveryUI').style.display = 'block';
                    document.getElementById('progressFill').style.width = '0%';
                }
            }

            document.getElementById('speedo').innerText = Math.round(Math.abs(car.speed) * 3) + ' km/h';
        }

        // --- RENDERING ---
        function draw() {
            ctx.fillStyle = '#4caf50'; // Wiese
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.save();
            ctx.translate(canvas.width / 2 - car.x, canvas.height / 2 - car.y); // Kamera auf Auto zentrieren

            // Straßen zeichnen (Rechtecke)
            ctx.fillStyle = '#555';
            for (let r of mapData.roads) {
                ctx.fillRect(r.x, r.y, r.w, r.h);
            }

            // Kurven zeichnen
            for (let c of mapData.curvedRoads) {
                ctx.beginPath();
                ctx.arc(c.cx, c.cy, c.r, c.start, c.end);
                ctx.strokeStyle = '#555';
                ctx.lineWidth = c.w;
                ctx.stroke();
            }

            // Gebäude zeichnen
            for (let b of mapData.buildings) {
                ctx.fillStyle = '#777'; ctx.fillRect(b.x, b.y, b.w, b.h);
                ctx.strokeStyle = '#222'; ctx.lineWidth = 2; ctx.strokeRect(b.x, b.y, b.w, b.h);
                // Kleines Flachdach-Detail
                ctx.fillStyle = '#666'; ctx.fillRect(b.x+10, b.y+10, b.w-20, b.h-20); 
            }

            // Missions-Ziel (Halo) zeichnen
            if (gameState.mission && !gameState.isDelivering) {
                let m = gameState.mission;
                // Pulsierender Halo-Schein
                ctx.beginPath();
                ctx.arc(m.x, m.y, m.radius + Math.sin(m.pulse) * 5, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 204, 0, 0.4)`;
                ctx.fill();
                
                // Innerer Kreis
                ctx.beginPath();
                ctx.arc(m.x, m.y, 15, 0, Math.PI * 2);
                ctx.fillStyle = m.type.color;
                ctx.fill();
                ctx.strokeStyle = '#000'; ctx.lineWidth = 2; ctx.stroke();

                // Icon (Emoji) zeichnen
                ctx.fillStyle = '#000';
                ctx.font = '20px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(m.type.icon, m.x, m.y);
            }

            // --- AUTO ZEICHNEN ---
            ctx.save();
            ctx.translate(car.x, car.y);
            ctx.rotate(car.angle);

            ctx.fillStyle = '#ffcc00'; ctx.fillRect(-car.width/2, -car.height/2, car.width, car.height); // Karosserie
            ctx.fillStyle = '#1e90ff'; ctx.fillRect(-car.width/2 + 3, -car.height/2 + 5, car.width - 6, 12); // Frontscheibe
            ctx.fillStyle = '#d32f2f'; ctx.beginPath(); ctx.arc(0, 2, 4, 0, Math.PI*2); ctx.fill(); // Posthorn
            
            // Räder (Vorderräder lenken sichtbar mit)
            ctx.fillStyle = '#111';
            const wX = car.width/2 + 1, wY = car.height/2 - 8, wW = 5, wH = 12;
            ctx.fillRect(-wX - wW, wY - wH/2, wW, wH); // Hinten links
            ctx.fillRect(wX, wY - wH/2, wW, wH);       // Hinten rechts
            
            ctx.save(); ctx.translate(-wX - wW/2, -wY); ctx.rotate(car.steeringAngle * 4); ctx.fillRect(-wW/2, -wH/2, wW, wH); ctx.restore(); // Vorne links
            ctx.save(); ctx.translate(wX + wW/2, -wY); ctx.rotate(car.steeringAngle * 4); ctx.fillRect(-wW/2, -wH/2, wW, wH); ctx.restore(); // Vorne rechts

            ctx.restore(); // Auto Ende
            ctx.restore(); // Kamera Ende

            // --- NAVIGATIONS-PFEIL (Wenn Ziel nicht im Bild ist) ---
            if (gameState.mission && !gameState.isDelivering) {
                // Prüfen ob Mission im Viewport ist
                let screenX = canvas.width/2 + (gameState.mission.x - car.x);
                let screenY = canvas.height/2 + (gameState.mission.y - car.y);
                
                let margin = 40;
                if (screenX < margin || screenX > canvas.width - margin || 
                    screenY < margin || screenY > canvas.height - margin) {
                    
                    // Winkel vom Auto zur Mission
                    let dx = gameState.mission.x - car.x;
                    let dy = gameState.mission.y - car.y;
                    let angleToMission = Math.atan2(dy, dx);

                    // Pfeil-Position am Bildschirmrand berechnen
                    let arrowR = Math.min(canvas.width, canvas.height) / 2 - 50;
                    let arrowX = canvas.width/2 + Math.cos(angleToMission) * arrowR;
                    let arrowY = canvas.height/2 + Math.sin(angleToMission) * arrowR;

                    // Pfeil zeichnen
                    ctx.save();
                    ctx.translate(arrowX, arrowY);
                    ctx.rotate(angleToMission);
                    ctx.beginPath();
                    ctx.moveTo(15, 0);
                    ctx.lineTo(-15, 10);
                    ctx.lineTo(-15, -10);
                    ctx.fillStyle = '#ffcc00';
                    ctx.fill();
                    ctx.strokeStyle = '#000'; ctx.lineWidth = 2; ctx.stroke();
                    ctx.restore();
                }
            }
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }
        loop();
    </script>
</body>
</html>
