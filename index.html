<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DHL GTA - Walking Postman & Realistic City</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #333; font-family: sans-serif; touch-action: none; user-select: none; -webkit-user-select: none; }
        canvas { display: block; }
        
        #ui { position: absolute; top: 10px; left: 10px; color: white; background: rgba(0, 0, 0, 0.7); padding: 15px; border-radius: 8px; pointer-events: none; z-index: 10; border-left: 4px solid #ffcc00; }
        h3 { margin: 0 0 5px 0; color: #ffcc00; }
        #scoreDisplay { font-size: 22px; font-weight: bold; margin-top: 5px; }
        #speedo { font-size: 16px; margin-top: 5px; color: #ccc; }
        #missionInfo { margin-top: 10px; color: #fff; font-size: 14px; }
        
        #touchControllerContainer {
            position: absolute; bottom: 20px; right: 20px; width: 220px; height: 220px;
            background: rgba(0, 0, 0, 0.4); border-radius: 50%; z-index: 10;
            border: 3px solid rgba(255, 255, 255, 0.3); box-shadow: 0 0 20px rgba(0,0,0,0.6);
        }
        #touchControllerCanvas { width: 100%; height: 100%; }
    </style>
</head>
<body>

    <div id="ui">
        <h3>DHL Zusteller</h3>
        <div id="scoreDisplay">Pakete: 0</div>
        <div id="speedo">0 km/h</div>
        <div id="missionInfo">Suche nach Sendungen...</div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div id="touchControllerContainer">
        <canvas id="touchControllerCanvas" width="220" height="220"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const ctrlCanvas = document.getElementById('touchControllerCanvas');
        const cctx = ctrlCanvas.getContext('2d');

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // --- WELT & KARTE (Realistischer, größer) ---
        const mapData = {
            roads: [],
            buildings: []
        };

        // Straßennetz (breitere Straßen, realistischeres Layout)
        const roadWidth = 200;
        // Waagerechte Straßen
        for(let y = -2000; y <= 2000; y += 800) {
            mapData.roads.push({ x: -2500, y: y, w: 5000, h: roadWidth });
        }
        // Senkrechte Straßen
        for(let x = -2000; x <= 2000; x += 800) {
            mapData.roads.push({ x: x, y: -2500, w: roadWidth, h: 5000 });
        }

        // Gebäude (Häuserblocks, aneinandergereiht)
        for(let blockY = -1800; blockY < 2000; blockY += 800) {
            for(let blockX = -1800; blockX < 2000; blockX += 800) {
                // Ein Block besteht aus mehreren Reihenhäusern
                for(let i = 0; i < 4; i++) {
                    // Hausreihe Oben im Block
                    mapData.buildings.push({ x: blockX + i*130 + 20, y: blockY + 20, w: 120, h: 180 });
                    // Hausreihe Unten im Block
                    mapData.buildings.push({ x: blockX + i*130 + 20, y: blockY + 400, w: 120, h: 180 });
                }
            }
        }

        // --- MISSIONS- & ZUSTELL-SYSTEM ---
        const gameState = {
            score: 0,
            isDelivering: false,
            mission: null,
            floatingTexts: [] // Für den "+1" Aufplopp-Effekt
        };

        const MISSION_TYPES = [
            { name: 'Brief', waitTime: 30, color: '#fff', icon: '✉️' },       // ca. 0.5s warten
            { name: 'Päckchen', waitTime: 90, color: '#f0ad4e', icon: '📦' }, // ca. 1.5s warten
            { name: 'Paket', waitTime: 180, color: '#8b4513', icon: '🎁' }    // ca. 3s warten
        ];

        const postman = {
            x: 0, y: 0,
            targetX: 0, targetY: 0,
            state: 'idle', // 'to_door', 'waiting', 'to_car'
            speed: 3,
            waitTimer: 0
        };

        function spawnMission() {
            let b = mapData.buildings[Math.floor(Math.random() * mapData.buildings.length)];
            let type = MISSION_TYPES[Math.floor(Math.random() * MISSION_TYPES.length)];
            
            // Markierung genau an die Haustür (untere Kante des Gebäudes)
            gameState.mission = {
                doorX: b.x + b.w / 2,
                doorY: b.y + b.h + 10, 
                triggerX: b.x + b.w / 2,
                triggerY: b.y + b.h + 60, // Bereich auf der Straße zum Halten
                radius: 50,
                type: type,
                pulse: 0
            };
            document.getElementById('missionInfo').innerText = `Nächster Halt: ${type.name} ${type.icon}`;
        }
        spawnMission();

        function showFloatingText(text, x, y) {
            gameState.floatingTexts.push({ text: text, x: x, y: y, life: 60 });
        }

        // --- FAHRZEUG PHYSIK (Langsamer, schwerfälliger) ---
        const car = {
            x: 0, y: 0,
            width: 30, height: 60,
            angle: 0,
            speed: 0,
            maxSpeed: 7,          // Deutlich reduziert!
            maxReverseSpeed: 4,   // Rückwärts noch langsamer
            acceleration: 0.15,   // Beschleunigt träger
            braking: 0.3,         // Bremst gut
            friction: 0.96,       // Rollt länger aus
            steeringAngle: 0,
            maxSteer: 0.04,       // Weniger wendiges "Go-Kart"-Gefühl
            steeringInput: 0
        };

        // --- KOLLISIONSABFRAGE (Feste Häuser) ---
        function checkCollision(nextX, nextY) {
            let hw = car.width / 2;
            let hh = car.height / 2;
            for(let b of mapData.buildings) {
                // Einfache Rechteck-Kollision
                if(nextX + hw > b.x && nextX - hw < b.x + b.w &&
                   nextY + hh > b.y && nextY - hh < b.y + b.h) {
                    return true;
                }
            }
            return false;
        }

        const inputs = { fwd: false, rev: false, left: false, right: false };

        // --- TOUCH-STEUERUNG (Deutliche Pfeile) ---
        function drawTouchController(activeSector) {
            cctx.clearRect(0, 0, ctrlCanvas.width, ctrlCanvas.height);
            let w = ctrlCanvas.width; let h = ctrlCanvas.height; let cx = w/2; let cy = h/2;

            cctx.strokeStyle = 'rgba(255,255,255,0.4)'; cctx.lineWidth = 3;
            cctx.beginPath(); cctx.moveTo(0, cy); cctx.lineTo(w, cy); cctx.stroke();

            function drawSector(start, end, isActive, drawArrowFn) {
                cctx.beginPath();
                cctx.moveTo(cx, cy);
                cctx.arc(cx, cy, w/2, start, end);
                cctx.lineTo(cx, cy);
                cctx.fillStyle = isActive ? 'rgba(255, 204, 0, 0.6)' : 'rgba(255, 255, 255, 0.05)';
                cctx.fill();
                cctx.stroke();
                
                // Pfeil in der Mitte des Sektors zeichnen
                let midAngle = start + (end - start)/2;
                let arrowDist = w/3;
                cctx.save();
                cctx.translate(cx + Math.cos(midAngle) * arrowDist, cy + Math.sin(midAngle) * arrowDist);
                drawArrowFn();
                cctx.restore();
            }

            // Helfer für Pfeil-Symbole
            const drawArrowUp = () => { cctx.fillStyle='#fff'; cctx.font='30px sans-serif'; cctx.fillText('⬆️', -15, 10); };
            const drawArrowDown = () => { cctx.fillStyle='#fff'; cctx.font='30px sans-serif'; cctx.fillText('⬇️', -15, 10); };
            const drawArrowUpLeft = () => { cctx.fillStyle='#fff'; cctx.font='30px sans-serif'; cctx.fillText('↖️', -15, 10); };
            const drawArrowUpRight = () => { cctx.fillStyle='#fff'; cctx.font='30px sans-serif'; cctx.fillText('↗️', -15, 10); };
            const drawArrowDownLeft = () => { cctx.fillStyle='#fff'; cctx.font='30px sans-serif'; cctx.fillText('↙️', -15, 10); };
            const drawArrowDownRight = () => { cctx.fillStyle='#fff'; cctx.font='30px sans-serif'; cctx.fillText('↘️', -15, 10); };

            drawSector(Math.PI, 4*Math.PI/3, activeSector === 0, drawArrowUpLeft);
            drawSector(4*Math.PI/3, 5*Math.PI/3, activeSector === 1, drawArrowUp);
            drawSector(5*Math.PI/3, 2*Math.PI, activeSector === 2, drawArrowUpRight);
            drawSector(0, Math.PI/3, activeSector === 3, drawArrowDownRight);
            drawSector(Math.PI/3, 2*Math.PI/3, activeSector === 4, drawArrowDown);
            drawSector(2*Math.PI/3, Math.PI, activeSector === 5, drawArrowDownLeft);
        }
        drawTouchController(-1);

        const ctrlContainer = document.getElementById('touchControllerContainer');
        
        function handleTouch(e) {
            e.preventDefault();
            if (e.touches.length === 0 || gameState.isDelivering) { // Deaktivieren während Zustellung
                inputs.fwd = inputs.rev = inputs.left = inputs.right = false;
                drawTouchController(-1);
                return;
            }

            const touch = e.touches[0];
            const rect = ctrlContainer.getBoundingClientRect();
            
            if (touch.clientX >= rect.left && touch.clientX <= rect.right &&
                touch.clientY >= rect.top && touch.clientY <= rect.bottom) {
                
                let dx = touch.clientX - (rect.left + rect.width/2);
                let dy = touch.clientY - (rect.top + rect.height/2);
                
                let angle = Math.atan2(dy, dx); 
                if (angle < 0) angle += 2 * Math.PI;

                inputs.fwd = inputs.rev = inputs.left = inputs.right = false;
                let sector = -1;

                if (angle >= Math.PI && angle < 4*Math.PI/3) { sector = 0; inputs.fwd = true; inputs.left = true; }
                else if (angle >= 4*Math.PI/3 && angle < 5*Math.PI/3) { sector = 1; inputs.fwd = true; }
                else if (angle >= 5*Math.PI/3 && angle <= 2*Math.PI) { sector = 2; inputs.fwd = true; inputs.right = true; }
                else if (angle >= 0 && angle < Math.PI/3) { sector = 3; inputs.rev = true; inputs.right = true; }
                else if (angle >= Math.PI/3 && angle < 2*Math.PI/3) { sector = 4; inputs.rev = true; }
                else if (angle >= 2*Math.PI/3 && angle < Math.PI) { sector = 5; inputs.rev = true; inputs.left = true; }

                drawTouchController(sector);
            }
        }

        ctrlContainer.addEventListener('touchstart', handleTouch, {passive: false});
        ctrlContainer.addEventListener('touchmove', handleTouch, {passive: false});
        ctrlContainer.addEventListener('touchend', () => {
            inputs.fwd = inputs.rev = inputs.left = inputs.right = false;
            drawTouchController(-1);
        });

        // Tastatur
        window.addEventListener('keydown', e => {
            if(!gameState.isDelivering) {
                if(e.key === 'ArrowUp') inputs.fwd = true;
                if(e.key === 'ArrowDown') inputs.rev = true;
                if(e.key === 'ArrowLeft') inputs.left = true;
                if(e.key === 'ArrowRight') inputs.right = true;
            }
        });
        window.addEventListener('keyup', e => {
            if(e.key === 'ArrowUp') inputs.fwd = false;
            if(e.key === 'ArrowDown') inputs.rev = false;
            if(e.key === 'ArrowLeft') inputs.left = false;
            if(e.key === 'ArrowRight') inputs.right = false;
        });

        // --- SPIEL-LOGIK ---
        function update() {
            // Zustell-Sequenz (Zusteller läuft)
            if (gameState.isDelivering) {
                inputs.fwd = inputs.rev = inputs.left = inputs.right = false; // Auto stoppen
                car.speed = 0;
                
                let dx = postman.targetX - postman.x;
                let dy = postman.targetY - postman.y;
                let dist = Math.sqrt(dx*dx + dy*dy);

                if (postman.state === 'to_door') {
                    if (dist > postman.speed) {
                        postman.x += (dx/dist) * postman.speed;
                        postman.y += (dy/dist) * postman.speed;
                    } else {
                        // An der Tür angekommen -> warten
                        postman.state = 'waiting';
                        document.getElementById('missionInfo').innerText = "Klingelt...";
                    }
                } 
                else if (postman.state === 'waiting') {
                    postman.waitTimer--;
                    if (postman.waitTimer <= 0) {
                        // Erfolgreich zugestellt!
                        gameState.score++;
                        document.getElementById('scoreDisplay').innerText = `Pakete: ${gameState.score}`;
                        showFloatingText('+1', postman.x, postman.y - 20);
                        
                        postman.state = 'to_car';
                        postman.targetX = car.x;
                        postman.targetY = car.y;
                        document.getElementById('missionInfo').innerText = "Geht zurück...";
                    }
                }
                else if (postman.state === 'to_car') {
                    // Update das Ziel, falls das Auto minimal weiterrollt
                    postman.targetX = car.x; postman.targetY = car.y;
                    if (dist > postman.speed) {
                        postman.x += (dx/dist) * postman.speed;
                        postman.y += (dy/dist) * postman.speed;
                    } else {
                        // Zurück im Auto -> Weiterfahren
                        gameState.isDelivering = false;
                        spawnMission();
                    }
                }
            } else {
                // Normales Fahren
                if (inputs.fwd) {
                    if (car.speed < 0) car.speed += car.braking;
                    else car.speed += car.acceleration;
                } else if (inputs.rev) {
                    if (car.speed > 0) car.speed -= car.braking;
                    else car.speed -= car.acceleration;
                } else {
                    car.speed *= car.friction;
                }

                car.speed = Math.max(-car.maxReverseSpeed, Math.min(car.maxSpeed, car.speed));
                if(Math.abs(car.speed) < 0.1) car.speed = 0;

                if (Math.abs(car.speed) > 0.5) {
                    car.steeringInput = 0;
                    if (inputs.left) car.steeringInput = -1;
                    if (inputs.right) car.steeringInput = 1;

                    car.steeringAngle += (car.steeringInput * car.maxSteer - car.steeringAngle) * 0.2;
                    let dir = car.speed > 0 ? 1 : -1;
                    car.angle += car.steeringAngle * dir * (Math.abs(car.speed) / car.maxSpeed);
                }

                let nextX = car.x + Math.cos(car.angle - Math.PI / 2) * car.speed;
                let nextY = car.y + Math.sin(car.angle - Math.PI / 2) * car.speed;

                // Kollision prüfen
                if (!checkCollision(nextX, nextY)) {
                    car.x = nextX;
                    car.y = nextY;
                } else {
                    car.speed = 0; // Boom, Haus getroffen. Stehen bleiben.
                }

                // Trigger prüfen (Sind wir auf dem Halo?)
                if (gameState.mission) {
                    gameState.mission.pulse += 0.05;
                    let m = gameState.mission;
                    let dist = Math.sqrt(Math.pow(car.x - m.triggerX, 2) + Math.pow(car.y - m.triggerY, 2));
                    
                    if (dist < m.radius && Math.abs(car.speed) < 1) { // Man muss fast stehen!
                        // Zustellung starten
                        gameState.isDelivering = true;
                        postman.x = car.x;
                        postman.y = car.y;
                        postman.targetX = m.doorX;
                        postman.targetY = m.doorY;
                        postman.state = 'to_door';
                        postman.waitTimer = m.type.waitTime;
                        drawTouchController(-1); // Controller visuell resetten
                    }
                }
            }

            document.getElementById('speedo').innerText = Math.round(Math.abs(car.speed) * 6) + ' km/h';

            // Floating Texts updaten
            for(let i = gameState.floatingTexts.length - 1; i >= 0; i--) {
                let ft = gameState.floatingTexts[i];
                ft.y -= 1; // Steigt nach oben
                ft.life--;
                if(ft.life <= 0) gameState.floatingTexts.splice(i, 1);
            }
        }

        // --- RENDERING ---
        function draw() {
            ctx.fillStyle = '#4caf50'; // Wiese
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.save();
            ctx.translate(canvas.width / 2 - car.x, canvas.height / 2 - car.y); // Kamera

            // Straßen
            ctx.fillStyle = '#555';
            for (let r of mapData.roads) {
                ctx.fillRect(r.x, r.y, r.w, r.h);
                // Straßenmarkierungen (gestrichelte Mittellinie)
                ctx.fillStyle = '#fff';
                if(r.w > r.h) { // Waagerecht
                    for(let x=r.x+50; x<r.x+r.w; x+=100) ctx.fillRect(x, r.y + r.h/2 - 2, 50, 4);
                } else { // Senkrecht
                    for(let y=r.y+50; y<r.y+r.h; y+=100) ctx.fillRect(r.x + r.w/2 - 2, y, 4, 50);
                }
                ctx.fillStyle = '#555'; // Zurück zu Asphalt
            }

            // Gebäude
            for (let b of mapData.buildings) {
                // Schattenwurf
                ctx.fillStyle = 'rgba(0,0,0,0.3)'; ctx.fillRect(b.x + 8, b.y + 12, b.w, b.h);
                // Hauskörper
                ctx.fillStyle = '#8d6e63'; ctx.fillRect(b.x, b.y, b.w, b.h);
                ctx.strokeStyle = '#3e2723'; ctx.lineWidth = 3; ctx.strokeRect(b.x, b.y, b.w, b.h);
                // Flachdach (etwas heller)
                ctx.fillStyle = '#a1887f'; ctx.fillRect(b.x+10, b.y+10, b.w-20, b.h-20); 
                // Haustür Markierung (damit man weiß, wo der Zusteller hingeht)
                ctx.fillStyle = '#3e2723'; ctx.fillRect(b.x + b.w/2 - 10, b.y + b.h - 5, 20, 10);
            }

            // Missions-Ziel (Halo & Tür)
            if (gameState.mission && !gameState.isDelivering) {
                let m = gameState.mission;
                
                // Halo auf der Straße
                ctx.beginPath();
                ctx.arc(m.triggerX, m.triggerY, m.radius + Math.sin(m.pulse) * 5, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 204, 0, 0.3)`; ctx.fill();
                ctx.strokeStyle = '#ffcc00'; ctx.lineWidth = 2; ctx.stroke();

                // Icon über dem Halo
                ctx.fillStyle = '#fff'; ctx.font = '24px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillText(m.type.icon, m.triggerX, m.triggerY);
            }

            // --- AUTO ZEICHNEN ---
            ctx.save();
            ctx.translate(car.x, car.y);
            ctx.rotate(car.angle);

            ctx.fillStyle = '#ffcc00'; ctx.fillRect(-car.width/2, -car.height/2, car.width, car.height);
            ctx.strokeStyle = '#111'; ctx.lineWidth = 2; ctx.strokeRect(-car.width/2, -car.height/2, car.width, car.height);
            
            ctx.fillStyle = '#1e90ff'; ctx.fillRect(-car.width/2 + 4, -car.height/2 + 8, car.width - 8, 12);
            ctx.fillStyle = '#d32f2f'; ctx.beginPath(); ctx.arc(0, 3, 4, 0, Math.PI*2); ctx.fill();
            
            ctx.fillStyle = '#111';
            const wX = car.width/2 + 1, wY = car.height/2 - 10, wW = 6, wH = 14;
            ctx.fillRect(-wX - wW, wY - wH/2, wW, wH); 
            ctx.fillRect(wX, wY - wH/2, wW, wH);       
            ctx.save(); ctx.translate(-wX - wW/2, -wY); ctx.rotate(car.steeringAngle * 4); ctx.fillRect(-wW/2, -wH/2, wW, wH); ctx.restore(); 
            ctx.save(); ctx.translate(wX + wW/2, -wY); ctx.rotate(car.steeringAngle * 4); ctx.fillRect(-wW/2, -wH/2, wW, wH); ctx.restore(); 

            ctx.restore(); // Auto Ende

            // --- POSTBOTE ZEICHNEN (Wenn er läuft) ---
            if (gameState.isDelivering) {
                ctx.beginPath();
                ctx.arc(postman.x, postman.y, 8, 0, Math.PI * 2);
                ctx.fillStyle = '#ffcc00'; // Gelbe Uniform
                ctx.fill();
                ctx.strokeStyle = '#111'; ctx.lineWidth = 2; ctx.stroke();
            }

            // --- FLOATING TEXTS (+1 Punkt) ---
            for(let ft of gameState.floatingTexts) {
                ctx.fillStyle = `rgba(255, 204, 0, ${ft.life / 60})`;
                ctx.font = 'bold 24px Arial';
                ctx.textAlign = 'center';
                ctx.fillText(ft.text, ft.x, ft.y);
            }

            ctx.restore(); // Kamera Ende

            // --- NAVIGATIONS-PFEIL ---
            if (gameState.mission && !gameState.isDelivering) {
                let screenX = canvas.width/2 + (gameState.mission.triggerX - car.x);
                let screenY = canvas.height/2 + (gameState.mission.triggerY - car.y);
                let margin = 40;
                
                if (screenX < margin || screenX > canvas.width - margin || screenY < margin || screenY > canvas.height - margin) {
                    let angleToMission = Math.atan2(gameState.mission.triggerY - car.y, gameState.mission.triggerX - car.x);
                    let arrowR = Math.min(canvas.width, canvas.height) / 2 - 60;
                    let arrowX = canvas.width/2 + Math.cos(angleToMission) * arrowR;
                    let arrowY = canvas.height/2 + Math.sin(angleToMission) * arrowR;

                    ctx.save();
                    ctx.translate(arrowX, arrowY);
                    ctx.rotate(angleToMission);
                    ctx.beginPath(); ctx.moveTo(20, 0); ctx.lineTo(-15, 15); ctx.lineTo(-15, -15);
                    ctx.fillStyle = '#ffcc00'; ctx.fill(); ctx.strokeStyle = '#000'; ctx.lineWidth = 2; ctx.stroke();
                    ctx.restore();
                }
            }
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }
        loop();
    </script>
</body>
</html>
